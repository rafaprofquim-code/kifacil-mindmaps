function incentivoAleatorio() { return INCENTIVOS[Math.floor(Math.random() * INCENTIVOS.length)]; }

let timersAtivos = [];
function agendar(fn, ms) { const id = setTimeout(fn, ms); timersAtivos.push(id); return id; }
function limparTimers() { timersAtivos.forEach(clearTimeout); timersAtivos = []; }

let acertos = 0;

/* ==========================================================
   INTERACTION HELPERS
   ========================================================== */
function botaoContinuar(delayMs) {
  delayMs = delayMs || 0;
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', avancar);
  return btn;
}

function revelarSubstancia(ex, cartaoEl) {
  const reveal = document.createElement('div');
  reveal.className = 'substancia-revelada';
  reveal.innerHTML =
    '<div class="formula-revelada">' + ex.formula + '</div>' +
    '<div class="nome-revelado">' + ex.nome + '</div>' +
    '<p class="explicacao-revelada">' + ex.explicacao + '</p>';
  cartaoEl.appendChild(reveal);
}

function perguntaComPistas(ex, listaPistasEl, cartaoEl, aoConcluir) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">Which inorganic function does this compound belong to?</div>' +
    '<div class="opcoes-linha" id="opcoesLinha"></div>' +
    '<div class="modal-feedback" id="feedbackEscolha"></div>';
  painel.appendChild(wrap);

  const opcoesLinha = wrap.querySelector('#opcoesLinha');
  const feedback = wrap.querySelector('#feedbackEscolha');
  let pistasReveladas = 1;
  let resolvido = false;

  CATEGORIAS.forEach(function (cat) {
    const btn = document.createElement('button');
    btn.className = 'btn-opcao';
    btn.textContent = cat;
    btn.addEventListener('click', function () {
      if (resolvido) return;
      if (cat === ex.categoria) {
        resolvido = true;
        acertos++;
        tocarDing();
        const incentivo = incentivoAleatorio();
        fala(incentivo);
        Array.from(opcoesLinha.children).forEach(function (b) { b.disabled = true; });
        btn.classList.add('opcao-certa');
        feedback.className = 'modal-feedback visivel';
        feedback.innerHTML = '<span class="feedback-certo">' + incentivo + '</span>';
        revelarSubstancia(ex, cartaoEl);
        aoConcluir();
      } else {
        btn.classList.add('opcao-errada');
        if (pistasReveladas < ex.pistas.length) {
          const li = document.createElement('li');
          li.textContent = ex.pistas[pistasReveladas];
          listaPistasEl.appendChild(li);
          pistasReveladas++;
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-errado">Not quite. Take a look at this extra clue.</span>';
        } else {
          resolvido = true;
          Array.from(opcoesLinha.children).forEach(function (b) {
            b.disabled = true;
            if (b.textContent === ex.categoria) b.classList.add('opcao-certa');
          });
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-resposta">Correct answer highlighted.</span>';
          revelarSubstancia(ex, cartaoEl);
          aoConcluir();
        }
      }
    });
    opcoesLinha.appendChild(btn);
  });
}

function criarClassificacaoPorCategoria(itens, categorias, mensagemErro, mensagemSucesso) {
  const container = document.createElement('div');
  container.className = 'jogo-associacao';
  overlay.appendChild(container);

  const colCategorias = document.createElement('div'); colCategorias.className = 'coluna-associacao';
  const colItens = document.createElement('div'); colItens.className = 'coluna-associacao' + (itens.length > 5 ? ' coluna-associacao-grade' : '');
  container.appendChild(colCategorias); container.appendChild(colItens);

  const itensEmbaralhados = itens.slice().sort(function () { return Math.random() - 0.5; });

  let categoriaAtiva = null, acertosLocais = 0;
  const elCategorias = {};

  categorias.forEach(function (cat) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = cat;
    colCategorias.appendChild(el);
    elCategorias[cat] = el;
    el.addEventListener('click', function () {
      Object.keys(elCategorias).forEach(function (k) { elCategorias[k].classList.remove('item-selecionado'); });
      el.classList.add('item-selecionado');
      categoriaAtiva = cat;
    });
  });

  itensEmbaralhados.forEach(function (it) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = it.rotulo;
    colItens.appendChild(el);
    let tentativasItem = 0;
    el.addEventListener('click', function () {
      if (el.classList.contains('associado')) return;
      if (!categoriaAtiva) {
        fala('First choose a category on the left.');
        return;
      }
      if (it.categoria === categoriaAtiva) {
        el.classList.add('associado');
        tocarDing();
        acertosLocais++;
        fala(incentivoAleatorio() + ' That\'s ' + it.nome + ' (' + it.formula + ') — ' + it.explicacao);
        if (acertosLocais === itens.length) {
          agendar(function () { fala(mensagemSucesso); botaoContinuar(400); }, 1400);
        }
      } else {
        tentativasItem++;
        el.classList.add('erro-flash');
        setTimeout(function () { el.classList.remove('erro-flash'); }, 500);
        if (tentativasItem === 1) {
          fala(mensagemErro);
        } else if (tentativasItem === 2) {
          fala(it.dica);
        } else {
          el.classList.add('associado');
          acertosLocais++;
          fala('That\'s ' + it.nome + ' (' + it.formula + ') — ' + it.explicacao);
          if (acertosLocais === itens.length) {
            agendar(function () { fala(mensagemSucesso); botaoContinuar(400); }, 300);
          }
        }
      }
    });
  });
}

/* ==========================================================
   INTRODUCTION
   ========================================================== */
function passoIntro() {
  fala('You\'ve already learned about acids, bases, salts, and oxides. Now, instead of memorizing names, you\'ll investigate everyday clues and work out the inorganic function of each substance — like a real chemist.');
  const btn = document.createElement('button');
  btn.className = 'btn-continuar btn-iniciar-investigacao';
  btn.textContent = 'START THE INVESTIGATION';
  overlay.appendChild(btn);
  btn.addEventListener('click', avancar);
}

/* ==========================================================
   EXAMPLES 1–8
   ========================================================== */
function criarPassoExemplo(indice) {
  return function () {
    const ex = EXEMPLOS[indice];
    fala('Example ' + (indice + 1) + ' of ' + EXEMPLOS.length + '. Read the clues and work out the inorganic function — if you get it wrong, you get one more clue.');

    const contador = document.createElement('div');
    contador.className = 'contador-central';
    contador.textContent = 'Example ' + (indice + 1) + ' of ' + EXEMPLOS.length + '   |   Correct: ' + acertos;
    overlay.appendChild(contador);

    const cartao = document.createElement('div');
    cartao.className = 'cartao-produto';
    cartao.innerHTML = '<div class="emoji">' + ex.emoji + '</div><ul class="lista-pistas" id="listaPistas"></ul>';
    overlay.appendChild(cartao);

    const listaPistas = cartao.querySelector('#listaPistas');
    const primeiraPista = document.createElement('li');
    primeiraPista.textContent = ex.pistas[0];
    listaPistas.appendChild(primeiraPista);

    perguntaComPistas(ex, listaPistas, cartao, function () { botaoContinuar(400); });
  };
}

/* ==========================================================
   FINAL CHALLENGE
   ========================================================== */
function passoDesafioFinal() {
  fala('To wrap up, here are eight everyday situations. Choose the category and then the situation that matches it — no names, just characteristics.');
  criarClassificacaoPorCategoria(DESAFIO_FINAL, CATEGORIAS, 'Think: does this substance release H⁺? Does it have an OH⁻ group? Or neither?', 'Very good! You recognized every substance by its characteristics, not by its name.');
}

/* ==========================================================
   FINAL
   ========================================================== */
function passoFinal() {
  fala('Excellent! Recognizing an inorganic function isn\'t about memorizing names — it\'s about understanding the substance\'s behavior: whether it releases H⁺, whether it has an OH⁻ group, or whether it is made up of just a cation and an anion, or of oxygen and another element.');
  overlay.innerHTML =
    '<div class="quadro-resumo" style="position:absolute;inset:0;align-items:center;">' +
    '<div class="quadro-item"><div class="rotulo">Acids</div><div class="valor">E.g.: HCl</div></div>' +
    '<div class="quadro-item"><div class="rotulo">Bases</div><div class="valor">E.g.: NaOH</div></div>' +
    '<div class="quadro-item"><div class="rotulo">Salts</div><div class="valor">E.g.: NaCl</div></div>' +
    '<div class="quadro-item"><div class="rotulo">Oxides</div><div class="valor">E.g.: CO₂</div></div>' +
    '</div>';
  painel.innerHTML = '';
  const conclusao = document.getElementById('conclusao');
  document.getElementById('conclusaoPlacar').textContent = 'Correct: ' + acertos + ' of ' + EXEMPLOS.length;
  document.getElementById('conclusaoMensagem').textContent = 'You recognized acids, bases, salts, and oxides found in everyday products and situations.';
  conclusao.classList.add('visivel');
  conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ==========================================================
   STAGE ENGINE
   ========================================================== */
const PASSOS = [passoIntro]
  .concat(EXEMPLOS.map(function (_, i) { return criarPassoExemplo(i); }))
  .concat([passoDesafioFinal, passoFinal]);

let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  PASSOS[i]();
}
function avancar() { if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1); }
function reiniciar() {
  acertos = 0;
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* ── INIT ── */
irPara(0);
</script>
