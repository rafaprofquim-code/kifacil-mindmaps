<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Intermolecular Interactions — Premium Game | KiFácil</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --fundo: #fdf8f0;
      --fundo-card: #fffdf9;
      --escuro: #2e2016;
      --texto: #1a1208;
      --texto-suave: #3d2e1a;
      --dourado: #8a5e10;
      --dourado-claro: #c8920a;
      --borda: rgba(100,70,20,0.3);
      --borda-forte: rgba(100,70,20,0.5);
      --verde-escuro: #1e5238;
      --vermelho-escuro: #7a1515;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-nav {
      background: #1e1008;
      border-bottom: 2px solid var(--dourado-claro);
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #fff8ee;
      letter-spacing: 0.03em;
      margin-right: auto;
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 1rem;
      width: 100%;
    }
    .titulo-jogo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.7rem, 3.8vw, 2.5rem);
      font-weight: 600;
      margin-bottom: 0.3rem;
      line-height: 1.1;
    }
    .subtitulo {
      font-size: 1rem;
      color: var(--texto);
      margin-bottom: .9rem;
      max-width: 680px;
    }

    .narrador {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: .8rem;
      padding: .8rem 1.1rem;
      border: 1.5px solid var(--borda-forte);
      border-radius: 10px;
      background: rgba(30,16,8,0.05);
    }
    .narrador img {
      width: 68px;
      height: 84px;
      object-fit: cover;
      object-position: top center;
      border-radius: 10px;
      border: 1px solid rgba(200,146,10,.35);
      flex-shrink: 0;
    }
    .narrador-nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dourado-claro);
      margin-bottom: 0.3rem;
    }
    .narrador-texto {
      font-size: 1rem;
      line-height: 1.5;
      color: var(--texto-suave);
      min-height: 3.4em;
    }

    /* ANIMATION STAGE */
    .imagem-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(100%, 900px);
      max-height: 62vh;
      min-height: 380px;
      margin: 0 auto;
      cursor: default;
      border: 1.5px solid var(--borda-forte);
      border-radius: 6px;
      overflow: hidden;
      background: #f7efe2;
    }
    .cena-fundo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .overlay-animacao { position: absolute; inset: 0; }

    .link-aula {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: #fff8ee;
      background: rgba(30,16,8,0.72); border: 1.5px solid var(--dourado-claro, #c8920a);
      border-radius: 8px; padding: 0.4rem 0.65rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.02em; text-align: center; line-height: 1.2;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .link-aula:hover { background: rgba(30,16,8,0.92); transform: translateY(-1px); }
    .link-aula svg { width: 22px; height: 22px; }

    /* Molecule (static, with parchment background for readability) */
    .molecula-card {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 16px 22px; z-index: 3; text-align: center;
    }
    .molecula-card svg { display: block; margin: 0 auto; }
    .molecula-card .molecula-legenda {
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.95rem;
      color: var(--texto-suave); margin-top: 6px;
    }
    .molecula-par { display: flex; gap: 18px; align-items: center; }

    .placa-dourada {
      position: absolute; bottom: 12px; left: 50%; transform: translate(-50%, 10px);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: clamp(0.82rem, 2.1vw, 1.02rem);
      padding: 0.5rem 1.1rem; border-radius: 8px; border: 1px solid #a97c1f;
      box-shadow: 0 3px 10px rgba(0,0,0,.25); text-align: center; max-width: 90%;
      opacity: 0; animation: placaIn .5s ease forwards; z-index: 6; pointer-events: none;
    }
    @keyframes placaIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* Matching game (classification by click) */
    .jogo-associacao { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 30px; padding: 6%; flex-wrap: wrap; }
    .coluna-associacao { display: flex; flex-direction: column; gap: 8px; }
    .item-associacao {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 8px; padding: 0.5rem 1rem;
      font-family: 'Libre Baskerville', serif; font-size: 0.88rem; cursor: pointer; text-align: center; transition: border-color .2s;
    }
    .item-associacao:hover { border-color: var(--dourado-claro); }
    .item-selecionado { border-color: var(--dourado-claro); background: rgba(200,146,10,.12); }
    .associado { border-color: var(--verde-escuro); background: rgba(30,82,56,.12); cursor: default; opacity: 0.85; }
    .erro-flash { outline: 3px solid var(--vermelho-escuro); border-radius: 8px; }

    .quadro-resumo {
      display: flex;
      gap: 1.1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 1rem;
    }
    .quadro-item {
      background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte);
      border-radius: 10px;
      padding: 1rem 1.3rem;
      min-width: 190px;
      text-align: center;
    }
    .quadro-item .rotulo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--dourado-claro);
      margin-bottom: 0.4rem;
    }
    .quadro-item .valor {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--texto);
    }

    /* INTERACTION PANEL */
    #painelInteracao { max-width: 900px; margin: 1.2rem auto 0; }
    .interacao-painel {
      background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte);
      border-radius: 12px;
      padding: 1.4rem 1.6rem 1.3rem;
    }
    .interacao-pergunta-texto {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 1rem;
    }
    .opcoes-linha { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .btn-opcao {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px;
      padding: 0.55rem 1.1rem; font-family: 'Libre Baskerville', serif; font-size: 0.95rem;
      color: var(--texto); cursor: pointer; transition: border-color .2s, background .2s;
    }
    .btn-opcao:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .btn-opcao:disabled { cursor: default; opacity: 0.75; }
    .opcao-certa { border-color: var(--verde-escuro) !important; background: rgba(30,82,56,0.12); }
    .opcao-errada { border-color: var(--vermelho-escuro) !important; background: rgba(122,21,21,0.08); }

    .modal-feedback {
      margin-top: 1rem; font-size: 0.86rem; line-height: 1.7;
      border-left: 3px solid var(--borda-forte); padding-left: 1rem; display: none;
    }
    .modal-feedback.visivel { display: block; }
    .feedback-certo   { color: var(--verde-escuro); font-weight: 700; }
    .feedback-errado  { color: var(--vermelho-escuro); font-weight: 700; }
    .feedback-resposta { color: var(--dourado-claro); font-weight: 700; }
    .feedback-explicacao { color: var(--texto); margin-top: 0.5rem; }

    .btn-continuar {
      background: #1e1008;
      color: var(--dourado-claro);
      border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.6rem 1.6rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, opacity .2s;
      display: block;
      margin: 0.2rem auto 0;
    }
    .btn-continuar:hover { background: var(--dourado-claro); color: #1e1008; }
    .btn-continuar:disabled { opacity: 0.4; cursor: default; }
    .btn-continuar:disabled:hover { background: #1e1008; color: var(--dourado-claro); }

    /* Continue button inside the teacher's speech bubble */
    #continuarBalao { margin-top: 0.6rem; }
    #continuarBalao .btn-continuar { display: inline-block; margin: 0; }

    /* CONCLUSION */
    .conclusao {
      display: none;
      margin-top: 2rem;
      background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte);
      border-radius: 12px;
      padding: 2.4rem 2rem;
      text-align: center;
    }
    .conclusao.visivel { display: block; }
    .conclusao-titulo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 600;
      margin-bottom: 0.8rem;
    }
    .conclusao-placar {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      color: var(--dourado-claro);
      margin-bottom: 1rem;
    }
    .conclusao-mensagem {
      font-size: 0.93rem;
      color: var(--texto-suave);
      max-width: 460px;
      margin: 0 auto 2rem;
      line-height: 1.8;
    }
    .btn-reiniciar {
      background: #1e1008;
      color: var(--dourado-claro);
      border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.7rem 2rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-reiniciar:hover { background: var(--dourado-claro); color: #1e1008; }

    /* FOOTER */
    footer {
      background: var(--escuro);
      border-top: 2px solid var(--dourado-claro);
      padding: .6rem 2rem;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,248,238,0.5);
    }

    @media (min-width: 641px) {
      .narrador { max-width: 900px; margin: 0 auto .8rem; }
      .narrador-texto { font-size: 1.05rem; }
    }

    @media (max-width: 640px) {
      .top-nav { padding: 0 1.2rem; gap: 1.2rem; }
      main { padding: .8rem 1rem 1rem; }
      .interacao-painel { padding: 1.2rem 1rem; }
      .molecula-par { gap: 10px; flex-wrap: wrap; justify-content: center; }
      .opcoes-linha { gap: 0.5rem; }
      .btn-opcao { font-size: 0.85rem; padding: 0.5rem 0.85rem; }
      .jogo-associacao { gap: 14px; }
      .item-associacao { font-size: 0.78rem; padding: 0.4rem 0.7rem; }
      .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .link-aula svg { width: 18px; height: 18px; }
    }
  
    /* AUDIO CONTROL */
    #controle-volume {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(14,6,0,0.85);
      border: 1.5px solid var(--borda-forte);
      border-radius: 24px;
      padding: 8px 16px 8px 10px;
    }
    #btn-mute {
      background: none;
      border: none;
      color: var(--dourado-claro);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #slider-volume {
      width: 90px;
      accent-color: var(--dourado-claro);
      cursor: pointer;
    }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">KiFácil</div>
</nav>

<main>
  <h1 class="titulo-jogo">Intermolecular Interactions</h1>
  <p class="subtitulo">Discover why some molecules attract each other more than others — and what that changes in the behavior of substances.</p>

  <div class="narrador">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Professor Rafaela" />
    <div style="flex: 1;">
      <div class="narrador-nome">Professor Rafaela</div>
      <div class="narrador-texto" id="narradorTexto">Let's begin.</div>
      <div id="continuarBalao"></div>
    </div>
  </div>

  <div class="imagem-wrapper" id="imagemWrapper">
    <img src="../imagens/laboratorio-ions.jpg" alt="Laboratory" class="cena-fundo" />
    <div class="overlay-animacao" id="overlayAnimacao"></div>
</div>

  <div id="painelInteracao"></div>

  <div class="conclusao" id="conclusao">
    <div class="conclusao-titulo">Study completed</div>
    <div class="conclusao-placar" id="conclusaoPlacar"></div>
    <p class="conclusao-mensagem" id="conclusaoMensagem"></p>
    <button class="btn-reiniciar" onclick="reiniciar()">Play again</button>
  </div>
</main>

<footer>© 2026 KiFácil</footer>

};

function rotuloFormula(tipo) {
  return tipo.replace('H2O', 'H₂O').replace('CH4', 'CH₄').replace('NH3', 'NH₃').replace('HCl', 'HCl').replace('HF', 'HF').replace('H2', 'H₂');
}

/* ==========================================================
   DOM REFERENCES
   ========================================================== */
const overlay = document.getElementById('overlayAnimacao');
const painel  = document.getElementById('painelInteracao');
const continuarBalao = document.getElementById('continuarBalao');

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

function fala(texto) {
  document.getElementById('narradorTexto').textContent = texto;
}

let timersAtivos = [];
function agendar(fn, ms) {
  const id = setTimeout(fn, ms);
  timersAtivos.push(id);
  return id;
}
function limparTimers() {
  timersAtivos.forEach(clearTimeout);
  timersAtivos = [];
}

function botaoContinuar(delayMs) {
  delayMs = delayMs || 0;
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', avancar);
  return btn;
}

function escolhaBotoes(opts) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">' + opts.pergunta + '</div>' +
    '<div class="opcoes-linha" id="opcoesLinha"></div>' +
    '<div class="modal-feedback" id="feedbackEscolha"></div>';
  painel.appendChild(wrap);

  const opcoesLinha = wrap.querySelector('#opcoesLinha');
  const feedback = wrap.querySelector('#feedbackEscolha');
  let tentativas = 0;
  let resolvido = false;

  opts.opcoes.forEach(function (op) {
    const btn = document.createElement('button');
    btn.className = 'btn-opcao';
    btn.textContent = op.rotulo;
    btn.addEventListener('click', function () {
      if (resolvido) return;
      if (op.correta) {
        tocarDing();
        resolvido = true;
        Array.from(opcoesLinha.children).forEach(function (b) { b.disabled = true; });
        btn.classList.add('opcao-certa');
        feedback.className = 'modal-feedback visivel';
        feedback.innerHTML = '<span class="feedback-certo">Correct!</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
        opts.aoAcertar();
      } else {
        tentativas++;
        btn.classList.add('opcao-errada');
        if (tentativas === 1 && opts.dica) {
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-errado">' + opts.dica + '</span>';
        } else if (tentativas >= 2) {
          resolvido = true;
          Array.from(opcoesLinha.children).forEach(function (b, i) {
            b.disabled = true;
            if (opts.opcoes[i].correta) b.classList.add('opcao-certa');
          });
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-resposta">Correct answer highlighted.</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
          opts.aoAcertar();
        }
      }
    });
    opcoesLinha.appendChild(btn);
  });
}

/* ==========================================================
   CATEGORY CLASSIFICATION (molecule → type of force), by click
   The categories are fixed and reusable (several molecules can
   belong to the same category).
   ========================================================== */
function criarClassificacaoPorCategoria(itens, categorias, mensagemErro, mensagemSucesso) {
  const container = document.createElement('div');
  container.className = 'jogo-associacao';
  overlay.appendChild(container);

  const colCategorias = document.createElement('div'); colCategorias.className = 'coluna-associacao';
  const colItens = document.createElement('div'); colItens.className = 'coluna-associacao';
  container.appendChild(colCategorias); container.appendChild(colItens);

  const itensEmbaralhados = itens.slice().sort(function () { return Math.random() - 0.5; });

  let categoriaAtiva = null, acertos = 0;
  const elCategorias = {};

  categorias.forEach(function (cat) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = cat;
    colCategorias.appendChild(el);
    elCategorias[cat] = el;
    el.addEventListener('click', function () {
      Object.keys(elCategorias).forEach(function (k) { elCategorias[k].classList.remove('item-selecionado'); });
      el.classList.add('item-selecionado');
      categoriaAtiva = cat;
    });
  });

  itensEmbaralhados.forEach(function (it) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = rotuloFormula(it.chave) + ' ⋯ ' + rotuloFormula(it.chave);
    colItens.appendChild(el);
    el.addEventListener('click', function () {
      if (el.classList.contains('associado')) return;
      if (!categoriaAtiva) {
        fala('First choose a type of interaction on the left.');
        return;
      }
      if (it.categoria === categoriaAtiva) {
        tocarDing();
        el.classList.add('associado');
        acertos++;
        if (acertos === itens.length) {
          agendar(function () { fala(mensagemSucesso); botaoContinuar(400); }, 300);
        }
      } else {
        fala(mensagemErro);
        el.classList.add('erro-flash');
        setTimeout(function () { el.classList.remove('erro-flash'); }, 500);
      }
    });
  });
}

/* ==========================================================
   COMPONENT: MOLECULE CARD (static)
   ========================================================== */
function criarCartaoMolecula(tipo, legenda) {
  const div = document.createElement('div');
  div.className = 'molecula-card';
  div.innerHTML = MOLECULAS[tipo] + (legenda ? '<div class="molecula-legenda">' + legenda + '</div>' : '');
  return div;
}
function criarParMoleculas(tipo, legenda) {
  const div = document.createElement('div');
  div.className = 'molecula-card';
  div.innerHTML =
    '<div class="molecula-par">' + MOLECULAS[tipo] + MOLECULAS[tipo] + '</div>' +
    (legenda ? '<div class="molecula-legenda">' + legenda + '</div>' : '');
  return div;
}

/* ==========================================================
   INTRODUCTION
   ========================================================== */
function passoIntro() {
  fala('Today we are going to find out why some substances evaporate easily while others remain liquid. It all depends on intermolecular forces.');
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'START';
  wrap.appendChild(btn);
  painel.appendChild(wrap);
  btn.addEventListener('click', avancar);
}

/* ==========================================================
   STEP — LONDON DISPERSION (nonpolar molecules)
   ========================================================== */
function passoDispersao() {
  fala('Observe two H₂ molecules — a nonpolar molecule, with no permanent poles.');
  overlay.appendChild(criarParMoleculas('H2', 'H₂ + H₂'));

  escolhaBotoes({
    pergunta: 'Even without fixed poles, there is a slight attraction between them. What force is this?',
    opcoes: [
      { rotulo: 'Dipole-dipole', correta: false },
      { rotulo: 'London dispersion forces', correta: true },
      { rotulo: 'Hydrogen bonding', correta: false }
    ],
    dica: 'This is the force that occurs between nonpolar molecules, such as H₂, N₂, O₂ and CH₄.',
    explicacao: 'Induced dipole-induced dipole interactions (London dispersion forces) occur between nonpolar molecules. This is the weakest of the intermolecular interactions.',
    aoAcertar: function () { botaoContinuar(300); }
  });
}

/* ==========================================================
   STEP — DIPOLE-DIPOLE (polar molecules)
   ========================================================== */
function passoDipoloDipolo() {
  fala('Now observe two HCl molecules — a polar molecule, with one side δ+ and the other δ−.');
  overlay.appendChild(criarParMoleculas('HCl', 'HCl + HCl'));

  escolhaBotoes({
    pergunta: 'The positive pole of one molecule approaches the negative pole of the other. What interaction is this?',
    opcoes: [
      { rotulo: 'London dispersion forces', correta: false },
      { rotulo: 'Dipole-dipole (permanent dipoles)', correta: true },
      { rotulo: 'Hydrogen bonding', correta: false }
    ],
    dica: 'Occurs between polar molecules — the greater the polarity, the more intense the interaction.',
    explicacao: 'Dipole-dipole interactions (between permanent dipoles) occur between polar molecules. The greater the polarity of the molecule, the greater the intensity of this interaction.',
    aoAcertar: function () { botaoContinuar(300); }
  });
}

/* ==========================================================
   STEP — HYDROGEN BONDING
   ========================================================== */
function passoLigacaoH() {
  fala('Now observe two HF molecules. The hydrogen is bonded to the fluorine.');
  overlay.appendChild(criarParMoleculas('HF', 'HF + HF'));

  escolhaBotoes({
    pergunta: 'Fluorine belongs to the F, O, N group. What especially strong interaction occurs here?',
    opcoes: [
      { rotulo: 'Ordinary dipole-dipole', correta: false },
      { rotulo: 'Hydrogen bonding', correta: true },
      { rotulo: 'No interaction', correta: false }
    ],
    dica: 'This happens when H is bonded to an atom from the F, O, or N group (FON).',
    explicacao: 'Hydrogen bonds occur between highly polar molecules, when an H atom is bonded to fluorine, oxygen, or nitrogen (the FON group). This is the most intense of the intermolecular interactions.',
    aoAcertar: function () { botaoContinuar(300); }
  });
}

/* ==========================================================
   STEP — ORDER OF INTENSITY
   ========================================================== */
function passoOrdem() {
  fala('Let\'s put it all together. How do these three forces compare in intensity?');

  escolhaBotoes({
    pergunta: 'What is the correct order, from weakest to strongest?',
    opcoes: [
      { rotulo: 'Dipole-dipole < London dispersion < Hydrogen bonding', correta: false },
      { rotulo: 'London dispersion < Dipole-dipole < Hydrogen bonding', correta: true },
      { rotulo: 'Hydrogen bonding < Dipole-dipole < London dispersion', correta: false }
    ],
    dica: 'The weakest force occurs between nonpolar molecules; the strongest involves the FON group.',
    explicacao: 'London dispersion < Dipole-dipole < Hydrogen bonding. This order explains differences in melting and boiling points between molecular substances.',
    aoAcertar: function () { botaoContinuar(300); }
  });
}

/* ==========================================================
   STEP — CLASSIFY THE MOLECULES (matching)
   ========================================================== */
function passoClassificar() {
  fala('Choose a type of interaction on the left and click all the pairs of molecules that fit it. Then move on to the next type.');
  criarClassificacaoPorCategoria([
    { chave: 'H2', categoria: 'London dispersion' },
    { chave: 'CH4', categoria: 'London dispersion' },
    { chave: 'HCl', categoria: 'Dipole-dipole' },
    { chave: 'HF', categoria: 'Hydrogen bonding' },
    { chave: 'NH3', categoria: 'Hydrogen bonding' },
    { chave: 'H2O', categoria: 'Hydrogen bonding' }
  ], ['London dispersion', 'Dipole-dipole', 'Hydrogen bonding'],
  'Remember: nonpolar molecules undergo London dispersion; H bonded to F, O, or N forms hydrogen bonds.', 'Well done! You classified them all correctly.');
}

/* ==========================================================
   STEP — BOILING TEMPERATURE
   ========================================================== */
function passoEbulicao() {
  fala('Melting and boiling temperatures depend on the intensity of intermolecular interactions.');
  const linha = document.createElement('div');
  linha.style.position = 'absolute'; linha.style.inset = '0';
  linha.style.display = 'flex'; linha.style.justifyContent = 'center'; linha.style.alignItems = 'center';
  linha.style.gap = '18px'; linha.style.flexWrap = 'wrap';
  ['CH4', 'HCl', 'H2O'].forEach(function (tipo) {
    const card = criarCartaoMolecula(tipo, rotuloFormula(tipo));
    card.style.position = 'relative'; card.style.left = '0'; card.style.top = '0'; card.style.transform = 'none';
    linha.appendChild(card);
  });
  overlay.appendChild(linha);

  escolhaBotoes({
    pergunta: 'Heating these three substances, which one evaporates first?',
    opcoes: [
      { rotulo: 'CH₄', correta: true },
      { rotulo: 'HCl', correta: false },
      { rotulo: 'H₂O', correta: false }
    ],
    dica: 'Which one has the weakest intermolecular interactions?',
    explicacao: 'CH₄ only exhibits London dispersion, the weakest force — that\'s why it evaporates with very little energy.',
    aoAcertar: function () { agendar(passoEbulicao2, 300); }
  });
}
function passoEbulicao2() {
  escolhaBotoes({
    pergunta: 'And which one resists the most, evaporating last?',
    opcoes: [
      { rotulo: 'CH₄', correta: false },
      { rotulo: 'HCl', correta: false },
      { rotulo: 'H₂O', correta: true }
    ],
    dica: 'Which one forms hydrogen bonds?',
    explicacao: 'Water forms hydrogen bonds, the most intense interaction — that\'s why it requires much more energy (temperature) to evaporate.',
    aoAcertar: function () { botaoContinuar(400); }
  });
}

/* ==========================================================
   FINAL
   ========================================================== */
function passoFinal() {
  fala('Now you can predict the intensity of intermolecular forces just by looking at the molecule.');
  overlay.innerHTML =
    '<div class="quadro-resumo" style="position:absolute;inset:0;align-items:center;">' +
    '<div class="quadro-item"><div class="rotulo">London dispersion</div><div class="valor">Weakest</div></div>' +
    '<div class="quadro-item"><div class="rotulo">Dipole-dipole</div><div class="valor">Intermediate</div></div>' +
    '<div class="quadro-item"><div class="rotulo">Hydrogen bonding</div><div class="valor">Strongest</div></div>' +
    '</div>';
  painel.innerHTML = '';
  const conclusao = document.getElementById('conclusao');
  document.getElementById('conclusaoPlacar').textContent = 'Stage completed';
  document.getElementById('conclusaoMensagem').textContent = 'You discovered why some substances evaporate easily and others don\'t — it all depends on the intensity of the intermolecular forces.';
  conclusao.classList.add('visivel');
  conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ==========================================================
   STAGE ENGINE
   ========================================================== */
const PASSOS = [passoIntro, passoDispersao, passoDipoloDipolo, passoLigacaoH, passoOrdem, passoClassificar, passoEbulicao, passoFinal];
let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  PASSOS[i]();
}
function avancar() {
  if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1);
}
function reiniciar() {
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* ── INIT ── */
irPara(0);
</script>

<script>
let volumeSalvo = parseFloat(localStorage.getItem('kifacil_volume'));
if (isNaN(volumeSalvo)) volumeSalvo = 0.35;
let silenciado = localStorage.getItem('kifacil_silenciado') === '1';
let musicaFundo = null;

function volumeEfetivo() {
  return silenciado ? 0 : volumeSalvo;
}

function iniciarMusicaFundo() {
  if (musicaFundo) return;
  try {
    musicaFundo = new Audio('../sons/natureza.mp3');
    musicaFundo.loop = true;
    musicaFundo.volume = volumeEfetivo();
    musicaFundo.play().catch(function () {});
  } catch (e) {}
}

function atualizarIconeMudo() {
  const botao = document.getElementById('btn-mute');
  if (!botao) return;
  if (silenciado || volumeSalvo === 0) botao.textContent = '🔇';
  else if (volumeSalvo < 0.5) botao.textContent = '🔉';
  else botao.textContent = '🔊';
}

function alternarMudo() {
  silenciado = !silenciado;
  localStorage.setItem('kifacil_silenciado', silenciado ? '1' : '0');
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

function ajustarVolume(valorSlider) {
  volumeSalvo = Math.max(0, Math.min(1, valorSlider / 100));
  localStorage.setItem('kifacil_volume', volumeSalvo);
  if (volumeSalvo > 0 && silenciado) {
    silenciado = false;
    localStorage.setItem('kifacil_silenciado', '0');
  }
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

(function iniciarControleVolume() {
  const slider = document.getElementById('slider-volume');
  if (slider) slider.value = Math.round(volumeSalvo * 100);
  atualizarIconeMudo();
  iniciarMusicaFundo();

  const ativarSom = function () {
    if (!musicaFundo) iniciarMusicaFundo();
    if (musicaFundo) {
      musicaFundo.volume = volumeEfetivo();
      musicaFundo.play().catch(function () {});
    }
  };
  window.addEventListener('pointerdown', ativarSom, { once: true });
  window.addEventListener('keydown', ativarSom, { once: true });
})();
</script>
<script>
(function () {
  var _clickSom = new Audio('../sons/click.mp3');
  _clickSom.preload = 'auto';
  document.addEventListener('click', function (e) {
    var alvo = e.target.closest('button');
    if (alvo) { try { _clickSom.currentTime = 0; _clickSom.volume = (typeof volumeEfetivo === 'function' ? volumeEfetivo() : 0.35); _clickSom.play().catch(function () {}); } catch (err) {} }
  }, true);
})();
</script>
<div id="controle-volume">
  <button id="btn-mute" onclick="alternarMudo()" aria-label="Mute or unmute sound">🔊</button>
  <input type="range" id="slider-volume" min="0" max="100" value="35" oninput="ajustarVolume(this.value)" aria-label="Volume">
</div>
</body>
