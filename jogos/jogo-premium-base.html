<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Bases or Hydroxides — Premium Game | KiFácil</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --fundo: #fdf8f0;
      --fundo-card: #fffdf9;
      --escuro: #2e2016;
      --texto: #1a1208;
      --texto-suave: #3d2e1a;
      --dourado: #8a5e10;
      --dourado-claro: #c8920a;
      --borda: rgba(100,70,20,0.3);
      --borda-forte: rgba(100,70,20,0.5);
      --verde-escuro: #1e5238;
      --vermelho-escuro: #7a1515;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-nav {
      background: #1e1008;
      border-bottom: 2px solid var(--dourado-claro);
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #fff8ee;
      letter-spacing: 0.03em;
      margin-right: auto;
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 1rem;
      width: 100%;
    }
    .titulo-jogo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.7rem, 3.8vw, 2.5rem);
      font-weight: 600;
      margin-bottom: 0.3rem;
      line-height: 1.1;
    }
    .subtitulo {
      font-size: 1rem;
      color: var(--texto);
      margin-bottom: .9rem;
      max-width: 680px;
    }

    .narrador {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: .8rem;
      padding: .8rem 1.1rem;
      border: 1.5px solid var(--borda-forte);
      border-radius: 10px;
      background: rgba(30,16,8,0.05);
    }
    .narrador img {
      width: 68px;
      height: 84px;
      object-fit: cover;
      object-position: top center;
      border-radius: 10px;
      border: 1px solid rgba(200,146,10,.35);
      flex-shrink: 0;
    }
    .narrador-nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dourado-claro);
      margin-bottom: 0.3rem;
    }
    .narrador-texto {
      font-size: 1rem;
      line-height: 1.5;
      color: var(--texto-suave);
      min-height: 3.4em;
    }

    /* PALCO DE ANIMAÇÃO */
    .imagem-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(100%, 900px);
      max-height: 62vh;
      min-height: 380px;
      margin: 0 auto;
      cursor: default;
      border: 1.5px solid var(--borda-forte);
      border-radius: 6px;
      overflow: hidden;
      background: #f7efe2;
    }
    .cena-fundo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .overlay-animacao { position: absolute; inset: 0; }

    .link-aula {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: #fff8ee;
      background: rgba(30,16,8,0.72); border: 1.5px solid var(--dourado-claro, #c8920a);
      border-radius: 8px; padding: 0.4rem 0.65rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.02em; text-align: center; line-height: 1.2;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .link-aula:hover { background: rgba(30,16,8,0.92); transform: translateY(-1px); }
    .link-aula svg { width: 22px; height: 22px; }

    .frasco-rotulo { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 0.72rem; color: var(--texto-suave); margin-top: 2px; }

    /* Cartão simples de fórmula/íon */
    .cartao-formula-simples {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 8px; padding: 0.5rem 1rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.1rem; color: var(--texto);
    }
    .linha-cartas-simples { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap; padding: 6%; }

    /* Circuito / lâmpada */
    .circuito-visual {
      position: absolute; left: 50%; top: 38%; transform: translate(-50%, -50%); text-align: center; z-index: 3;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 14px 20px;
    }
    .ion-movendo { animation: moverIon 1.4s ease-in-out infinite alternate; }
    @keyframes moverIon { from { transform: translateX(-14px); } to { transform: translateX(14px); } }

    /* Recipientes / partículas */
    .linha-recipientes { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 12px; padding: 8% 4%; flex-wrap: wrap; }
    .coluna-recipiente {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px; padding: 8px; min-width: 118px;
    }
    .recipiente-titulo { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.92rem; color: var(--texto-suave); }
    .recipiente-particulas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; width: 90px; }
    .particula-molecula { width: 12px; height: 12px; border-radius: 50%; background: var(--texto-suave); opacity: 0.85; }
    .particula-molecula.particula-ionizada { background: var(--dourado-claro); box-shadow: 0 0 4px rgba(200,146,10,.7); }
    .recipiente-contador { font-family: 'Libre Baskerville', serif; font-size: 0.66rem; color: var(--texto); text-align: center; }

    /* Cálculo passo a passo */
    .painel-calculo { position: absolute; left: 50%; top: 8%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 3; max-width: 90%; }
    .linha-calculo {
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.15rem; color: var(--texto);
      background: var(--fundo-card); border: 1px solid var(--borda-forte); border-radius: 8px; padding: 4px 14px;
    }
    .linha-calculo-final { color: var(--dourado-claro); border-color: var(--dourado-claro); }

    /* Medidor de grau de dissociação */
    .medidor-ionizacao {
      position: absolute; left: 50%; bottom: 6%; transform: translateX(-50%); width: 82%; max-width: 400px; z-index: 3;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px; padding: 10px 14px;
    }
    .medidor-barra { position: relative; height: 16px; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--borda-forte); display: flex; }
    .zona-fraco { background: rgba(122,21,21,0.4); }
    .zona-moderado { background: rgba(200,146,10,0.4); }
    .zona-forte { background: rgba(30,82,56,0.4); }
    .medidor-marcador { position: absolute; top: -4px; width: 4px; height: 24px; background: #1e1008; border-radius: 2px; transform: translateX(-50%); transition: left .8s ease; }
    .medidor-legendas { display: flex; justify-content: space-between; font-family: 'Cormorant Garamond', serif; font-size: 0.7rem; color: var(--texto-suave); margin-top: 2px; }
    .medidor-classificacao { text-align: center; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.85rem; color: var(--dourado-claro); margin-top: 4px; }

    /* Cartões de dissociação (clique/toque, ordenar) */
    .linha-cartas-ionizacao { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap; padding: 6%; }
    .cartao-ionizacao {
      position: relative; background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px;
      padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; min-width: 116px;
      transition: border-color .2s;
    }
    .cartao-ionizacao:hover { border-color: var(--dourado-claro); }
    .cartao-selecionado { border-color: var(--dourado-claro); box-shadow: 0 0 8px rgba(200,146,10,.5); }
    .cartao-ionizacao-formula { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.15rem; color: var(--texto); }
    .cartao-ionizacao-ordem {
      position: absolute; top: -8px; right: -8px; background: #1e1008; color: var(--dourado-claro);
      border: 1.5px solid var(--dourado-claro); border-radius: 50%; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.85rem;
    }

    /* Classificação por categoria (solubilidade) */
    .jogo-associacao { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 30px; padding: 6%; flex-wrap: wrap; }
    .coluna-associacao { display: flex; flex-direction: column; gap: 8px; }
    .item-associacao {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 8px; padding: 0.5rem 1rem;
      font-family: 'Libre Baskerville', serif; font-size: 0.88rem; cursor: pointer; text-align: center; transition: border-color .2s;
    }
    .item-associacao:hover { border-color: var(--dourado-claro); }
    .item-selecionado { border-color: var(--dourado-claro); background: rgba(200,146,10,.12); }
    .associado { border-color: var(--verde-escuro); background: rgba(30,82,56,.12); cursor: default; opacity: 0.85; }
    .erro-flash { outline: 3px solid var(--vermelho-escuro); border-radius: 8px; }

    /* Blocos de nomenclatura */
    .formula-alvo {
      display: inline-block; background: var(--fundo); border: 1.5px solid var(--dourado-claro); border-radius: 6px;
      padding: 0.3rem 0.8rem; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.2rem;
      color: var(--dourado-claro); margin-bottom: 0.8rem;
    }
    .montagem-nome { display: flex; gap: 6px; flex-wrap: wrap; min-height: 34px; margin-bottom: 0.6rem; }
    .bloco-montado {
      background: rgba(30,82,56,.12); border: 1.5px solid var(--verde-escuro); border-radius: 6px; padding: 0.3rem 0.6rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; color: var(--verde-escuro);
    }
    .blocos-disponiveis { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip-bloco {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px; padding: 0.4rem 0.8rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.95rem; color: var(--texto); cursor: pointer;
    }
    .chip-bloco:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .chip-usado { opacity: 0.4; cursor: default; }

    .placa-dourada {
      position: absolute; bottom: 20px; left: 50%; transform: translate(-50%, 10px);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: clamp(0.95rem, 2.4vw, 1.2rem);
      padding: 0.65rem 1.3rem; border-radius: 8px; border: 1px solid #a97c1f;
      box-shadow: 0 3px 12px rgba(0,0,0,.3); text-align: center; max-width: 92%;
      opacity: 0; animation: placaIn .5s ease forwards; z-index: 6; pointer-events: none;
    }
    @keyframes placaIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* PAINEL DE INTERAÇÃO */
    #painelInteracao { max-width: 900px; margin: 1.2rem auto 0; }
    .interacao-painel {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.4rem 1.6rem 1.3rem;
    }
    .interacao-pergunta-texto {
      font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600;
      line-height: 1.35; margin-bottom: 1rem;
    }
    .opcoes-linha { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .btn-opcao {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px;
      padding: 0.55rem 1.1rem; font-family: 'Libre Baskerville', serif; font-size: 0.95rem;
      color: var(--texto); cursor: pointer; transition: border-color .2s, background .2s;
    }
    .btn-opcao:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .btn-opcao:disabled { cursor: default; opacity: 0.75; }
    .opcao-certa { border-color: var(--verde-escuro) !important; background: rgba(30,82,56,0.12); }
    .opcao-errada { border-color: var(--vermelho-escuro) !important; background: rgba(122,21,21,0.08); }

    .btn-continuar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 0.6rem 1.5rem;
      border-radius: 4px; cursor: pointer; transition: background 0.2s, color 0.2s, opacity .2s;
      display: block; margin: 0.2rem auto 0;
    }
    .btn-continuar:hover { background: var(--dourado-claro); color: #1e1008; }
    .btn-continuar:disabled { opacity: 0.4; cursor: default; }
    .btn-continuar:disabled:hover { background: #1e1008; color: var(--dourado-claro); }

    /* Botão continuar dentro do balão da professora */
    #continuarBalao { margin-top: 0.6rem; }
    #continuarBalao .btn-continuar { display: inline-block; margin: 0; }

    .modal-feedback {
      margin-top: 1rem; font-size: 0.86rem; line-height: 1.7;
      border-left: 3px solid var(--borda-forte); padding-left: 1rem; display: none;
    }
    .modal-feedback.visivel { display: block; }
    .feedback-certo   { color: var(--verde-escuro); font-weight: 700; }
    .feedback-errado  { color: var(--vermelho-escuro); font-weight: 700; }
    .feedback-explicacao { color: var(--texto); margin-top: 0.5rem; }

    .quadro-resumo-final {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.2rem 1.6rem; max-width: 88%; text-align: left;
    }
    .quadro-resumo-final .resumo-linha {
      font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--texto);
      padding: 0.45rem 0; border-bottom: 1px solid var(--borda);
    }
    .quadro-resumo-final .resumo-linha:last-child { border-bottom: none; }

    /* CONCLUSÃO */
    .conclusao {
      display: none; margin-top: 2rem; background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 2.4rem 2rem; text-align: center;
    }
    .conclusao.visivel { display: block; }
    .conclusao-titulo {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 600; margin-bottom: 0.8rem;
    }
    .conclusao-placar { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--dourado-claro); margin-bottom: 1rem; }
    .conclusao-mensagem { font-size: 0.93rem; color: var(--texto-suave); max-width: 460px; margin: 0 auto 2rem; line-height: 1.8; }
    .btn-reiniciar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.7rem 2rem; border-radius: 4px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-reiniciar:hover { background: var(--dourado-claro); color: #1e1008; }

    /* FOOTER */
    footer {
      background: var(--escuro); border-top: 2px solid var(--dourado-claro);
      padding: .6rem 2rem; text-align: center; font-size: 0.78rem; color: rgba(255,248,238,0.5);
    }

    @media (min-width: 641px) {
      .narrador { max-width: 900px; margin: 0 auto .8rem; }
      .narrador-texto { font-size: 1.05rem; }
    }

    @media (max-width: 640px) {
      .top-nav { padding: 0 1.2rem; gap: 1.2rem; }
      main { padding: .8rem 1rem 1rem; }
      .interacao-painel { padding: 1.2rem 1rem; }
      .placa-dourada { font-size: 0.82rem; padding: 0.5rem 0.85rem; }
      .coluna-recipiente { min-width: 92px; padding: 6px; }
      .recipiente-particulas { width: 70px; }
      .cartao-formula-simples { font-size: 0.95rem; padding: 0.4rem 0.8rem; }
      .jogo-associacao { gap: 14px; }
      .item-associacao { font-size: 0.78rem; padding: 0.4rem 0.7rem; }
      .medidor-ionizacao { width: 92%; }
      .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .link-aula svg { width: 18px; height: 18px; }
    }
  
    /* AUDIO CONTROL */
    #controle-volume {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(14,6,0,0.85);
      border: 1.5px solid var(--borda-forte);
      border-radius: 24px;
      padding: 8px 16px 8px 10px;
    }
    #btn-mute {
      background: none;
      border: none;
      color: var(--dourado-claro);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #slider-volume {
      width: 90px;
      accent-color: var(--dourado-claro);
      cursor: pointer;
    }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">KiFácil</div>
</nav>

<main>
  <h1 class="titulo-jogo">Bases or Hydroxides</h1>
  <p class="subtitulo">Discover what happens when a base is dissolved in water — before memorizing any definition.</p>

  <div class="narrador">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Teacher Rafaela" />
    <div style="flex: 1;">
      <div class="narrador-nome">Teacher Rafaela</div>
      <div class="narrador-texto" id="narradorTexto">Let's get started.</div>
      <div id="continuarBalao"></div>
    </div>
  </div>

  <div class="imagem-wrapper" id="imagemWrapper">
    <img src="../imagens/patio-dos-alcalis.jpg" alt="Alkali Courtyard" class="cena-fundo" />
    <div class="overlay-animacao" id="overlayAnimacao"></div>
</div>

  <div id="painelInteracao"></div>

  <div class="conclusao" id="conclusao">
    <div class="conclusao-titulo">Study Complete</div>
    <div class="conclusao-placar" id="conclusaoPlacar"></div>
    <p class="conclusao-mensagem" id="conclusaoMensagem"></p>
    <button class="btn-reiniciar" onclick="reiniciar()">Play Again</button>
  </div>
</main>

<footer>© 2026 KiFácil</footer>

<script>
/* ==========================================================
   DOM REFERENCES
   ========================================================== */
const overlay = document.getElementById('overlayAnimacao');
const painel  = document.getElementById('painelInteracao');
const continuarBalao = document.getElementById('continuarBalao');

function fala(texto) { document.getElementById('narradorTexto').textContent = texto; }

const _brilho = new Audio('../sons/brilho.MP3');
_brilho.preload = 'auto';
function tocarBrilho() { try { _brilho.currentTime = 0; _brilho.play().catch(() => {}); } catch (e) {} }

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

let timersAtivos = [];
function agendar(fn, ms) { const id = setTimeout(fn, ms); timersAtivos.push(id); return id; }
function limparTimers() { timersAtivos.forEach(clearTimeout); timersAtivos = []; }

/* ==========================================================
   DATA: FORMULAS AND NOMENCLATURE
   ========================================================== */
const FORMULAS_BASE = {
  NaOH: 'NaOH', KOH: 'KOH', NH4OH: 'NH₄OH',
  'Fe(OH)3': 'Fe(OH)₃', 'Fe(OH)2': 'Fe(OH)₂'
};
const NOMENCLATURA_BASE = {
  NaOH: ['SODIUM', 'HYDROXIDE'],
  KOH: ['POTASSIUM', 'HYDROXIDE'],
  'Fe(OH)3': ['FERR', 'IC', 'HYDROXIDE'],
  'Fe(OH)2': ['FERR', 'OUS', 'HYDROXIDE']
};

/* ==========================================================
   COMPONENT: ELECTRIC CIRCUIT / LIGHT BULB
   ========================================================== */
function criarCircuito(id) {
  const div = document.createElement('div');
  div.className = 'circuito-visual';
  div.id = id;

function definirIntensidadeLampada(id, intensidade) {
  const l = document.getElementById('lampada-' + id);
  if (!l) return;
  l.setAttribute('opacity', Math.max(0.15, Math.min(1, intensidade)));
  l.style.filter = intensidade > 0.5 ? 'drop-shadow(0 0 10px rgba(232,184,75,0.9))' : 'none';
}
function animarIonsCircuito(id) {
  const g = document.getElementById('ions-' + id);
  if (!g) return;
  for (let i = 0; i < 6; i++) {
    const ion = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    const positivo = i % 2 === 0;
    ion.setAttribute('r', '4');
    ion.setAttribute('fill', positivo ? '#c8920a' : '#7a1515');
    ion.setAttribute('cx', 80 + Math.random() * 40);
    ion.setAttribute('cy', 90 + Math.random() * 30);
    ion.setAttribute('class', 'ion-movendo');
    ion.style.animationDelay = (Math.random() * 1.2).toFixed(2) + 's';
    g.appendChild(ion);
  }
}

/* ==========================================================
   INTERACTION HELPERS
   ========================================================== */
function botaoContinuar(delayMs) {
  delayMs = delayMs || 0;
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', avancar);
  return btn;
}

function botaoContinuarLocal(handler, delayMs) {
  delayMs = delayMs || 0;
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', function () { btn.disabled = true; handler(); });
  return btn;
}

function escolhaBotoes(opts) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">' + opts.pergunta + '</div>' +
    '<div class="opcoes-linha" id="opcoesLinha"></div>' +
    '<div class="modal-feedback" id="feedbackEscolha"></div>';
  painel.appendChild(wrap);

  const opcoesLinha = wrap.querySelector('#opcoesLinha');
  const feedback = wrap.querySelector('#feedbackEscolha');
  let tentativas = 0;
  let resolvido = false;

  opts.opcoes.forEach(function (op) {
    const btn = document.createElement('button');
    btn.className = 'btn-opcao';
    btn.textContent = op.rotulo;
    btn.addEventListener('click', function () {
      if (resolvido) return;
      if (op.correta) {
        resolvido = true;
        tocarDing();
        Array.from(opcoesLinha.children).forEach(function (b) { b.disabled = true; });
        btn.classList.add('opcao-certa');
        feedback.className = 'modal-feedback visivel';
        feedback.innerHTML = '<span class="feedback-certo">Correct!</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
        opts.aoAcertar();
      } else {
        tentativas++;
        btn.classList.add('opcao-errada');
        if (tentativas === 1 && opts.dica) {
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-errado">' + opts.dica + '</span>';
        } else if (tentativas >= 2) {
          resolvido = true;
          Array.from(opcoesLinha.children).forEach(function (b, i) {
            b.disabled = true;
            if (opts.opcoes[i].correta) b.classList.add('opcao-certa');
          });
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-resposta">The correct answer is highlighted.</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
          opts.aoAcertar();
        }
      }
    });
    opcoesLinha.appendChild(btn);
  });
}

/* ==========================================================
   CATEGORY CLASSIFICATION (base → solubility)
   ========================================================== */
function criarClassificacaoPorCategoria(itens, categorias, mensagemErro, mensagemSucesso) {
  const container = document.createElement('div');
  container.className = 'jogo-associacao';
  overlay.appendChild(container);

  const colCategorias = document.createElement('div'); colCategorias.className = 'coluna-associacao';
  const colItens = document.createElement('div'); colItens.className = 'coluna-associacao';
  container.appendChild(colCategorias); container.appendChild(colItens);

  const itensEmbaralhados = itens.slice().sort(function () { return Math.random() - 0.5; });

  let categoriaAtiva = null, acertos = 0;
  const elCategorias = {};

  categorias.forEach(function (cat) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = cat;
    colCategorias.appendChild(el);
    elCategorias[cat] = el;
    el.addEventListener('click', function () {
      Object.keys(elCategorias).forEach(function (k) { elCategorias[k].classList.remove('item-selecionado'); });
      el.classList.add('item-selecionado');
      categoriaAtiva = cat;
    });
  });

  itensEmbaralhados.forEach(function (it) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = it.rotulo;
    colItens.appendChild(el);
    el.addEventListener('click', function () {
      if (el.classList.contains('associado')) return;
      if (!categoriaAtiva) {
        fala('First choose a category on the left.');
        return;
      }
      if (it.categoria === categoriaAtiva) {
        el.classList.add('associado');
        tocarDing();
        acertos++;
        if (acertos === itens.length) {
          agendar(function () { fala(mensagemSucesso); botaoContinuar(400); }, 300);
        }
      } else {
        fala(mensagemErro);
        el.classList.add('erro-flash');
        setTimeout(function () { el.classList.remove('erro-flash'); }, 500);
      }
    });
  });
}

/* ==========================================================

function montarNomePorBlocosBase(chave, aoConcluir) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">Build the name by clicking the blocks, in the correct order.</div>' +
    '<div class="formula-alvo">' + FORMULAS_BASE[chave] + '</div>' +
    '<div class="montagem-nome" id="montagemNome"></div>' +
    '<div class="blocos-disponiveis" id="blocosDisponiveis"></div>' +
    '<div class="modal-feedback" id="fbNomenclatura"></div>';
  painel.appendChild(wrap);

  const sequenciaCorreta = NOMENCLATURA_BASE[chave];
  const montagemEl = wrap.querySelector('#montagemNome');
  const blocosEl = wrap.querySelector('#blocosDisponiveis');
  const fb = wrap.querySelector('#fbNomenclatura');
  let progresso = 0;

  const blocosEmbaralhados = sequenciaCorreta.slice().sort(function () { return Math.random() - 0.5; });
  blocosEmbaralhados.forEach(function (bloco) {
    const chip = document.createElement('button');
    chip.className = 'chip-bloco';
    chip.type = 'button';
    chip.textContent = bloco;
    chip.addEventListener('click', function () {
      if (chip.disabled) return;
      if (bloco === sequenciaCorreta[progresso]) {
        tocarDing();
        chip.disabled = true;
        chip.classList.add('chip-usado');
        const tag = document.createElement('span');
        tag.className = 'bloco-montado';
        tag.textContent = bloco;
        montagemEl.appendChild(tag);
        progresso++;
        if (progresso === sequenciaCorreta.length) {
          fb.className = 'modal-feedback visivel';
          fb.innerHTML = '<span class="feedback-certo">Correct!</span><p class="feedback-explicacao">' + FORMULAS_BASE[chave] + ' → ' + sequenciaCorreta.join(' ').toLowerCase() + '</p>';
          Array.from(blocosEl.children).forEach(function (b) { b.disabled = true; });
          aoConcluir();
        }
      } else {
        chip.classList.add('erro-flash');
        setTimeout(function () { chip.classList.remove('erro-flash'); }, 500);
        fb.className = 'modal-feedback visivel';
        fb.innerHTML = '<span class="feedback-errado">Look at the element and the oxidation number shown.</span>';
      }
    });
    blocosEl.appendChild(chip);
  });
}

/* ==========================================================
   INTRODUCTION
   ========================================================== */
function passoIntro() {
  fala('In the last stage, we saw that acids produce H₃O⁺. Now let\'s discover how bases behave.');

  const wrap = document.createElement('div');

}

/* ==========================================================
   STAGE 1 — DISSOCIATION
   ========================================================== */
function passoDissociacao() {
  fala('Let\'s dissolve sodium hydroxide (NaOH) in water.');
  const naoh = document.createElement('div');
  naoh.className = 'cartao-formula-simples';
  naoh.style.position = 'absolute'; naoh.style.left = '50%'; naoh.style.top = '50%'; naoh.style.transform = 'translate(-50%,-50%)';
  naoh.textContent = 'NaOH (solid)';
  overlay.appendChild(naoh);

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'DISSOLVE IN WATER';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    naoh.remove();
    const linha = document.createElement('div');
    linha.className = 'linha-cartas-simples';
    ['Na⁺', 'OH⁻'].forEach(function (t) {
      const c = document.createElement('div');
      c.className = 'cartao-formula-simples';
      c.textContent = t;
      linha.appendChild(c);
    });
    overlay.appendChild(linha);
    const placa = document.createElement('div');
    placa.className = 'placa-dourada';
    placa.textContent = 'NaOH → Na⁺ + OH⁻ (dissociation)';
    overlay.appendChild(placa);
    fala('Bases undergo DISSOCIATION — the Na⁺ and OH⁻ ions already existed ready-made inside the solid; they were simply separated by the water. This is different from the ionization of acids, in which the ions are formed on the spot.');
    painel.innerHTML = '';
    botaoContinuar(600);
  });
}

/* ==========================================================
   STAGE 2 — ELECTRICAL CONDUCTION
   ========================================================== */
function passoConducao() {
  fala('Let\'s test whether pure water conducts electric current.');
  const circuito = criarCircuito('circ-base');
  overlay.appendChild(circuito);

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML = '<div class="interacao-pergunta-texto">Test the pure water.</div>';
  const btnTestar = document.createElement('button');
  btnTestar.className = 'btn-continuar';
  btnTestar.textContent = 'TEST';
  wrap.appendChild(btnTestar);
  painel.appendChild(wrap);

  btnTestar.addEventListener('click', function () {
    btnTestar.disabled = true;
    definirIntensidadeLampada('circ-base', 0.1);
    fala('The bulb barely lights up: pure water has very few ions.');
    botaoContinuarLocal(passoConducaoB, 700);
  });
}
function passoConducaoB() {
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML = '<div class="interacao-pergunta-texto">Now add the NaOH.</div>';
  const btnAdd = document.createElement('button');
  btnAdd.className = 'btn-continuar';
  btnAdd.textContent = 'Add NaOH';
  wrap.appendChild(btnAdd);
  painel.innerHTML = '';
  painel.appendChild(wrap);

  btnAdd.addEventListener('click', function () {

    const placa = document.createElement('div');
    placa.className = 'placa-dourada';
    placa.textContent = 'NaOH → Na⁺ + OH⁻';
    overlay.appendChild(placa);

/* ==========================================================
   STAGE 3 — DEGREE OF DISSOCIATION (α)
   ========================================================== */
function passoGrauDissociacao() {
  fala('Let\'s observe three different bases dissolving in water.');
  const dados = [
    { id: 'A', nome: 'Base A', dissociadas: 3 },
    { id: 'B', nome: 'Base B', dissociadas: 10 },
    { id: 'C', nome: 'Base C', dissociadas: 18 }
  ];
  const linha = document.createElement('div');
  linha.className = 'linha-recipientes';
  overlay.appendChild(linha);

  dados.forEach(function (d) {
    const col = document.createElement('div');
    col.className = 'coluna-recipiente';
    col.innerHTML =
      '<div class="recipiente-titulo">' + d.nome + '</div>' +
      '<div class="recipiente-particulas" id="part-' + d.id + '"></div>' +
      '<div class="recipiente-contador" id="cont-' + d.id + '">Units dissolved: 20<br>Units dissociated: 0</div>';
    linha.appendChild(col);
    const partContainer = col.querySelector('#part-' + d.id);
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particula-molecula';
      partContainer.appendChild(p);
    }
  });

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML = '<div class="interacao-pergunta-texto">Observe the dissociation in each container.</div>';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'OBSERVE THE DISSOCIATION';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    dados.forEach(function (d) {
      const partContainer = document.getElementById('part-' + d.id);
      const particulas = Array.from(partContainer.children).sort(function () { return Math.random() - 0.5; });
      for (let i = 0; i < d.dissociadas; i++) particulas[i].classList.add('particula-ionizada');
      document.getElementById('cont-' + d.id).innerHTML = 'Units dissolved: 20<br>Units dissociated: ' + d.dissociadas;
    });
    escolhaBotoes({
      pergunta: 'In which solution did the greatest dissociation occur?',
      opcoes: [
        { rotulo: 'Base A', correta: false },
        { rotulo: 'Base B', correta: false },
        { rotulo: 'Base C', correta: true }
      ],
      dica: 'Count how many units actually dissociated in each container.',
      explicacao: 'Base C had almost all of its units dissociated — the highest degree of dissociation (α = units dissociated ÷ units dissolved).',
      aoAcertar: function () {
        agendar(function () {
          const medidor = criarMedidorDissociacao('med-diss');
          overlay.appendChild(medidor);
          const painelCalculo = document.createElement('div');
          painelCalculo.className = 'painel-calculo';
          painelCalculo.innerHTML = '<div class="linha-calculo">α = 18 ÷ 20</div><div class="linha-calculo linha-calculo-final">α = 90% — strong base</div>';
          overlay.insertBefore(painelCalculo, linha);
          atualizarMedidorDissociacao('med-diss', 90);
          fala('The higher the proportion of dissociated units, the higher the degree of dissociation. Since 90% is greater than 50%, Base C is strong. Not every base has the same degree of dissociation!');
          painel.innerHTML = '';
          botaoContinuar(600);
        }, 300);
      }
    });
  });
}

/* ==========================================================
   STAGE 4 — SOLUBILITY
   ========================================================== */
function passoSolubilidade() {
  fala('Match each base to its solubility in water.');
  criarClassificacaoPorCategoria([
    { rotulo: 'NaOH', categoria: 'Highly soluble' },
    { rotulo: 'KOH', categoria: 'Highly soluble' },
    { rotulo: 'NH₄OH', categoria: 'Highly soluble' },
    { rotulo: 'Ca(OH)₂', categoria: 'Slightly soluble' },
    { rotulo: 'Fe(OH)₃', categoria: 'Practically insoluble' },
    { rotulo: 'Al(OH)₃', categoria: 'Practically insoluble' }
  ], ['Highly soluble', 'Slightly soluble', 'Practically insoluble'],
  'Remember: hydroxides of alkali metals and ammonium hydroxide are highly soluble; those of alkaline earth metals are slightly soluble; the rest are practically insoluble.',
  'Well done! Not all bases have the same solubility.');
}

/* ==========================================================
   STAGE 5 — NOMENCLATURE
   ========================================================== */
function passoNomenclatura() {
  fala('Now let\'s name the bases. When the element forms only one base, the name is "[element] + hydroxide."');
  montarNomePorBlocosBase('NaOH', function () {
    agendar(function () { botaoContinuar(400); }, 300);
  });
}
function passoNomenclaturaKOH() {
  montarNomePorBlocosBase('KOH', function () {
    agendar(function () { botaoContinuar(400); }, 300);
  });
}
function passoNomenclaturaFerro() {
  fala('Iron forms two different bases. When this happens, we use -IC for the higher oxidation state and -OUS for the lower one. Build the name of Fe(OH)₃ first.');
  montarNomePorBlocosBase('Fe(OH)3', function () {
    agendar(function () { botaoContinuarLocal(passoNomenclaturaFerroso, 400); }, 300);
  });
}
function passoNomenclaturaFerroso() {
  fala('Now build the name of Fe(OH)₂ — iron with the lower oxidation state.');
  montarNomePorBlocosBase('Fe(OH)2', function () {
    agendar(function () { botaoContinuar(400); }, 300);
  });
}

/* ==========================================================
   FINAL
   ========================================================== */
function passoFinal() {
  fala('Excellent. Now you understand how bases behave in aqueous solution.');
  function linha(txt) { return '<div class="resumo-linha">' + txt + '</div>'; }
  overlay.innerHTML =
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:12px;">' +
    '<div class="quadro-resumo-final">' +
    linha('Bases dissociate in water, releasing OH⁻.') +
    linha('The ions produced conduct electric current.') +
    linha('Different bases have different degrees of dissociation (α).') +
    linha('Bases have different solubilities in water.') +
    linha('Each base follows its own nomenclature rules.') +
    '</div></div>';
  painel.innerHTML = '';
  const conclusao = document.getElementById('conclusao');
  document.getElementById('conclusaoPlacar').textContent = 'Stage Complete';
  document.getElementById('conclusaoMensagem').textContent = 'You investigated bases: how they dissociate, how they conduct electric current, what degree of dissociation is, solubility, and how to name hydroxides.';
  conclusao.classList.add('visivel');
  conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ==========================================================
   STAGE ENGINE
   ========================================================== */
const PASSOS = [
  passoIntro, passoDissociacao, passoConducao, passoGrauDissociacao, passoSolubilidade,
  passoNomenclatura, passoNomenclaturaKOH, passoNomenclaturaFerro,
  passoFinal
];
let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  PASSOS[i]();
}
function avancar() { if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1); }
function reiniciar() {
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* ── INIT ── */
irPara(0);

<script>
let volumeSalvo = parseFloat(localStorage.getItem('kifacil_volume'));
if (isNaN(volumeSalvo)) volumeSalvo = 0.35;
let silenciado = localStorage.getItem('kifacil_silenciado') === '1';
let musicaFundo = null;

function volumeEfetivo() {
  return silenciado ? 0 : volumeSalvo;
}

function iniciarMusicaFundo() {
  if (musicaFundo) return;
  try {
    musicaFundo = new Audio('../sons/natureza.mp3');
    musicaFundo.loop = true;
    musicaFundo.volume = volumeEfetivo();
    musicaFundo.play().catch(function () {});
  } catch (e) {}
}

function atualizarIconeMudo() {
  const botao = document.getElementById('btn-mute');
  if (!botao) return;
  if (silenciado || volumeSalvo === 0) botao.textContent = '🔇';
  else if (volumeSalvo < 0.5) botao.textContent = '🔉';
  else botao.textContent = '🔊';
}

function alternarMudo() {
  silenciado = !silenciado;
  localStorage.setItem('kifacil_silenciado', silenciado ? '1' : '0');
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

function ajustarVolume(valorSlider) {
  volumeSalvo = Math.max(0, Math.min(1, valorSlider / 100));
  localStorage.setItem('kifacil_volume', volumeSalvo);
  if (volumeSalvo > 0 && silenciado) {
    silenciado = false;
    localStorage.setItem('kifacil_silenciado', '0');
  }
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

(function iniciarControleVolume() {
  const slider = document.getElementById('slider-volume');
  if (slider) slider.value = Math.round(volumeSalvo * 100);
  atualizarIconeMudo();
  iniciarMusicaFundo();

  const ativarSom = function () {
    if (!musicaFundo) iniciarMusicaFundo();
    if (musicaFundo) {
      musicaFundo.volume = volumeEfetivo();
      musicaFundo.play().catch(function () {});
    }
  };
  window.addEventListener('pointerdown', ativarSom, { once: true });
  window.addEventListener('keydown', ativarSom, { once: true });
})();
</script>
<script>
(function () {
  var _clickSom = new Audio('../sons/click.mp3');
  _clickSom.preload = 'auto';
  document.addEventListener('click', function (e) {
    var alvo = e.target.closest('button');
    if (alvo) { try { _clickSom.currentTime = 0; _clickSom.volume = (typeof volumeEfetivo === 'function' ? volumeEfetivo() : 0.35); _clickSom.play().catch(function () {}); } catch (err) {} }
  }, true);
})();
</script>
<div id="controle-volume">
  <button id="btn-mute" onclick="alternarMudo()" aria-label="Mute or unmute sound">🔊</button>
  <input type="range" id="slider-volume" min="0" max="100" value="35" oninput="ajustarVolume(this.value)" aria-label="Volume">
</div>
</body>
</html>
