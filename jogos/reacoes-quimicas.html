<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Reações Químicas — Jogo Premium | KiFácil</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --fundo: #fdf8f0;
      --fundo-card: #fffdf9;
      --escuro: #2e2016;
      --texto: #1a1208;
      --texto-suave: #3d2e1a;
      --dourado: #8a5e10;
      --dourado-claro: #c8920a;
      --borda: rgba(100,70,20,0.3);
      --borda-forte: rgba(100,70,20,0.5);
      --verde-escuro: #1e5238;
      --vermelho-escuro: #7a1515;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-nav {
      background: #1e1008;
      border-bottom: 2px solid var(--dourado-claro);
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #fff8ee;
      letter-spacing: 0.03em;
      margin-right: auto;
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 2.5rem;
      width: 100%;
    }
    .titulo-jogo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      margin-bottom: 0.4rem;
      line-height: 1.1;
    }
    .subtitulo {
      font-size: 1.1rem;
      color: var(--texto);
      margin-bottom: 2.5rem;
      max-width: 680px;
    }

    .narrador {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.4rem;
      padding: 1rem 1.1rem;
      border: 1.5px solid var(--borda-forte);
      border-radius: 10px;
      background: rgba(30,16,8,0.05);
    }
    .narrador img {
      width: 78px;
      height: 96px;
      object-fit: cover;
      object-position: top center;
      border-radius: 10px;
      border: 1px solid rgba(200,146,10,.35);
      flex-shrink: 0;
    }
    .narrador-nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dourado-claro);
      margin-bottom: 0.4rem;
    }
    .narrador-texto {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--texto-suave);
    }

    /* PALCO DE ANIMAÇÃO */
    .imagem-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(100%, 900px);
      max-height: 70vh;
      min-height: 460px;
      margin: 0 auto;
      cursor: default;
      border: 1.5px solid var(--borda-forte);
      border-radius: 6px;
      overflow: hidden;
      background: #f7efe2;
    }
    .cena-fundo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .overlay-animacao { position: absolute; inset: 0; }

    .link-aula {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: #fff8ee;
      background: rgba(30,16,8,0.72); border: 1.5px solid var(--dourado-claro, #c8920a);
      border-radius: 8px; padding: 0.4rem 0.65rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.02em; text-align: center; line-height: 1.2;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .link-aula:hover { background: rgba(30,16,8,0.92); transform: translateY(-1px); }
    .link-aula svg { width: 22px; height: 22px; }

    .bancada-img {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 70%; max-width: 480px; z-index: 1; pointer-events: none; opacity: 0.9;
    }
    .tubo-icone { position: absolute; width: 46px; z-index: 2; pointer-events: none; opacity: 0.9; }

    /* Moléculas (SVG) */
    .molecula-visual { position: absolute; z-index: 4; transform: translate(-50%, -50%); }
    .molecula-visual svg { display: block; pointer-events: none; }
    .peca-tray { cursor: grab; }
    .peca-tray.arrastando { cursor: grabbing; }
    .destaque-dourado { filter: drop-shadow(0 0 8px rgba(200,146,10,0.9)); }
    .erro-flash { outline: 3px solid var(--vermelho-escuro); border-radius: 8px; }

    .sinal-mais {
      position: absolute; font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: 1.7rem; color: var(--texto-suave); transform: translate(-50%, -50%); z-index: 3;
      pointer-events: none;
    }

    /* Zonas de equação */
    .zona-equacao {
      position: absolute; width: 100px; height: 76px;
      border: 2px dashed var(--borda-forte); border-radius: 10px;
      background: rgba(255,255,255,0.35); transform: translate(-50%, -50%); z-index: 2;
    }
    .zona-preenchida { border-style: solid; border-color: var(--dourado-claro); box-shadow: 0 0 8px rgba(200,146,10,0.5); }

    /* Regiões clicáveis */
    .regiao-clicavel { position: absolute; cursor: pointer; z-index: 3; border-radius: 8px; }
    .regiao-clicavel:hover { background: rgba(200,146,10,0.1); }

    /* Estados físicos */
    .exemplo-estado {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: var(--fundo-card); border: 1px solid var(--borda-forte); border-radius: 8px;
      padding: 6px 8px; min-width: 100px;
    }
    .exemplo-estado-nome { font-family: 'Libre Baskerville', serif; font-size: 0.66rem; color: var(--texto-suave); text-align: center; }
    .exemplo-estado-slot {
      width: 44px; height: 30px; border: 2px dashed var(--borda-forte); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; color: var(--texto-suave);
    }
    .exemplo-estado-slot.preenchido { border-style: solid; border-color: var(--dourado-claro); color: var(--dourado-claro); }
    .pill-estado {
      position: relative; background: #1e1008; color: var(--dourado-claro);
      border: 1.5px solid var(--dourado-claro); border-radius: 14px; padding: 0.3rem 0.8rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; cursor: grab; z-index: 6;
    }
    .condicao-tag {
      position: absolute; transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.7rem;
      padding: 0.25rem 0.5rem; border-radius: 6px; border: 1px solid #a97c1f;
      opacity: 0; animation: placaIn .4s ease forwards; z-index: 5;
    }

    .placa-dourada {
      position: absolute; bottom: 12px; left: 50%; transform: translate(-50%, 10px);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: clamp(0.82rem, 2.1vw, 1.02rem);
      padding: 0.5rem 1.1rem; border-radius: 8px; border: 1px solid #a97c1f;
      box-shadow: 0 3px 10px rgba(0,0,0,.25); text-align: center; max-width: 90%;
      opacity: 0; animation: placaIn .5s ease forwards; z-index: 6; pointer-events: none;
    }
    @keyframes placaIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* PAINEL DE INTERAÇÃO */
    #painelInteracao { max-width: 900px; margin: 1.2rem auto 0; }
    .interacao-painel {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.4rem 1.6rem 1.3rem;
    }
    .interacao-pergunta-texto {
      font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600;
      line-height: 1.35; margin-bottom: 1rem;
    }
    .btn-continuar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 0.6rem 1.6rem;
      border-radius: 4px; cursor: pointer; transition: background 0.2s, color 0.2s, opacity .2s;
      display: block; margin: 0.2rem auto 0;
    }
    .btn-continuar:hover { background: var(--dourado-claro); color: #1e1008; }
    .btn-continuar:disabled { opacity: 0.4; cursor: default; }
    .btn-continuar:disabled:hover { background: #1e1008; color: var(--dourado-claro); }

    /* Botão continuar dentro do balão da professora */
    #continuarBalao { margin-top: 0.6rem; }
    #continuarBalao .btn-continuar { display: inline-block; margin: 0; }

    .modal-feedback {
      margin-top: 1rem; font-size: 0.88rem; line-height: 1.7;
      border-left: 3px solid var(--borda-forte); padding-left: 1rem; display: none;
    }
    .modal-feedback.visivel { display: block; }
    .feedback-certo   { color: var(--verde-escuro); font-weight: 700; }
    .feedback-errado  { color: var(--vermelho-escuro); font-weight: 700; }
    .feedback-explicacao { color: var(--texto); margin-top: 0.5rem; }

    .quadro-item {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px;
      padding: 0.8rem 1.3rem; min-width: 200px; text-align: center;
    }
    .quadro-item .valor { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: var(--texto); }

    /* CONCLUSÃO */
    .conclusao {
      display: none; margin-top: 3rem; background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 3rem 2rem; text-align: center;
    }
    .conclusao.visivel { display: block; }
    .conclusao-titulo {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 600; margin-bottom: 0.8rem;
    }
    .conclusao-placar { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--dourado-claro); margin-bottom: 1rem; }
    .conclusao-mensagem { font-size: 0.93rem; color: var(--texto-suave); max-width: 460px; margin: 0 auto 2rem; line-height: 1.8; }
    .btn-reiniciar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.7rem 2rem; border-radius: 4px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-reiniciar:hover { background: var(--dourado-claro); color: #1e1008; }

    /* FOOTER */
    footer {
      background: var(--escuro); border-top: 2px solid var(--dourado-claro);
      padding: 1.2rem 2rem; text-align: center; font-size: 0.82rem; color: rgba(255,248,238,0.5);
    }

    @media (min-width: 641px) {
      .narrador { max-width: 900px; margin: 0 auto 1.2rem; }
      .narrador-texto { font-size: 1.08rem; }
    }

    @media (max-width: 640px) {
      .top-nav { padding: 0 1.2rem; gap: 1.2rem; }
      main { padding: 2rem 1rem 4rem; }
      .interacao-painel { padding: 1.2rem 1rem; }
      .placa-dourada { font-size: 0.74rem; padding: 0.42rem 0.75rem; }
      .zona-equacao { width: 70px; height: 56px; }
      .exemplo-estado { min-width: 78px; padding: 4px 6px; }
      .exemplo-estado-nome { font-size: 0.56rem; }
      .bancada-img { width: 90%; }
      .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .link-aula svg { width: 18px; height: 18px; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">KiFácil</div>
</nav>

<main>
  <h1 class="titulo-jogo">Reações Químicas</h1>
  <p class="subtitulo">Descubra que uma reação química é apenas um rearranjo de átomos — e a equação química é só uma forma de representá-lo.</p>

  <div class="narrador">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Professora Rafaela" />
    <div style="flex: 1;">
      <div class="narrador-nome">Professora Rafaela</div>
      <div class="narrador-texto" id="narradorTexto">Vamos começar.</div>
      <div id="continuarBalao"></div>
    </div>
  </div>

  <div class="imagem-wrapper" id="imagemWrapper">
    <img src="../imagens/laboratorio-reacoes.jpg" alt="Laboratório de reações químicas" class="cena-fundo" />
    <div class="overlay-animacao" id="overlayAnimacao"></div>
</div>

  <div id="painelInteracao"></div>

  <div class="conclusao" id="conclusao">
    <div class="conclusao-titulo">Estudo concluído</div>
    <div class="conclusao-placar" id="conclusaoPlacar"></div>
    <p class="conclusao-mensagem" id="conclusaoMensagem"></p>
    <button class="btn-reiniciar" onclick="reiniciar()">Jogar novamente</button>
  </div>
</main>

<footer>© 2026 KiFácil</footer>

<script>
/* ==========================================================
   REFERÊNCIAS DOM
   ========================================================== */
const overlay = document.getElementById('overlayAnimacao');
const painel  = document.getElementById('painelInteracao');
const continuarBalao = document.getElementById('continuarBalao');

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

function fala(texto) { document.getElementById('narradorTexto').textContent = texto; }

let timersAtivos = [];
function agendar(fn, ms) { const id = setTimeout(fn, ms); timersAtivos.push(id); return id; }
function limparTimers() { timersAtivos.forEach(clearTimeout); timersAtivos = []; }

/* ==========================================================
   COMPONENTE: MOLÉCULA (SVG, nenhuma imagem de molécula usada)
   ========================================================== */
const MOLECULAS_DEF = {
  C:   { atomos: [{ simbolo: 'C', cor: 'var(--escuro)', x: 30, y: 30, r: 18 }], ligacoes: [], largura: 60, altura: 60 },
  O2:  { atomos: [{ simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 26, y: 32, r: 15 }, { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 68, y: 32, r: 15 }], ligacoes: [[0, 1]], largura: 94, altura: 64 },
  CO2: { atomos: [{ simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 18, y: 32, r: 14 }, { simbolo: 'C', cor: 'var(--escuro)', x: 56, y: 32, r: 16 }, { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 94, y: 32, r: 14 }], ligacoes: [[0, 1], [1, 2]], largura: 112, altura: 64 },
  H2:  { atomos: [{ simbolo: 'H', cor: 'var(--dourado-claro)', x: 24, y: 28, r: 12 }, { simbolo: 'H', cor: 'var(--dourado-claro)', x: 60, y: 28, r: 12 }], ligacoes: [[0, 1]], largura: 84, altura: 56 },
  Cl2: { atomos: [{ simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 28, y: 30, r: 16 }, { simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 72, y: 30, r: 16 }], ligacoes: [[0, 1]], largura: 100, altura: 60 },
  HCl: { atomos: [{ simbolo: 'H', cor: 'var(--dourado-claro)', x: 22, y: 28, r: 11 }, { simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 60, y: 28, r: 15 }], ligacoes: [[0, 1]], largura: 84, altura: 56 },
  Na:  { atomos: [{ simbolo: 'Na', cor: 'var(--dourado-claro)', x: 28, y: 28, r: 17 }], ligacoes: [], largura: 56, altura: 56 },
  NaCl:{ atomos: [{ simbolo: 'Na', cor: 'var(--dourado-claro)', x: 24, y: 30, r: 14 }, { simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 64, y: 30, r: 16 }], ligacoes: [[0, 1]], largura: 92, altura: 60 },
  Fe:  { atomos: [{ simbolo: 'Fe', cor: 'var(--texto-suave)', x: 28, y: 28, r: 17 }], ligacoes: [], largura: 56, altura: 56 },
  Fe2O3: {
    atomos: [
      { simbolo: 'Fe', cor: 'var(--texto-suave)', x: 20, y: 22, r: 13 },
      { simbolo: 'Fe', cor: 'var(--texto-suave)', x: 20, y: 56, r: 13 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 56, y: 12, r: 11 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 56, y: 39, r: 11 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 56, y: 66, r: 11 }
    ],
    ligacoes: [[0, 2], [0, 3], [1, 3], [1, 4]], largura: 82, altura: 82
  },
  CaCO3: {
    atomos: [
      { simbolo: 'Ca', cor: 'var(--dourado-claro)', x: 18, y: 40, r: 15 },
      { simbolo: 'C', cor: 'var(--escuro)', x: 54, y: 40, r: 13 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 54, y: 12, r: 10 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 30, y: 62, r: 10 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 78, y: 62, r: 10 }
    ],
    ligacoes: [[1, 2], [1, 3], [1, 4]], largura: 98, altura: 76
  },
  CaO: { atomos: [{ simbolo: 'Ca', cor: 'var(--dourado-claro)', x: 24, y: 30, r: 15 }, { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 64, y: 30, r: 13 }], ligacoes: [[0, 1]], largura: 90, altura: 60 },
  H2O: { atomos: [{ simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 46, y: 20, r: 14 }, { simbolo: 'H', cor: 'var(--dourado-claro)', x: 20, y: 46, r: 10 }, { simbolo: 'H', cor: 'var(--dourado-claro)', x: 72, y: 46, r: 10 }], ligacoes: [[0, 1], [0, 2]], largura: 92, altura: 64 }
};

function criarMolecula(idUnico, chave, left, top) {
  const def = MOLECULAS_DEF[chave];
  let svg = '<svg viewBox="0 0 ' + def.largura + ' ' + def.altura + '" width="' + def.largura + '" height="' + def.altura + '">';
  def.ligacoes.forEach(function (par) {
    const a = def.atomos[par[0]], b = def.atomos[par[1]];
    svg += '<line x1="' + a.x + '" y1="' + a.y + '" x2="' + b.x + '" y2="' + b.y + '" stroke="#3d2e1a" stroke-width="2.5"/>';
  });
  def.atomos.forEach(function (a) {
    svg += '<circle cx="' + a.x + '" cy="' + a.y + '" r="' + a.r + '" fill="' + a.cor + '"/>';
    svg += '<text x="' + a.x + '" y="' + (a.y + a.r * 0.34) + '" font-size="' + (a.r * 0.68) + '" text-anchor="middle" fill="#fff8ee" font-family="Cormorant Garamond, serif" font-weight="700">' + a.simbolo + '</text>';
  });
  svg += '</svg>';
  const div = document.createElement('div');
  div.className = 'molecula-visual';
  div.id = 'mol-' + idUnico;
  div.style.left = left;
  div.style.top = top;
  div.dataset.chave = chave;
  div.innerHTML = svg;
  return div;
}

/* ==========================================================
   COMPONENTES: SETA, ZONA VAZIA, SINAL DE MAIS, REGIÃO CLICÁVEL
   ========================================================== */
function criarSeta(left, top) {
  const div = document.createElement('div');
  div.className = 'molecula-visual';
  div.style.left = left;
  div.style.top = top;
  div.innerHTML = '<svg viewBox="0 0 80 24" width="80" height="24">' +
    '<line x1="4" y1="12" x2="66" y2="12" stroke="#c8920a" stroke-width="3"/>' +
    '<polygon points="66,4 80,12 66,20" fill="#c8920a"/></svg>';
  return div;
}
function criarZonaVazia(left, top, id) {
  const z = document.createElement('div');
  z.className = 'zona-equacao';
  z.id = id;
  z.style.left = left;
  z.style.top = top;
  return z;
}
function criarSinalMais(left, top) {
  const m = document.createElement('div');
  m.className = 'sinal-mais';
  m.textContent = '+';
  m.style.left = left;
  m.style.top = top;
  return m;
}
function criarRegiaoClicavel(left, top, largura, altura) {
  const r = document.createElement('div');
  r.className = 'regiao-clicavel';
  r.style.left = left; r.style.top = top;
  r.style.width = largura; r.style.height = altura;
  return r;
}
function adicionarBancada() {
  const img = document.createElement('img');
  img.src = '../imagens/bancada-reacoes.png';
  img.className = 'bancada-img';
  img.alt = 'Bancada de reação';
  overlay.appendChild(img);
}

/* ==========================================================
   ARRASTO LIVRE XY
   ========================================================== */
function tornarArrastavelXY(el, container, onSoltar) {
  let arrastando = false, offsetX = 0, offsetY = 0;
  el.style.touchAction = 'none';
  el.addEventListener('pointerdown', function (e) {
    arrastando = true;
    el.setPointerCapture(e.pointerId);
    el.classList.add('arrastando');
    const r = container.getBoundingClientRect();
    const elRect = el.getBoundingClientRect();
    offsetX = e.clientX - elRect.left;
    offsetY = e.clientY - elRect.top;
    const left = elRect.left - r.left;
    const top = elRect.top - r.top;
    if (el.parentElement !== container) container.appendChild(el);
    el.style.transform = 'none';
    el.style.left = left + 'px';
    el.style.top = top + 'px';
  });
  window.addEventListener('pointermove', function (e) {
    if (!arrastando) return;
    const r = container.getBoundingClientRect();
    let x = e.clientX - r.left - offsetX;
    let y = e.clientY - r.top - offsetY;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
  });
  function soltar() {
    if (!arrastando) return;
    arrastando = false;
    el.classList.remove('arrastando');
    if (onSoltar) onSoltar();
  }
  window.addEventListener('pointerup', soltar);
  window.addEventListener('pointercancel', soltar);
}

function criarPassoMontarEquacao(config) {

    fala('Agora monte a equação química correspondente.');
    const zonas = [];

    let xAtual = 14;

    config.reagentes.forEach(function (chave, i) {
      const z = criarZonaVazia(xAtual + '%', '30%', 'z-' + config.id + '-reag-' + i);
      overlay.appendChild(z);
      zonas.push({ zona: z, chave: chave, preenchida: false });
      if (i < totalReag - 1) overlay.appendChild(criarSinalMais((xAtual + passoX / 2) + '%', '34%'));
      xAtual += passoX;
    });
    xAtual += 8;
    overlay.appendChild(criarSeta(xAtual + '%', '32%'));
    xAtual += 12;
    config.produtos.forEach(function (chave, i) {
      const z = criarZonaVazia(xAtual + '%', '30%', 'z-' + config.id + '-prod-' + i);
      overlay.appendChild(z);
      zonas.push({ zona: z, chave: chave, preenchida: false });
      if (i < totalProd - 1) overlay.appendChild(criarSinalMais((xAtual + passoX / 2) + '%', '34%'));
      xAtual += passoX;

    const tray = document.createElement('div');

    let corretos = 0;
    todasChaves.forEach(function (chave, idx) {
      const peca = criarMolecula('tray-' + config.id + '-' + idx, chave, '0', '0');
      peca.classList.add('peca-tray');
      peca.style.position = 'relative'; peca.style.left = '0'; peca.style.top = '0'; peca.style.transform = 'none';
      tray.appendChild(peca);

      tornarArrastavelXY(peca, overlay, function () {
        const pr = peca.getBoundingClientRect();
        const cx = pr.left + pr.width / 2, cy = pr.top + pr.height / 2;
        let alvo = null;
        zonas.forEach(function (zinfo) {
          if (zinfo.preenchida) return;
          const zr = zinfo.zona.getBoundingClientRect();
          if (cx >= zr.left && cx <= zr.right && cy >= zr.top && cy <= zr.bottom) alvo = zinfo;
        });

  }
  mostrarInstrucao();

  alvos.forEach(function (alvo, idx) {
    alvo.regiao.addEventListener('click', function () {
      if (idx === indice) {
        tocarDing();
        alvo.destaque.forEach(function (el) { el.classList.add('destaque-dourado'); });
        indice++;
        if (indice < alvos.length) {
          mostrarInstrucao();
        } else {
          agendar(function () {
            fala('Excelente! Você identificou todas as partes da equação.');
            botaoContinuar(400);
          }, 300);
        }
      } else {
        const fb = document.getElementById('fbEtapa6');
        if (fb) { fb.className = 'modal-feedback visivel'; fb.innerHTML = '<span class="feedback-errado">Essa não é a região certa. Tente novamente.</span>'; }
      }
    });
  });
}

/* ==========================================================
   FINAL
   ========================================================== */
function passoFinal() {
  fala('Excelente. Agora você entende que uma equação química é apenas uma forma de representar o rearranjo dos átomos durante uma reação.');
  function linha(txt) { return '<div class="quadro-item"><div class="valor">' + txt + '</div></div>'; }
  function seta() { return '<div style="font-family:\'Cormorant Garamond\',serif;font-size:1.3rem;color:var(--dourado-claro);">↓</div>'; }
  overlay.innerHTML =
    '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;">' +
    linha('Reagentes') + seta() + linha('Reação') + seta() + linha('Rearranjo dos átomos') + seta() + linha('Produtos') + seta() + linha('Equação química') +
    '</div>';
  painel.innerHTML = '';
  const conclusao = document.getElementById('conclusao');
  document.getElementById('conclusaoPlacar').textContent = 'Fase concluída';
  document.getElementById('conclusaoMensagem').textContent = 'Você descobriu que uma reação química é um rearranjo de átomos, e a equação química é apenas a forma de representar esse rearranjo.';
  conclusao.classList.add('visivel');
  conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ==========================================================
   MOTOR DA FASE
   ========================================================== */
const PASSOS = [
  passoIntro0, passoIntro1, passoIntro2,
  passoEtapa1,
  passoEtapa2,
  passoEtapa3,
  passoEtapa4,
  criarPassoObservarReacao(REACOES[0]), criarPassoMontarEquacao(REACOES[0]),
  criarPassoObservarReacao(REACOES[1]), criarPassoMontarEquacao(REACOES[1]),
  criarPassoObservarReacao(REACOES[2]), criarPassoMontarEquacao(REACOES[2]),
  criarPassoObservarReacao(REACOES[3]), criarPassoMontarEquacao(REACOES[3]),
  passoEtapa6,
  passoFinal
];

let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  PASSOS[i]();
}
function avancar() { if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1); }
function reiniciar() {
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* ── INIT ── */
irPara(0);
</script>
