<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Chemical Reactions — Premium Game | KiFácil</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --fundo: #fdf8f0;
      --fundo-card: #fffdf9;
      --escuro: #2e2016;
      --texto: #1a1208;
      --texto-suave: #3d2e1a;
      --dourado: #8a5e10;
      --dourado-claro: #c8920a;
      --borda: rgba(100,70,20,0.3);
      --borda-forte: rgba(100,70,20,0.5);
      --verde-escuro: #1e5238;
      --vermelho-escuro: #7a1515;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-nav {
      background: #1e1008;
      border-bottom: 2px solid var(--dourado-claro);
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #fff8ee;
      letter-spacing: 0.03em;
      margin-right: auto;
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 2.5rem;
      width: 100%;
    }
    .titulo-jogo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      margin-bottom: 0.4rem;
      line-height: 1.1;
    }
    .subtitulo {
      font-size: 1.1rem;
      color: var(--texto);
      margin-bottom: 2.5rem;
      max-width: 680px;
    }

    .narrador {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.4rem;
      padding: 1rem 1.1rem;
      border: 1.5px solid var(--borda-forte);
      border-radius: 10px;
      background: rgba(30,16,8,0.05);
    }
    .narrador img {
      width: 78px;
      height: 96px;
      object-fit: cover;
      object-position: top center;
      border-radius: 10px;
      border: 1px solid rgba(200,146,10,.35);
      flex-shrink: 0;
    }
    .narrador-nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dourado-claro);
      margin-bottom: 0.4rem;
    }
    .narrador-texto {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--texto-suave);
    }

    /* PALCO DE ANIMAÇÃO (agora só exibe, nada é arrastável) */
    .imagem-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(100%, 900px);
      max-height: 70vh;
      min-height: 460px;
      margin: 0 auto;
      cursor: default;
      border: 1.5px solid var(--borda-forte);
      border-radius: 6px;
      overflow: hidden;
      background: #f7efe2;
    }
    .cena-fundo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    /* Darkens/blurs the photo backdrop so the (now much larger)
       molecules and equations stay the clear visual focus. */
    .cena-escurecida {
      position: absolute;
      inset: 0;
      background: rgba(10,6,0,.46);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 0;
      pointer-events: none;
    }
    /* Parchment-colored card behind the reaction/equation, so dark
       atoms (like carbon) stay visible against the darkened photo. */
    .pergaminho-fundo {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 88%; max-width: 780px;
      height: 62%; max-height: 320px;
      background: linear-gradient(155deg, #f3e9cc, #e6d7ad);
      border: 1.5px solid rgba(139,94,26,.4);
      border-radius: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,.35), inset 0 0 50px rgba(139,94,26,.1);
      z-index: 0;
      pointer-events: none;
    }
    .overlay-animacao { position: absolute; inset: 0; z-index: 1; }

    .link-aula {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: #fff8ee;
      background: rgba(30,16,8,0.72); border: 1.5px solid var(--dourado-claro, #c8920a);
      border-radius: 8px; padding: 0.4rem 0.65rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.02em; text-align: center; line-height: 1.2;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .link-aula:hover { background: rgba(30,16,8,0.92); transform: translateY(-1px); }
    .link-aula svg { width: 22px; height: 22px; }

    .tubo-icone { position: absolute; width: 46px; z-index: 2; pointer-events: none; opacity: 0.9; }

    /* Moléculas (SVG, apenas ilustrativas — sem interação) */
    .molecula-visual { position: absolute; z-index: 4; transform: translate(-50%, -50%); pointer-events: none; }
    .molecula-visual svg { display: block; }
    .destaque-dourado { filter: drop-shadow(0 0 8px rgba(200,146,10,0.9)); }

    /* Pulses a molecule right before its bonds break, as a visual cue */
    .molecula-quebrando { animation: pulsoQuebra .5s ease 2; }
    @keyframes pulsoQuebra { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }

    .sinal-mais {
      position: absolute; font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: 2.1rem; color: #fff8ee; transform: translate(-50%, -50%); z-index: 3;
      pointer-events: none; text-shadow: 0 2px 6px rgba(0,0,0,.5);
    }

    /* ---------------------------------------------------------
       PERSISTENT EQUATION DISPLAY (flexbox)
       Used whenever a full equation must stay on screen across
       several related questions (parts of the equation, physical
       states, full review). Groups can be dimmed/highlighted with
       .dim / .foco without ever being removed from the DOM.
       --------------------------------------------------------- */
    .equacao-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2; padding: 1rem; }
    .equacao-flex { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 1rem; width: 100%; }
    .eq-grupo { display: flex; align-items: center; gap: 0.7rem; transition: opacity .5s ease, filter .5s ease; }
    .eq-grupo.dim { opacity: .25; filter: grayscale(.65); }
    .eq-grupo.foco { filter: drop-shadow(0 0 16px rgba(200,146,10,.85)); }
    .eq-mais { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 2.2rem; color: #fff8ee; text-shadow: 0 2px 6px rgba(0,0,0,.5); }
    .eq-molecula-bloco { display: flex; flex-direction: column; align-items: center; gap: .4rem; }
    .eq-molecula svg { display: block; }
    .eq-estado-label {
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.05rem;
      color: #fff8ee; background: rgba(30,16,8,.7); padding: 2px 10px; border-radius: 6px;
      border: 1px solid rgba(200,146,10,.4);
    }
    .eq-seta-wrap { position: relative; }
    .eq-condicao {
      position: absolute; top: -1.9rem; left: 50%; transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.9rem;
      color: #3d2600; background: linear-gradient(135deg, #fff3d6, #e9c877);
      padding: 3px 10px; border-radius: 6px; border: 1px solid #a97c1f; white-space: nowrap;
    }

    .placa-dourada {
      position: absolute; bottom: 12px; left: 50%; transform: translate(-50%, 10px);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: clamp(0.82rem, 2.1vw, 1.02rem);
      padding: 0.5rem 1.1rem; border-radius: 8px; border: 1px solid #a97c1f;
      box-shadow: 0 3px 10px rgba(0,0,0,.25); text-align: center; max-width: 90%;
      opacity: 0; animation: placaIn .5s ease forwards; z-index: 6; pointer-events: none;
    }
    @keyframes placaIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* PAINEL DE INTERAÇÃO (perguntas de múltipla escolha) */
    #painelInteracao { max-width: 900px; margin: 1.2rem auto 0; }
    .interacao-painel {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.4rem 1.6rem 1.3rem;
    }
    .interacao-pergunta-texto {
      font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600;
      line-height: 1.35; margin-bottom: 1rem;
    }
    .opcoes-linha { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .btn-opcao {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px;
      padding: 0.6rem 1.2rem; font-family: 'Libre Baskerville', serif; font-size: 0.95rem;
      color: var(--texto); cursor: pointer; transition: border-color .2s, background .2s;
    }
    .btn-opcao:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .btn-opcao:disabled { cursor: default; opacity: 0.75; }
    .opcao-certa { border-color: var(--verde-escuro) !important; background: rgba(30,82,56,0.12); }
    .opcao-errada { border-color: var(--vermelho-escuro) !important; background: rgba(122,21,21,0.08); }

    .btn-continuar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 0.6rem 1.6rem;
      border-radius: 4px; cursor: pointer; transition: background 0.2s, color 0.2s, opacity .2s;
      display: block; margin: 0.2rem auto 0;
    }
    .btn-continuar:hover { background: var(--dourado-claro); color: #1e1008; }
    .btn-continuar:disabled { opacity: 0.4; cursor: default; }
    .btn-continuar:disabled:hover { background: #1e1008; color: var(--dourado-claro); }

    #continuarBalao { margin-top: 0.6rem; }
    #continuarBalao .btn-continuar { display: inline-block; margin: 0; }

    .modal-feedback {
      margin-top: 1rem; font-size: 0.88rem; line-height: 1.7;
      border-left: 3px solid var(--borda-forte); padding-left: 1rem; display: none;
    }
    .modal-feedback.visivel { display: block; }
    .feedback-certo   { color: var(--verde-escuro); font-weight: 700; }
    .feedback-errado  { color: var(--vermelho-escuro); font-weight: 700; }
    .feedback-resposta{ color: var(--verde-escuro); font-weight: 700; }
    .feedback-explicacao { color: var(--texto); margin-top: 0.5rem; }

    .quadro-item {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px;
      padding: 0.8rem 1.3rem; min-width: 200px; text-align: center;
    }
    .quadro-item .valor { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: var(--texto); }

    /* CONCLUSÃO */
    .conclusao {
      display: none; margin-top: 3rem; background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 3rem 2rem; text-align: center;
    }
    .conclusao.visivel { display: block; }
    .conclusao-titulo {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 600; margin-bottom: 0.8rem;
    }
    .conclusao-placar { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--dourado-claro); margin-bottom: 1rem; }
    .conclusao-mensagem { font-size: 0.93rem; color: var(--texto-suave); max-width: 460px; margin: 0 auto 2rem; line-height: 1.8; }
    .btn-reiniciar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.7rem 2rem; border-radius: 4px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-reiniciar:hover { background: var(--dourado-claro); color: #1e1008; }

    /* FOOTER */
    footer {
      background: var(--escuro); border-top: 2px solid var(--dourado-claro);
      padding: 1.2rem 2rem; text-align: center; font-size: 0.82rem; color: rgba(255,248,238,0.5);
    }

    @media (min-width: 641px) {
      .narrador { max-width: 900px; margin: 0 auto 1.2rem; }
      .narrador-texto { font-size: 1.08rem; }
    }

    @media (max-width: 640px) {
      .top-nav { padding: 0 1.2rem; gap: 1.2rem; }
      main { padding: 2rem 1rem 4rem; }
      .interacao-painel { padding: 1.2rem 1rem; }
      .placa-dourada { font-size: 0.74rem; padding: 0.42rem 0.75rem; }
      .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .link-aula svg { width: 18px; height: 18px; }
      /* Molecules are drawn ~2.3x larger for legibility; scale them
         back down on narrow screens so equations still fit. */
      .molecula-visual { transform: translate(-50%, -50%) scale(.62); }
      .eq-molecula-bloco svg { transform: scale(.72); }
      .eq-estado-label { font-size: 0.86rem; }
      .equacao-flex { gap: .5rem; }
    }

    /* AUDIO CONTROL */
    #controle-volume {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(14,6,0,0.85);
      border: 1.5px solid var(--borda-forte);
      border-radius: 24px;
      padding: 8px 16px 8px 10px;
    }
    #btn-mute {
      background: none;
      border: none;
      color: var(--dourado-claro);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #slider-volume {
      width: 90px;
      accent-color: var(--dourado-claro);
      cursor: pointer;
    }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">KiFácil</div>
</nav>

<main>
  <h1 class="titulo-jogo">Chemical Reactions</h1>
  <p class="subtitulo">Discover that a chemical reaction is just a rearrangement of atoms — and the chemical equation is simply a way of representing it.</p>

  <div class="narrador">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Teacher Rafaela" />
    <div style="flex: 1;">
      <div class="narrador-nome">Teacher Rafaela</div>
      <div class="narrador-texto" id="narradorTexto">Let's get started.</div>
      <div id="continuarBalao"></div>
    </div>
  </div>

  <div class="imagem-wrapper" id="imagemWrapper">
    <img src="../imagens/laboratorio-reacoes.jpg" alt="Chemical reactions laboratory" class="cena-fundo" />
    <div class="cena-escurecida"></div>
    <div class="pergaminho-fundo"></div>
    <div class="overlay-animacao" id="overlayAnimacao"></div>
</div>

  <div id="painelInteracao"></div>

  <div class="conclusao" id="conclusao">
    <div class="conclusao-titulo">Study Complete</div>
    <div class="conclusao-placar" id="conclusaoPlacar"></div>
    <p class="conclusao-mensagem" id="conclusaoMensagem"></p>
    <button class="btn-reiniciar" onclick="reiniciar()">Play Again</button>
  </div>
</main>

<footer>© 2026 KiFácil</footer>

<script>
/* ==========================================================
   DOM REFERENCES
   ========================================================== */
const overlay = document.getElementById('overlayAnimacao');
const painel  = document.getElementById('painelInteracao');
const continuarBalao = document.getElementById('continuarBalao');

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

function fala(texto) { document.getElementById('narradorTexto').textContent = texto; }

let timersAtivos = [];
function agendar(fn, ms) { const id = setTimeout(fn, ms); timersAtivos.push(id); return id; }
function limparTimers() { timersAtivos.forEach(clearTimeout); timersAtivos = []; }

/* ==========================================================
   COMPONENT: MOLECULE (SVG, illustration only — no interaction)
   Bond entries are [atomIndexA, atomIndexB, order] — order 2 draws
   a correct Lewis-style double bond (two parallel lines); order is
   1 by default. Coordinates below are the "design" scale; the real
   on-screen size is ESCALA times larger (see defEscalada).
   ========================================================== */
const ESCALA = 2.3;

const MOLECULAS_DEF = {
  C:   { atomos: [{ simbolo: 'C', cor: 'var(--escuro)', x: 30, y: 30, r: 18 }], ligacoes: [], largura: 60, altura: 60 },
  O2:  { atomos: [{ simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 26, y: 32, r: 15 }, { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 68, y: 32, r: 15 }], ligacoes: [[0, 1, 2]], largura: 94, altura: 64 },
  CO2: { atomos: [{ simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 18, y: 32, r: 14 }, { simbolo: 'C', cor: 'var(--escuro)', x: 56, y: 32, r: 16 }, { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 94, y: 32, r: 14 }], ligacoes: [[0, 1, 2], [1, 2, 2]], largura: 112, altura: 64 },
  H2:  { atomos: [{ simbolo: 'H', cor: 'var(--dourado-claro)', x: 24, y: 28, r: 12 }, { simbolo: 'H', cor: 'var(--dourado-claro)', x: 60, y: 28, r: 12 }], ligacoes: [[0, 1]], largura: 84, altura: 56 },
  Cl2: { atomos: [{ simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 28, y: 30, r: 16 }, { simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 72, y: 30, r: 16 }], ligacoes: [[0, 1]], largura: 100, altura: 60 },
  HCl: { atomos: [{ simbolo: 'H', cor: 'var(--dourado-claro)', x: 22, y: 28, r: 11 }, { simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 60, y: 28, r: 15 }], ligacoes: [[0, 1]], largura: 84, altura: 56 },
  Na:  { atomos: [{ simbolo: 'Na', cor: 'var(--dourado-claro)', x: 28, y: 28, r: 17 }], ligacoes: [], largura: 56, altura: 56 },
  NaCl:{ atomos: [{ simbolo: 'Na', cor: 'var(--dourado-claro)', x: 24, y: 30, r: 14 }, { simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 64, y: 30, r: 16 }], ligacoes: [[0, 1]], largura: 92, altura: 60 },
  Fe:  { atomos: [{ simbolo: 'Fe', cor: 'var(--texto-suave)', x: 28, y: 28, r: 17 }], ligacoes: [], largura: 56, altura: 56 },
  Fe2O3: {
    atomos: [
      { simbolo: 'Fe', cor: 'var(--texto-suave)', x: 20, y: 22, r: 13 },
      { simbolo: 'Fe', cor: 'var(--texto-suave)', x: 20, y: 56, r: 13 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 56, y: 12, r: 11 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 56, y: 39, r: 11 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 56, y: 66, r: 11 }
    ],
    ligacoes: [[0, 2], [0, 3], [1, 3], [1, 4]], largura: 82, altura: 82
  },
  CaCO3: {
    atomos: [
      { simbolo: 'Ca', cor: 'var(--dourado-claro)', x: 18, y: 40, r: 15 },
      { simbolo: 'C', cor: 'var(--escuro)', x: 54, y: 40, r: 13 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 54, y: 12, r: 10 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 30, y: 62, r: 10 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 78, y: 62, r: 10 }
    ],
    ligacoes: [[1, 2], [1, 3], [1, 4]], largura: 98, altura: 76
  },
  CaO: { atomos: [{ simbolo: 'Ca', cor: 'var(--dourado-claro)', x: 24, y: 30, r: 15 }, { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 64, y: 30, r: 13 }], ligacoes: [[0, 1]], largura: 90, altura: 60 },
  H2O: { atomos: [{ simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 46, y: 20, r: 14 }, { simbolo: 'H', cor: 'var(--dourado-claro)', x: 20, y: 46, r: 10 }, { simbolo: 'H', cor: 'var(--dourado-claro)', x: 72, y: 46, r: 10 }], ligacoes: [[0, 1], [0, 2]], largura: 92, altura: 64 }
};

const _defCache = {};
function defEscalada(chave) {
  if (_defCache[chave]) return _defCache[chave];
  const original = MOLECULAS_DEF[chave];
  const escalado = {
    largura: original.largura * ESCALA,
    altura: original.altura * ESCALA,
    ligacoes: original.ligacoes,
    atomos: original.atomos.map(function (a) {
      return { simbolo: a.simbolo, cor: a.cor, x: a.x * ESCALA, y: a.y * ESCALA, r: a.r * ESCALA };
    })
  };
  _defCache[chave] = escalado;
  return escalado;
}

function construirSvgMolecula(chave) {
  const def = defEscalada(chave);
  let svg = '<svg viewBox="0 0 ' + def.largura + ' ' + def.altura + '" width="' + def.largura + '" height="' + def.altura + '">';
  def.ligacoes.forEach(function (par) {
    const a = def.atomos[par[0]], b = def.atomos[par[1]];
    const ordem = par[2] || 1;
    if (ordem === 2) {
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len, ny = dx / len;
      const off = 7;
      svg += '<line x1="' + (a.x + nx * off) + '" y1="' + (a.y + ny * off) + '" x2="' + (b.x + nx * off) + '" y2="' + (b.y + ny * off) + '" stroke="#3d2e1a" stroke-width="3.5"/>';
      svg += '<line x1="' + (a.x - nx * off) + '" y1="' + (a.y - ny * off) + '" x2="' + (b.x - nx * off) + '" y2="' + (b.y - ny * off) + '" stroke="#3d2e1a" stroke-width="3.5"/>';
    } else {
      svg += '<line x1="' + a.x + '" y1="' + a.y + '" x2="' + b.x + '" y2="' + b.y + '" stroke="#3d2e1a" stroke-width="4"/>';
    }
  });
  def.atomos.forEach(function (a) {
    svg += '<circle cx="' + a.x + '" cy="' + a.y + '" r="' + a.r + '" fill="' + a.cor + '"/>';
    svg += '<text x="' + a.x + '" y="' + (a.y + a.r * 0.34) + '" font-size="' + (a.r * 0.68) + '" text-anchor="middle" fill="#fff8ee" font-family="Cormorant Garamond, serif" font-weight="700">' + a.simbolo + '</text>';
  });
  svg += '</svg>';
  return svg;
}

// Absolutely-positioned molecule — left/top are the CENTER of the
// molecule (the CSS transform: translate(-50%,-50%) does the rest).
// Used during reaction animations.
function criarMolecula(idUnico, chave, left, top) {
  const div = document.createElement('div');
  div.className = 'molecula-visual';
  div.id = 'mol-' + idUnico;
  div.style.left = left;
  div.style.top = top;
  div.dataset.chave = chave;
  div.innerHTML = construirSvgMolecula(chave);
  return div;
}

// A single free-floating atom, positioned the same way as
// criarMolecula. Used to show atoms detaching from a molecule and
// flying to their new position in a reaction.
function criarAtomoPx(idUnico, simbolo, cor, raio, centerX, centerY) {
  const tam = raio * 2;
  const div = document.createElement('div');
  div.className = 'molecula-visual';
  div.id = 'atomo-' + idUnico;
  div.style.left = centerX + 'px';
  div.style.top = centerY + 'px';
  div.innerHTML = '<svg viewBox="0 0 ' + tam + ' ' + tam + '" width="' + tam + '" height="' + tam + '">' +
    '<circle cx="' + raio + '" cy="' + raio + '" r="' + raio + '" fill="' + cor + '"/>' +
    '<text x="' + raio + '" y="' + (raio + raio * 0.34) + '" font-size="' + (raio * 0.68) + '" text-anchor="middle" fill="#fff8ee" font-family="Cormorant Garamond, serif" font-weight="700">' + simbolo + '</text>' +
  '</svg>';
  return div;
}

// Flexbox-friendly molecule (no absolute positioning) — used inside
// the persistent equation display, where layout is handled by CSS.
function criarMoleculaFlex(chave) {
  const div = document.createElement('div');
  div.className = 'eq-molecula';
  div.innerHTML = construirSvgMolecula(chave);
  return div;
}

/* ==========================================================
   COMPONENTS: ARROW, PLUS SIGN, STATIC TAG
   ========================================================== */
function criarSeta(left, top) {
  const div = document.createElement('div');
  div.className = 'molecula-visual';
  div.style.left = left;
  div.style.top = top;
  div.innerHTML = '<svg viewBox="0 0 80 24" width="80" height="24">' +
    '<line x1="4" y1="12" x2="66" y2="12" stroke="#c8920a" stroke-width="3"/>' +
    '<polygon points="66,4 80,12 66,20" fill="#c8920a"/></svg>';
  return div;
}
function criarSinalMais(left, top) {
  const m = document.createElement('div');
  m.className = 'sinal-mais';
  m.textContent = '+';
  m.style.left = left;
  m.style.top = top;
  return m;
}
/* ==========================================================
   PERSISTENT EQUATION DISPLAY
   Builds a reactants → products row (with optional physical-state
   labels and a reaction condition above the arrow) that stays on
   screen for as long as the current scene needs it. Individual
   parts (reactants / arrow / products) can be highlighted with
   focarGrupos() without ever clearing the stage.
   ========================================================== */
function blocoMolecula(item) {
  const bloco = document.createElement('div');
  bloco.className = 'eq-molecula-bloco';
  bloco.appendChild(criarMoleculaFlex(item.chave));
  if (item.estado) {
    const lbl = document.createElement('div');
    lbl.className = 'eq-estado-label';
    lbl.textContent = item.estado;
    bloco.appendChild(lbl);
  }
  return bloco;
}

function criarGrupo(itens) {
  const grupo = document.createElement('div');
  grupo.className = 'eq-grupo';
  itens.forEach(function (item, i) {
    if (i > 0) {
      const mais = document.createElement('div');
      mais.className = 'eq-mais';
      mais.textContent = '+';
      grupo.appendChild(mais);
    }
    grupo.appendChild(blocoMolecula(item));
  });
  return grupo;
}

function renderEquacao(reagentes, produtos, opts) {
  opts = opts || {};
  const wrap = document.createElement('div');
  wrap.className = 'equacao-wrap';
  const linha = document.createElement('div');
  linha.className = 'equacao-flex';

  const grupoReagentes = criarGrupo(reagentes);
  const setaWrap = document.createElement('div');
  setaWrap.className = 'eq-grupo eq-seta-wrap';
  setaWrap.innerHTML = '<svg class="eq-seta-svg" viewBox="0 0 80 24" width="80" height="24"><line x1="4" y1="12" x2="66" y2="12" stroke="#c8920a" stroke-width="3"/><polygon points="66,4 80,12 66,20" fill="#c8920a"/></svg>';
  if (opts.condicao) {
    const cond = document.createElement('div');
    cond.className = 'eq-condicao';
    cond.textContent = opts.condicao;
    setaWrap.appendChild(cond);
  }
  const grupoProdutos = criarGrupo(produtos);

  linha.appendChild(grupoReagentes);
  linha.appendChild(setaWrap);
  linha.appendChild(grupoProdutos);
  wrap.appendChild(linha);
  overlay.appendChild(wrap);

  return { reagentesEl: grupoReagentes, produtosEl: grupoProdutos, setaEl: setaWrap };
}

function focarGrupos() {
  const manter = Array.prototype.slice.call(arguments);
  document.querySelectorAll('.eq-grupo').forEach(function (g) {
    if (manter.indexOf(g) !== -1) {
      g.classList.remove('dim');
      g.classList.add('foco');
    } else {
      g.classList.add('dim');
      g.classList.remove('foco');
    }
  });
}
function limparFoco() {
  document.querySelectorAll('.eq-grupo').forEach(function (g) { g.classList.remove('dim', 'foco'); });
}

/* ==========================================================
   INTERACTION HELPERS
   ========================================================== */
function botaoContinuar(delayMs, aoContinuar) {
  delayMs = delayMs || 0;
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', aoContinuar || avancar);
  return btn;
}

// Simple, reliable multiple-choice question. Accepts an optional
// aoContinuar callback so a scene can chain several questions in a
// row (highlighting a different part of the same equation each
// time) without the global engine clearing the stage in between —
// only the last question of a scene should fall through to avancar().
function escolhaBotoes(opts) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">' + opts.pergunta + '</div>' +
    '<div class="opcoes-linha" id="opcoesLinha"></div>' +
    '<div class="modal-feedback" id="feedbackEscolha"></div>';
  painel.appendChild(wrap);

  const opcoesLinha = wrap.querySelector('#opcoesLinha');
  const feedback = wrap.querySelector('#feedbackEscolha');
  let tentativas = 0;
  let resolvido = false;

  opts.opcoes.forEach(function (op) {
    const btn = document.createElement('button');
    btn.className = 'btn-opcao';
    btn.textContent = op.rotulo;
    btn.addEventListener('click', function () {
      if (resolvido) return;
      if (op.correta) {
        resolvido = true;
        tocarDing();
        Array.from(opcoesLinha.children).forEach(function (b) { b.disabled = true; });
        btn.classList.add('opcao-certa');
        feedback.className = 'modal-feedback visivel';
        feedback.innerHTML = '<span class="feedback-certo">Correct!</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
        agendar(function () { botaoContinuar(400, opts.aoContinuar); }, 300);
      } else {
        tentativas++;
        btn.classList.add('opcao-errada');
        if (tentativas === 1 && opts.dica) {
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-errado">' + opts.dica + '</span>';
        } else if (tentativas >= 2) {
          resolvido = true;
          Array.from(opcoesLinha.children).forEach(function (b, i) {
            b.disabled = true;
            if (opts.opcoes[i].correta) b.classList.add('opcao-certa');
          });
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-resposta">The correct answer is highlighted.</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
          agendar(function () { botaoContinuar(400, opts.aoContinuar); }, 300);
        }
      }
    });
    opcoesLinha.appendChild(btn);
  });
}

/* ==========================================================
   STAGE 1 — FIRST REACTION (C + O2 → CO2)
   A slow, explicit atom-by-atom animation: the O2 bond visibly
   breaks, the three atoms drift apart, then travel to their new
   positions and form the correct double bonds of CO2 (O=C=O).
   ========================================================== */
function passoEtapa1() {
  fala('Here are two substances: carbon and oxygen gas.');
  const tubo = document.createElement('img');
  tubo.src = '../imagens/tubo-ensaio.png';
  tubo.className = 'tubo-icone';
  tubo.style.left = '4%'; tubo.style.top = '8%';
  overlay.appendChild(tubo);

  const larguraPalco = overlay.clientWidth;
  const alturaPalco = overlay.clientHeight;

  const centroC  = { x: larguraPalco * 0.22, y: alturaPalco * 0.42 };
  const centroO2 = { x: larguraPalco * 0.66, y: alturaPalco * 0.42 };
  const centroMais = { x: larguraPalco * 0.44, y: alturaPalco * 0.44 };

  const c  = criarMolecula('e1-c', 'C', centroC.x + 'px', centroC.y + 'px');
  const o2 = criarMolecula('e1-o2', 'O2', centroO2.x + 'px', centroO2.y + 'px');
  const mais = criarSinalMais(centroMais.x + 'px', centroMais.y + 'px');
  overlay.appendChild(c); overlay.appendChild(o2); overlay.appendChild(mais);

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML = '<div class="interacao-pergunta-texto">Click to start the reaction and watch closely.</div>';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Start reaction';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    fala('Watch the double bond inside O₂ — it is about to break.');
    o2.classList.add('molecula-quebrando');
    mais.style.transition = 'opacity .6s';
    agendar(function () { mais.style.opacity = '0'; }, 700);

    agendar(function () {
      fala('The bond breaks. Now three separate atoms are free: one carbon and two oxygen.');
      mais.remove();

      const defC  = defEscalada('C');
      const defO2 = defEscalada('O2');
      const raioC = defC.atomos[0].r;
      const raioO = defO2.atomos[0].r;

      // Each oxygen atom's real center, derived from the O2 layout.
      const o1Start = { x: centroO2.x + (defO2.atomos[0].x - defO2.largura / 2), y: centroO2.y + (defO2.atomos[0].y - defO2.altura / 2) };
      const o2Start = { x: centroO2.x + (defO2.atomos[1].x - defO2.largura / 2), y: centroO2.y + (defO2.atomos[1].y - defO2.altura / 2) };

      c.remove(); o2.remove();

      const atomC  = criarAtomoPx('flying-c', 'C', 'var(--escuro)', raioC, centroC.x, centroC.y);
      const atomOa = criarAtomoPx('flying-o1', 'O', 'var(--vermelho-escuro)', raioO, o1Start.x, o1Start.y);
      const atomOb = criarAtomoPx('flying-o2', 'O', 'var(--vermelho-escuro)', raioO, o2Start.x, o2Start.y);
      overlay.appendChild(atomC); overlay.appendChild(atomOa); overlay.appendChild(atomOb);

      // Target: the correct CO2 layout, centered on the stage.
      const defCO2 = defEscalada('CO2');
      const centroPalco = { x: larguraPalco / 2, y: alturaPalco * 0.42 };
      const alvoO1 = { x: centroPalco.x + (defCO2.atomos[0].x - defCO2.largura / 2), y: centroPalco.y + (defCO2.atomos[0].y - defCO2.altura / 2) };
      const alvoC  = { x: centroPalco.x + (defCO2.atomos[1].x - defCO2.largura / 2), y: centroPalco.y + (defCO2.atomos[1].y - defCO2.altura / 2) };
      const alvoO2 = { x: centroPalco.x + (defCO2.atomos[2].x - defCO2.largura / 2), y: centroPalco.y + (defCO2.atomos[2].y - defCO2.altura / 2) };

      agendar(function () {
        fala('Now the atoms move slowly toward each other to form new bonds.');
        [atomOa, atomC, atomOb].forEach(function (a) { a.style.transition = 'left 1.7s ease, top 1.7s ease'; });
        atomOa.style.left = alvoO1.x + 'px'; atomOa.style.top = alvoO1.y + 'px';
        atomC.style.left  = alvoC.x  + 'px'; atomC.style.top  = alvoC.y  + 'px';
        atomOb.style.left = alvoO2.x + 'px'; atomOb.style.top = alvoO2.y + 'px';
      }, 250);

      agendar(function () {
        fala('New double bonds form, creating carbon dioxide: O=C=O.');
        atomOa.remove(); atomC.remove(); atomOb.remove();
        const co2 = criarMolecula('e1-co2', 'CO2', centroPalco.x + 'px', centroPalco.y + 'px');
        co2.style.opacity = '0'; co2.style.transition = 'opacity .5s';
        overlay.appendChild(co2);
        agendar(function () { co2.style.opacity = '1'; }, 30);
      }, 2100);

      agendar(function () {
        fala('Notice that no atom was created or destroyed. Only a rearrangement took place.');
        const placa = document.createElement('div');
        placa.className = 'placa-dourada';
        placa.textContent = 'C + O₂ → CO₂ (atoms rearranged)';
        overlay.appendChild(placa);
      }, 2700);

      agendar(function () {
        escolhaBotoes({
          pergunta: 'What happened to the carbon and oxygen atoms during this reaction?',
          opcoes: [
            { rotulo: 'They were destroyed', correta: false },
            { rotulo: 'They rearranged into a new substance', correta: true },
            { rotulo: 'New atoms were created', correta: false }
          ],
          dica: 'Think about what you just watched happen on screen.',
          explicacao: 'Exactly! No atom was created or destroyed — they simply rearranged into a new substance, CO₂. This is the Law of Conservation of Mass.'
        });
      }, 3600);
    }, 900);
  });
}

/* ==========================================================
   STAGE 2 — PARTS OF THE EQUATION
   The full C + O2 → CO2 equation is drawn once and stays visible
   for all three questions below; only the highlighted group

function passoEtapa2() {

        { rotulo: 'Catalysts', correta: false }

  }
  function perguntaProdutos() {

        { rotulo: 'Reactants', correta: false },
        { rotulo: 'Catalysts', correta: false }

        { rotulo: 'Equality, like an equals sign', correta: false }

    opcoes: [ { rotulo: 'H₂ + Cl₂ → HCl', correta: true }, { rotulo: 'H₂ + Cl₂ → H₂Cl', correta: false }, { rotulo: 'HCl → H₂ + Cl₂', correta: false } ] },
  { id: 'r2', reagentes: ['Na', 'Cl2'], produtos: ['NaCl'], nomeReagentes: 'Na and Cl₂', explicacao: 'Sodium transfers electrons to chlorine, forming NaCl.', equacaoTexto: 'Na + Cl₂ → NaCl',
    opcoes: [ { rotulo: 'Na + Cl₂ → NaCl', correta: true }, { rotulo: 'NaCl → Na + Cl₂', correta: false }, { rotulo: 'Na + Cl₂ → NaCl₂', correta: false } ] },
  { id: 'r3', reagentes: ['CaCO3'], produtos: ['CaO', 'CO2'], nomeReagentes: 'CaCO₃', explicacao: 'Calcium carbonate breaks down into calcium oxide and carbon dioxide.', equacaoTexto: 'CaCO₃ → CaO + CO₂',
    opcoes: [ { rotulo: 'CaCO₃ → CaO + CO₂', correta: true }, { rotulo: 'CaO + CO₂ → CaCO₃', correta: false }, { rotulo: 'CaCO₃ → Ca + O₃', correta: false } ] },
  { id: 'r4', reagentes: ['Fe', 'O2'], produtos: ['Fe2O3'], nomeReagentes: 'Fe and O₂', explicacao: 'Iron reacts with oxygen to form iron oxide (rust).', equacaoTexto: 'Fe + O₂ → Fe₂O₃',
    opcoes: [ { rotulo: 'Fe + O₂ → Fe₂O₃', correta: true }, { rotulo: 'Fe₂O₃ → Fe + O₂', correta: false }, { rotulo: 'Fe + O₂ → FeO₃', correta: false } ] }
];

function tocarAnimacaoSimples(reagentesChaves, produtosChaves, callback) {
  const posXReag = reagentesChaves.length === 1 ? [50] : [16, 66];
  const elsReag = [];
  reagentesChaves.forEach(function (chave, i) {
    const el = criarMolecula('anim-reag' + i, chave, posXReag[i] + '%', '42%');
    overlay.appendChild(el);
    elsReag.push(el);
  });
  let maisReag = null;
  if (reagentesChaves.length === 2) {
    maisReag = criarSinalMais(((posXReag[0] + posXReag[1]) / 2) + '%', '46%');
    overlay.appendChild(maisReag);
  }

  agendar(function () {
    elsReag.forEach(function (el) { el.classList.add('molecula-quebrando'); });
  }, 700);

  agendar(function () {
    elsReag.forEach(function (el) { el.style.transition = 'opacity .8s'; el.style.opacity = '0'; });
    if (maisReag) { maisReag.style.transition = 'opacity .8s'; maisReag.style.opacity = '0'; }
  }, 1500);

  agendar(function () {
    elsReag.forEach(function (el) { el.remove(); });
    if (maisReag) maisReag.remove();
    const posXProd = produtosChaves.length === 1 ? [50] : [24, 68];
    produtosChaves.forEach(function (chave, i) {
      const el = criarMolecula('anim-prod' + i, chave, posXProd[i] + '%', '42%');
      el.style.opacity = '0'; el.style.transition = 'opacity 1s';
      overlay.appendChild(el);
      agendar(function () { el.style.opacity = '1'; }, 60);
    });
    if (produtosChaves.length === 2) {
      const maisProd = criarSinalMais('46%', '46%');
      maisProd.style.opacity = '0'; maisProd.style.transition = 'opacity 1s';
      overlay.appendChild(maisProd);
      agendar(function () { maisProd.style.opacity = '1'; }, 60);
    }
  }, 2300);

  agendar(function () {
    if (callback) callback();
  }, 3600);
}

function criarPassoReacaoCompleta(config) {
  return function () {
    fala('Watch the reaction between ' + config.nomeReagentes + '.');
    tocarAnimacaoSimples(config.reagentes, config.produtos, function () {
      fala(config.explicacao);
      const placa = document.createElement('div');
      placa.className = 'placa-dourada';
      placa.textContent = config.equacaoTexto;
      overlay.appendChild(placa);
      agendar(function () {
        escolhaBotoes({
          pergunta: 'Which equation correctly represents the reaction you just watched?',
          opcoes: config.opcoes,
          dica: 'Look carefully at which substances were reactants and which were products.',
          explicacao: config.equacaoTexto + ' — ' + config.explicacao
        });
      }, 600);
    });
  };
}

/* ==========================================================
   STAGE 5 — FULL REACTION REVIEW
   Same idea as Stage 2: the complete labeled equation is drawn
   once and stays visible through all four follow-up questions.
   ========================================================== */
function passoEtapa5() {
  fala('Now watch this complete reaction and identify each part.');
  const eq = renderEquacao(
    [{ chave: 'H2', estado: '(g)' }, { chave: 'O2', estado: '(g)' }],
    [{ chave: 'H2O', estado: '(l)' }],
    { condicao: 'Δ' }
  );

  function perguntaReagentes() {
    focarGrupos(eq.reagentesEl);
    escolhaBotoes({
      pergunta: 'In the equation 2H₂(g) + O₂(g) →(Δ) 2H₂O(l), what are H₂ and O₂ called?',
      opcoes: [
        { rotulo: 'Reactants', correta: true },
        { rotulo: 'Products', correta: false },
        { rotulo: 'Conditions', correta: false }
      ],
      dica: 'They are the starting substances, on the left of the arrow.',
      explicacao: 'H₂ and O₂ are the reactants — the substances present before the reaction happens.',
      aoContinuar: perguntaProduto
    });
  }
  function perguntaProduto() {
    focarGrupos(eq.produtosEl);
    escolhaBotoes({
      pergunta: 'What is H₂O called in this equation?',
      opcoes: [
        { rotulo: 'The product', correta: true },
        { rotulo: 'A reactant', correta: false },
        { rotulo: 'A catalyst', correta: false }
      ],
      dica: 'It is what forms after the reaction.',
      explicacao: 'H₂O is the product — the substance formed as a result of the reaction.',
      aoContinuar: perguntaEstados
    });
  }
  function perguntaEstados() {
    focarGrupos(eq.reagentesEl, eq.produtosEl);
    escolhaBotoes({
      pergunta: 'What do the labels (g) and (l) tell us?',
      opcoes: [
        { rotulo: 'The physical states of the substances', correta: true },
        { rotulo: 'The number of atoms', correta: false },
        { rotulo: 'The temperature of the reaction', correta: false }
      ],
      dica: 'Think back to the earlier stage about (s), (l), (g), and (aq).',
      explicacao: '(g) means gas and (l) means liquid — these labels show the physical state of each substance.',
      aoContinuar: perguntaCondicao
    });
  }
  function perguntaCondicao() {
    focarGrupos(eq.setaEl);
    escolhaBotoes({
      pergunta: 'What does the Δ above the arrow tell us about this reaction?',
      opcoes: [
        { rotulo: 'It requires heat', correta: true },
        { rotulo: 'It requires light', correta: false },
        { rotulo: 'It happens instantly', correta: false }
      ],
      dica: 'This is the same symbol you learned earlier.',
      explicacao: 'Δ above the arrow means the reaction needs to be heated in order to happen.',
      aoContinuar: function () { limparFoco(); avancar(); }
    });
  }

  agendar(perguntaReagentes, 500);
}

/* ==========================================================
   FINAL
   ========================================================== */
function passoFinal() {
  fala('Excellent. Now you understand that a chemical equation is simply a way of representing the rearrangement of atoms during a reaction.');
  function linha(txt) { return '<div class="quadro-item"><div class="valor">' + txt + '</div></div>'; }
  function seta() { return '<div style="font-family:\'Cormorant Garamond\',serif;font-size:1.3rem;color:var(--dourado-claro);">↓</div>'; }
  overlay.innerHTML =
    '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;">' +
    linha('Reactants') + seta() + linha('Reaction') + seta() + linha('Rearrangement of atoms') + seta() + linha('Products') + seta() + linha('Chemical equation') +
    '</div>';
  painel.innerHTML = '';
  const conclusao = document.getElementById('conclusao');
  document.getElementById('conclusaoPlacar').textContent = 'Stage Complete';
  document.getElementById('conclusaoMensagem').textContent = 'You discovered that a chemical reaction is a rearrangement of atoms, and the chemical equation is simply the way we represent that rearrangement.';
  conclusao.classList.add('visivel');
  conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ==========================================================
   STAGE ENGINE
   Each entry below is one continuous scene. Overlay content is
   only cleared when moving between these scenes — never in the
   middle of a scene's own follow-up questions (see aoContinuar
   chaining in escolhaBotoes / botaoContinuar above).
   ========================================================== */
const PASSOS = [
  passoIntro0, passoIntro1, passoIntro2,
  passoEtapa1,
  passoEtapa2,
  passoEtapa3,
  criarPassoReacaoCompleta(REACOES[0]),
  criarPassoReacaoCompleta(REACOES[1]),
  criarPassoReacaoCompleta(REACOES[2]),
  criarPassoReacaoCompleta(REACOES[3]),
  passoEtapa5,
  passoFinal
];

let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  PASSOS[i]();
}
function avancar() { if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1); }
function reiniciar() {
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* ── INIT ── */
irPara(0);
</script>

<script>
let volumeSalvo = parseFloat(localStorage.getItem('kifacil_volume'));
if (isNaN(volumeSalvo)) volumeSalvo = 0.35;
let silenciado = localStorage.getItem('kifacil_silenciado') === '1';
let musicaFundo = null;

function volumeEfetivo() {
  return silenciado ? 0 : volumeSalvo;
}

function iniciarMusicaFundo() {
  if (musicaFundo) return;
  try {
    musicaFundo = new Audio('../sons/natureza.mp3');
    musicaFundo.loop = true;
    musicaFundo.volume = volumeEfetivo();
    musicaFundo.play().catch(function () {});
  } catch (e) {}
}

function atualizarIconeMudo() {
  const botao = document.getElementById('btn-mute');
  if (!botao) return;
  if (silenciado || volumeSalvo === 0) botao.textContent = '🔇';
  else if (volumeSalvo < 0.5) botao.textContent = '🔉';
  else botao.textContent = '🔊';
}

function alternarMudo() {
  silenciado = !silenciado;
  localStorage.setItem('kifacil_silenciado', silenciado ? '1' : '0');
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

function ajustarVolume(valorSlider) {
  volumeSalvo = Math.max(0, Math.min(1, valorSlider / 100));
  localStorage.setItem('kifacil_volume', volumeSalvo);
  if (volumeSalvo > 0 && silenciado) {
    silenciado = false;
    localStorage.setItem('kifacil_silenciado', '0');
  }
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

(function iniciarControleVolume() {
  const slider = document.getElementById('slider-volume');
  if (slider) slider.value = Math.round(volumeSalvo * 100);
  atualizarIconeMudo();
  iniciarMusicaFundo();

  const ativarSom = function () {
    if (!musicaFundo) iniciarMusicaFundo();
    if (musicaFundo) {
      musicaFundo.volume = volumeEfetivo();
      musicaFundo.play().catch(function () {});
    }
  };
  window.addEventListener('pointerdown', ativarSom, { once: true });
  window.addEventListener('keydown', ativarSom, { once: true });
})();
</script>
<script>
(function () {
  var _clickSom = new Audio('../sons/click.mp3');
  _clickSom.preload = 'auto';
  document.addEventListener('click', function (e) {
    var alvo = e.target.closest('button');
    if (alvo) { try { _clickSom.currentTime = 0; _clickSom.volume = (typeof volumeEfetivo === 'function' ? volumeEfetivo() : 0.35); _clickSom.play().catch(function () {}); } catch (err) {} }
  }, true);
})();
</script>
<div id="controle-volume">
  <button id="btn-mute" onclick="alternarMudo()" aria-label="Mute or unmute sound">🔊</button>
  <input type="range" id="slider-volume" min="0" max="100" value="35" oninput="ajustarVolume(this.value)" aria-label="Volume">
</div>
</body>
</html>
