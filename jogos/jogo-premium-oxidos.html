<!DOCTYPE html>
<html lang="en">
<head>

  <title>The Pavilion of Oxides � Premium Game | KiF�cil</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --fundo: #fdf8f0;
      --fundo-card: #fffdf9;
      --escuro: #2e2016;
      --texto: #1a1208;
      --texto-suave: #3d2e1a;
      --dourado: #8a5e10;
      --dourado-claro: #c8920a;
      --borda: rgba(100,70,20,0.3);
      --borda-forte: rgba(100,70,20,0.5);

    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-nav {

    }
    .brand {

    /* MAIN */

    }

    .narrador {
      display: flex;

    .narrador img {

    }

    /* PALCO DE ANIMA��O */
    .imagem-wrapper {
      position: relative;
      display: flex;
      justify-content: center;

    .cena-fundo {

    /* C�mara de rea��o com indicador */
    .camara-reacao {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 3; text-align: center;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 16px 22px;

    /* Classifica��o por categoria */
    .jogo-associacao { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 30px; padding: 6%; flex-wrap: wrap; }

    .associado { border-color: var(--verde-escuro); background: rgba(30,82,56,.12); cursor: default; opacity: 0.85; }

    /* Blocos de nomenclatura */
    .formula-alvo {
      display: inline-block; background: var(--fundo); border: 1.5px solid var(--dourado-claro); border-radius: 6px;

    .blocos-disponiveis { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip-bloco {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px; padding: 0.4rem 0.8rem;

    .placa-dourada {
      position: absolute; bottom: 20px; left: 50%; transform: translate(-50%, 10px);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700;

      padding: 0.65rem 1.3rem; border-radius: 8px; border: 1px solid #a97c1f;
      box-shadow: 0 3px 12px rgba(0,0,0,.3); text-align: center; max-width: 92%;
      opacity: 0; animation: placaIn .5s ease forwards; z-index: 6; pointer-events: none;
    }
    @keyframes placaIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* PAINEL DE INTERA��O */
    #painelInteracao { max-width: 900px; margin: 1.2rem auto 0; }
    .interacao-painel {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.4rem 1.6rem 1.3rem;
    }
    .interacao-pergunta-texto {
      font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600;
      line-height: 1.35; margin-bottom: 1rem;
    }
    .opcoes-linha { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .btn-opcao {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px;
      padding: 0.55rem 1.1rem; font-family: 'Libre Baskerville', serif; font-size: 0.95rem;
      color: var(--texto); cursor: pointer; transition: border-color .2s, background .2s;
    }
    .btn-opcao:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .btn-opcao:disabled { cursor: default; opacity: 0.75; }
    .opcao-certa { border-color: var(--verde-escuro) !important; background: rgba(30,82,56,0.12); }

    .btn-continuar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 0.6rem 1.5rem;

    }
    .btn-continuar:hover { background: var(--dourado-claro); color: #1e1008; }
    .btn-continuar:disabled { opacity: 0.4; cursor: default; }
    .btn-continuar:disabled:hover { background: #1e1008; color: var(--dourado-claro); }

    /* Bot�o continuar dentro do bal�o da professora */
    #continuarBalao { margin-top: 0.6rem; }
    #continuarBalao .btn-continuar { display: inline-block; margin: 0; }

    .modal-feedback {

    .feedback-errado  { color: var(--vermelho-escuro); font-weight: 700; }

      padding: 1.2rem 1.6rem; max-width: 88%; text-align: left;

    .quadro-resumo-final .resumo-linha {
      font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--texto);
      padding: 0.45rem 0; border-bottom: 1px solid var(--borda);
    }
    .quadro-resumo-final .resumo-linha:last-child { border-bottom: none; }

    /* CONCLUS�O */
    .conclusao {
      display: none; margin-top: 2rem; background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 2.4rem 2rem; text-align: center;
    }
    .conclusao.visivel { display: block; }
    .conclusao-titulo {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 600; margin-bottom: 0.8rem;
    }
    .conclusao-placar { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--dourado-claro); margin-bottom: 1rem; }
    .conclusao-mensagem { font-size: 0.93rem; color: var(--texto-suave); max-width: 460px; margin: 0 auto 2rem; line-height: 1.8; }
    .btn-reiniciar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.7rem 2rem; border-radius: 4px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-reiniciar:hover { background: var(--dourado-claro); color: #1e1008; }

    /* FOOTER */
    footer {
      background: var(--escuro); border-top: 2px solid var(--dourado-claro);
      padding: .6rem 2rem; text-align: center; font-size: 0.78rem; color: rgba(255,248,238,0.5);
    }

    @media (min-width: 641px) {
      .narrador { max-width: 900px; margin: 0 auto .8rem; }
      .narrador-texto { font-size: 1.05rem; }
    }

    @media (max-width: 640px) {
      .top-nav { padding: 0 1.2rem; gap: 1.2rem; }
      main { padding: .8rem 1rem 1rem; }
      .interacao-painel { padding: 1.2rem 1rem; }

      .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .link-aula svg { width: 18px; height: 18px; }
    }
  
    /* AUDIO CONTROL */
    #controle-volume {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(14,6,0,0.85);
      border: 1.5px solid var(--borda-forte);
      border-radius: 24px;
      padding: 8px 16px 8px 10px;
    }
    #btn-mute {
      background: none;
      border: none;
      color: var(--dourado-claro);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #slider-volume {
      width: 90px;
      accent-color: var(--dourado-claro);
      cursor: pointer;
    }
</style>

<main>
  <h1 class="titulo-jogo">The Pavilion of Oxides</h1>
  <p class="subtitulo">Investigate substances formed by two elements, one of them oxygen � before memorizing any rule.</p>

  <div class="narrador">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Professor Rafaela" />

      <div class="narrador-nome">Professor Rafaela</div>

</div>

    <button class="btn-reiniciar" onclick="reiniciar()">Play again</button>
  </div>

<footer>� 2026 KiF�cil</footer>

<script>
/* ==========================================================
   DOM REFERENCES
   ========================================================== */
const overlay = document.getElementById('overlayAnimacao');
const painel  = document.getElementById('painelInteracao');
const continuarBalao = document.getElementById('continuarBalao');

function fala(texto) { document.getElementById('narradorTexto').textContent = texto; }

const _brilho = new Audio('../sons/brilho.MP3');
_brilho.preload = 'auto';
function tocarBrilho() { try { _brilho.currentTime = 0; _brilho.play().catch(() => {}); } catch (e) {} }

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

let timersAtivos = [];
function agendar(fn, ms) { const id = setTimeout(fn, ms); timersAtivos.push(id); return id; }
function limparTimers() { timersAtivos.forEach(clearTimeout); timersAtivos = []; }

/* ==========================================================
   DATA: OXIDE NOMENCLATURE
   ========================================================== */
const NOMENCLATURA_OXIDO = {
  Na2O: ['SODIUM', 'OXIDE'],
  Al2O3: ['ALUMINUM', 'OXIDE'],
  FeO: ['IRON', '(II)', 'OXIDE'],
  Fe2O3: ['IRON', '(III)', 'OXIDE']
};
const FORMULAS_OXIDO = { Na2O: 'Na2O', Al2O3: 'Al2O3', FeO: 'FeO', Fe2O3: 'Fe2O3' };

/* ==========================================================
   COMPONENT: REACTION CHAMBER WITH INDICATOR
   ========================================================== */
function criarCamaraReacao(id, formulaTexto) {
  const div = document.createElement('div');
  div.className = 'camara-reacao';
  div.id = id;
  div.innerHTML =
    '<div class="camara-formula">' + formulaTexto + '</div>' +
    '<div class="indicador-cor" id="indicador-' + id + '"></div>' +
    '<div class="camara-legenda" id="legenda-' + id + '">Phenolphthalein: colorless</div>';
  return div;
}
function definirIndicador(id, tipo) {
  const ind = document.getElementById('indicador-' + id);
  const leg = document.getElementById('legenda-' + id);
  if (!ind) return;
  ind.classList.remove('indicador-basico');
  if (tipo === 'basico') { ind.classList.add('indicador-basico'); leg.textContent = 'Phenolphthalein: turned pink (basic medium)'; }
  else if (tipo === 'acido') { leg.textContent = 'Phenolphthalein: stays colorless (acidic medium)'; }
}

/* ==========================================================
   INTERACTION HELPERS
   ========================================================== */
function botaoContinuar(delayMs) {
  delayMs = delayMs || 0;
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue ?';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', avancar);
  return btn;
}

function botaoContinuarLocal(handler, delayMs) {
  delayMs = delayMs || 0;
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue ?';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', function () { btn.disabled = true; handler(); });
  return btn;
}

function escolhaBotoes(opts) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">' + opts.pergunta + '</div>' +
    '<div class="opcoes-linha" id="opcoesLinha"></div>' +
    '<div class="modal-feedback" id="feedbackEscolha"></div>';
  painel.appendChild(wrap);

  const opcoesLinha = wrap.querySelector('#opcoesLinha');
  const feedback = wrap.querySelector('#feedbackEscolha');
  let tentativas = 0;
  let resolvido = false;

  opts.opcoes.forEach(function (op) {
    const btn = document.createElement('button');
    btn.className = 'btn-opcao';
    btn.textContent = op.rotulo;
    btn.addEventListener('click', function () {
      if (resolvido) return;
      if (op.correta) {
        resolvido = true;
        tocarDing();
        Array.from(opcoesLinha.children).forEach(function (b) { b.disabled = true; });
        btn.classList.add('opcao-certa');
        feedback.className = 'modal-feedback visivel';
        feedback.innerHTML = '<span class="feedback-certo">Correct!</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
        opts.aoAcertar();
      } else {
        tentativas++;
        btn.classList.add('opcao-errada');
        if (tentativas === 1 && opts.dica) {
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-errado">' + opts.dica + '</span>';
        } else if (tentativas >= 2) {
          resolvido = true;
          Array.from(opcoesLinha.children).forEach(function (b, i) {
            b.disabled = true;
            if (opts.opcoes[i].correta) b.classList.add('opcao-certa');
          });
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-resposta">Correct answer highlighted.</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
          opts.aoAcertar();
        }
      }
    });
    opcoesLinha.appendChild(btn);
  });
}

/* ==========================================================
   CLASSIFICATION BY CATEGORY
   ========================================================== */
function criarClassificacaoPorCategoria(itens, categorias, mensagemErro, mensagemSucesso) {
  const container = document.createElement('div');
  container.className = 'jogo-associacao';
  overlay.appendChild(container);

  const colCategorias = document.createElement('div'); colCategorias.className = 'coluna-associacao';
  const colItens = document.createElement('div'); colItens.className = 'coluna-associacao';
  container.appendChild(colCategorias); container.appendChild(colItens);

  const itensEmbaralhados = itens.slice().sort(function () { return Math.random() - 0.5; });

  let categoriaAtiva = null, acertos = 0;
  const elCategorias = {};

  categorias.forEach(function (cat) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = cat;
    colCategorias.appendChild(el);
    elCategorias[cat] = el;
    el.addEventListener('click', function () {
      Object.keys(elCategorias).forEach(function (k) { elCategorias[k].classList.remove('item-selecionado'); });
      el.classList.add('item-selecionado');
      categoriaAtiva = cat;
    });
  });

  itensEmbaralhados.forEach(function (it) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = it.rotulo;
    colItens.appendChild(el);
    el.addEventListener('click', function () {
      if (el.classList.contains('associado')) return;
      if (!categoriaAtiva) {
        fala('First choose a category on the left.');
        return;
      }
      if (it.categoria === categoriaAtiva) {
        el.classList.add('associado');
        tocarDing();
        acertos++;
        if (acertos === itens.length) {
          agendar(function () { fala(mensagemSucesso); botaoContinuar(400); }, 300);
        }
      } else {
        fala(mensagemErro);
        el.classList.add('erro-flash');
        setTimeout(function () { el.classList.remove('erro-flash'); }, 500);
      }
    });
  });
}

/* ==========================================================
   BUILDING THE NAME FROM BLOCKS
   ========================================================== */
function montarNomeOxido(chave, aoConcluir) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">Build the name by clicking the blocks, in the correct order.</div>' +
    '<div class="formula-alvo">' + FORMULAS_OXIDO[chave] + '</div>' +
    '<div class="montagem-nome" id="montagemNome"></div>' +
    '<div class="blocos-disponiveis" id="blocosDisponiveis"></div>' +
    '<div class="modal-feedback" id="fbNomenclatura"></div>';
  painel.appendChild(wrap);

  const sequenciaCorreta = NOMENCLATURA_OXIDO[chave];
  const montagemEl = wrap.querySelector('#montagemNome');
  const blocosEl = wrap.querySelector('#blocosDisponiveis');
  const fb = wrap.querySelector('#fbNomenclatura');
  let progresso = 0;

  const blocosEmbaralhados = sequenciaCorreta.slice().sort(function () { return Math.random() - 0.5; });
  blocosEmbaralhados.forEach(function (bloco) {
    const chip = document.createElement('button');
    chip.className = 'chip-bloco';
    chip.type = 'button';
    chip.textContent = bloco;
    chip.addEventListener('click', function () {
      if (chip.disabled) return;
      if (bloco === sequenciaCorreta[progresso]) {
        tocarDing();
        chip.disabled = true;
        chip.classList.add('chip-usado');
        const tag = document.createElement('span');
        tag.className = 'bloco-montado';
        tag.textContent = bloco;
        montagemEl.appendChild(tag);
        progresso++;
        if (progresso === sequenciaCorreta.length) {
          fb.className = 'modal-feedback visivel';
          fb.innerHTML = '<span class="feedback-certo">Correct!</span><p class="feedback-explicacao">' + FORMULAS_OXIDO[chave] + ' ? ' + sequenciaCorreta.join(' ').toLowerCase() + '</p>';
          Array.from(blocosEl.children).forEach(function (b) { b.disabled = true; });
          aoConcluir();
        }
      } else {
        chip.classList.add('erro-flash');
        setTimeout(function () { chip.classList.remove('erro-flash'); }, 500);
      }
    });
    blocosEl.appendChild(chip);
  });
}

/* ==========================================================
   INTRODUCTION
   ========================================================== */
function passoIntro() {
  fala('Today we\'re going to investigate substances formed by just two elements, one of them oxygen. But do all oxides behave the same way?');
  const btn = document.createElement('button');
  btn.className = 'btn-continuar btn-iniciar-investigacao';
  btn.textContent = 'START THE INVESTIGATION';
  overlay.appendChild(btn);
  btn.addEventListener('click', avancar);
}

/* ==========================================================
   STAGE 1 � RECOGNIZING AN OXIDE
   ========================================================== */
function passoReconhecer() {
  fala('Match each formula to the right category: is it an oxide, or not?');
  criarClassificacaoPorCategoria([
    { rotulo: 'Na2O', categoria: 'Is an oxide' },
    { rotulo: 'CO2', categoria: 'Is an oxide' },
    { rotulo: 'SO3', categoria: 'Is an oxide' },
    { rotulo: 'CaO', categoria: 'Is an oxide' },
    { rotulo: 'NaCl', categoria: 'Not an oxide' },
    { rotulo: 'H2SO4', categoria: 'Not an oxide' }
  ], ['Is an oxide', 'Not an oxide'],
  'Notice how many different elements appear in the formula, and whether oxygen is present.',
  'Very good!');
}
function passoReconhecerPergunta() {
  fala('What do Na2O, CO2, SO3 and CaO have in common?');
  escolhaBotoes({
    pergunta: 'What do these formulas have in common?',
    opcoes: [
      { rotulo: 'They have only two elements and one of them is oxygen', correta: true },
      { rotulo: 'They always have hydrogen', correta: false },
      { rotulo: 'They have three elements', correta: false }
    ],
    dica: 'Count how many different elements appear in each formula.',
    explicacao: 'Oxides are binary compounds (two elements) in which oxygen is bonded to another element. This is a general rule � there are special oxygen compounds we\'ll see further ahead.',
    aoAcertar: function () { botaoContinuar(400); }
  });
}

/* ==========================================================
   STAGE 2 � METAL OR NONMETAL
   ========================================================== */
function passoMetalOuAmetal() {
  fala('Notice which element is bonded to oxygen in each oxide.');
  criarClassificacaoPorCategoria([
    { rotulo: 'Na2O', categoria: 'Metal + Oxygen' },
    { rotulo: 'CaO', categoria: 'Metal + Oxygen' },
    { rotulo: 'CO2', categoria: 'Nonmetal + Oxygen' },
    { rotulo: 'SO3', categoria: 'Nonmetal + Oxygen' }
  ], ['Metal + Oxygen', 'Nonmetal + Oxygen'],
  'Identify whether the element bonded to oxygen is a metal or a nonmetal.',
  'This division helps us predict the behavior of many oxides.');
}
function passoRegraMetalAmetal() {
  const placa = document.createElement('div');
  placa.className = 'placa-dourada';
  placa.textContent = 'Metal oxide ? basic tendency  |  Nonmetal oxide ? acidic tendency';
  overlay.appendChild(placa);
  fala('As a general tendency: metal oxide usually behaves as a base, and nonmetal oxide usually behaves as an acid. It\'s a tendency, not a rule without exceptions.');
  painel.innerHTML = '';
  botaoContinuar(700);
}

/* ==========================================================
   STAGE 3 � METALLIC OXIDE IN WATER
   ========================================================== */
function passoOxidoMetalicoAgua() {
  fala('Let\'s test an oxide formed by a metal: CaO. We\'ll use phenolphthalein as an indicator � it turns pink in a basic medium, and stays colorless in an acidic or neutral medium.');
  const camara = criarCamaraReacao('cam-cao', 'CaO');
  overlay.appendChild(camara);

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'ADD WATER';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    document.getElementById('cam-cao').querySelector('.camara-formula').textContent = 'CaO + H2O ? Ca(OH)2';
    definirIndicador('cam-cao', 'basico');
    fala('The CaO reacted with the water forming Ca(OH)2 � the phenolphthalein turned pink, indicating a basic medium. In this example, the metallic oxide reacted with water forming a base. (Not every metallic oxide reacts easily with water.)');
    painel.innerHTML = '';
    botaoContinuar(700);
  });
}

/* ==========================================================
   STAGE 4 � NONMETAL OXIDE IN WATER
   ========================================================== */
function passoOxidoAmetalAgua() {
  fala('Now let\'s test an oxide formed by a nonmetal: SO3.');
  const camara = criarCamaraReacao('cam-so3', 'SO3');
  overlay.appendChild(camara);

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'ADD WATER';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    document.getElementById('cam-so3').querySelector('.camara-formula').textContent = 'SO3 + H2O ? H2SO4';
    definirIndicador('cam-so3', 'acido');
    fala('The SO3 reacted with the water forming H2SO4 � but the phenolphthalein stays colorless, because this indicator only changes color in a basic medium; in an acidic medium, like now, or a neutral one, it remains clear. CO2 reacts in a similar way too: CO2 + H2O ? H2CO3. Many nonmetal oxides produce acidic media in water.');
    painel.innerHTML = '';
    botaoContinuar(700);
  });
}

/* ==========================================================
   STAGE 5 � REACTION WITH ACIDS AND BASES
   ========================================================== */
function passoOxidoBasicoComAcido() {
  fala('CaO (a basic oxide) reacts with HCl. What are the products?');
  escolhaBotoes({
    pergunta: 'CaO + 2HCl ? ?',
    opcoes: [
      { rotulo: 'CaCl2 + H2O', correta: true },
      { rotulo: 'CaCl2 only', correta: false },
      { rotulo: 'Ca(OH)2 + Cl2', correta: false }
    ],
    dica: 'A basic oxide reacting with an acid forms salt and water, like a neutralization.',
    explicacao: 'CaO + 2HCl ? CaCl2 + H2O. A basic oxide can react with an acid, forming salt and water.',
    aoAcertar: function () { botaoContinuarLocal(passoOxidoAcidoComBase, 400); }
  });
}
function passoOxidoAcidoComBase() {
  fala('Now SO3 (an acidic oxide) reacts with NaOH. What are the products?');
  escolhaBotoes({
    pergunta: 'SO3 + 2NaOH ? ?',
    opcoes: [
      { rotulo: 'Na2SO4 + H2O', correta: true },
      { rotulo: 'Na2SO3 + H2', correta: false },
      { rotulo: 'NaOH + SO3 (no reaction)', correta: false }
    ],
    dica: 'An acidic oxide reacting with a base also forms salt and water.',
    explicacao: 'SO3 + 2NaOH ? Na2SO4 + H2O. An acidic oxide can react with a base, forming salt and water.',
    aoAcertar: function () { botaoContinuar(400); }
  });
}

/* ==========================================================
   STAGE 6 � BUILDING THE FORMULA (OXIDATION NUMBER)
   ========================================================== */
function passoFormulaNa() {
  fala('Sodium has an oxidation number of +1. Oxygen has an oxidation number of -2. Which formula makes the sum of the charges equal zero?');
  escolhaBotoes({
    pergunta: 'Na (+1) and O (-2): which formula is electrically neutral?',
    opcoes: [
      { rotulo: 'NaO', correta: false },
      { rotulo: 'Na2O', correta: true },
      { rotulo: 'NaO2', correta: false }
    ],
    dica: 'The sum of the charges needs to equal zero.',
    explicacao: 'Na2O: 2 � (+1) + 1 � (-2) = 0. That\'s why we need 2 atoms of Na for every atom of O.',
    aoAcertar: function () { botaoContinuarLocal(passoFormulaAl, 400); }
  });
}
function passoFormulaAl() {
  fala('Now aluminum, with an oxidation number of +3.');
  escolhaBotoes({
    pergunta: 'Al (+3) and O (-2): which formula is electrically neutral?',
    opcoes: [
      { rotulo: 'AlO', correta: false },
      { rotulo: 'Al3O2', correta: false },
      { rotulo: 'Al2O3', correta: true }
    ],
    dica: 'Look for the combination where the sum of the charges is exactly zero.',
    explicacao: 'Al2O3: 2 � (+3) + 3 � (-2) = +6 - 6 = 0.',
    aoAcertar: function () { botaoContinuar(400); }
  });
}

/* ==========================================================
   STAGE 7 � NOMENCLATURE (SINGLE OXIDATION NUMBER)
   ========================================================== */
function passoNomenclaturaNa2O() {
  fala('When an element forms only one common oxide, the name is "[element name] + oxide". Build the name for Na2O.');
  montarNomeOxido('Na2O', function () {
    agendar(function () { botaoContinuarLocal(passoNomenclaturaAl2O3, 400); }, 300);
  });
}
function passoNomenclaturaAl2O3() {
  fala('Now build the name for Al2O3.');
  montarNomeOxido('Al2O3', function () {
    agendar(function () { botaoContinuar(400); }, 300);
  });
}

/* ==========================================================
   STAGE 8 � ELEMENT WITH MORE THAN ONE OXIDATION NUMBER (IRON)
   ========================================================== */
function passoNomenclaturaFeO() {
  fala('Iron forms two different oxides: in FeO, iron has an oxidation number of +2; in Fe2O3, it\'s +3. We use Stock nomenclature: the element name + the oxidation number in Roman numerals + "oxide". Build the name for FeO.');
  montarNomeOxido('FeO', function () {
    agendar(function () { botaoContinuarLocal(passoNomenclaturaFe2O3, 400); }, 300);
  });
}
function passoNomenclaturaFe2O3() {
  fala('Now build the name for Fe2O3.');
  montarNomeOxido('Fe2O3', function () {
    agendar(function () {
      fala('FeO can also be called ferrous oxide, and Fe2O3 ferric oxide � alternative traditional names. But "iron(II)" and "iron(III)" indicate the oxidation number more directly.');
      botaoContinuar(600);
    }, 300);
  });
}

/* ==========================================================
   STAGE 9 � NONMETAL OXIDES (PREFIXES)
   ========================================================== */
function passoPrefixosAmetais() {
  fala('SO2 and SO3 have the same sulfur, but different amounts of oxygen. To tell them apart, we use prefixes: di-, tri-.');
  const linha = document.createElement('div');
  linha.className = 'linha-cartas-simples';
  ['CO2', 'SO2', 'SO3'].forEach(function (t) {
    const c = document.createElement('div');
    c.className = 'cartao-formula-simples';
    c.textContent = t;
    linha.appendChild(c);
  });
  overlay.appendChild(linha);

  escolhaBotoes({
    pergunta: 'What is SO3 called, which has three oxygen atoms?',
    opcoes: [
      { rotulo: 'Sulfur monoxide', correta: false },
      { rotulo: 'Sulfur dioxide', correta: false },
      { rotulo: 'Sulfur trioxide', correta: true }
    ],
    dica: 'Count the oxygen atoms: mono- (1), di- (2), tri- (3).',
    explicacao: 'CO2 ? carbon dioxide. SO2 ? sulfur dioxide. SO3 ? sulfur trioxide (also traditionally called sulfuric anhydride).',
    aoAcertar: function () { botaoContinuar(400); }
  });
}

/* ==========================================================
   FINAL
   ========================================================== */
function passoFinal() {
  fala('Excellent. Now you can recognize, formulate, classify and name different oxides.');
  function linha(txt) { return '<div class="resumo-linha">' + txt + '</div>'; }
  overlay.innerHTML =
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:12px;">' +
    '<div class="quadro-resumo-final">' +
    linha('Oxides are binary compounds with oxygen.') +
    linha('Metal + oxygen tends to form a basic oxide; nonmetal + oxygen tends to form an acidic oxide.') +
    linha('The formula is built so that the sum of the oxidation numbers equals zero.') +
    linha('The nomenclature uses "[element] + oxide", the oxidation number in Roman numerals, or prefixes (di-, tri-).') +
    '</div></div>';
  painel.innerHTML = '';
  const conclusao = document.getElementById('conclusao');
  document.getElementById('conclusaoPlacar').textContent = 'Stage complete';
  document.getElementById('conclusaoMensagem').textContent = 'You investigated oxides: what characterizes them, how they react with water, acids and bases, how to build their formulas using electrical neutrality, and how to name them.';
  conclusao.classList.add('visivel');
  conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ==========================================================
   STAGE ENGINE
   ========================================================== */
const PASSOS = [
  passoIntro, passoReconhecer, passoReconhecerPergunta,
  passoMetalOuAmetal, passoRegraMetalAmetal,
  passoOxidoMetalicoAgua, passoOxidoAmetalAgua,
  passoOxidoBasicoComAcido,
  passoFormulaNa,
  passoNomenclaturaNa2O,
  passoNomenclaturaFeO,
  passoPrefixosAmetais,
  passoFinal
];
let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  PASSOS[i]();
}
function avancar() { if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1); }
function reiniciar() {
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* -- INIT -- */
irPara(0);
</script>

<script>
let volumeSalvo = parseFloat(localStorage.getItem('kifacil_volume'));
if (isNaN(volumeSalvo)) volumeSalvo = 0.35;
let silenciado = localStorage.getItem('kifacil_silenciado') === '1';
let musicaFundo = null;

function volumeEfetivo() {
  return silenciado ? 0 : volumeSalvo;
}

function iniciarMusicaFundo() {
  if (musicaFundo) return;
  try {
    musicaFundo = new Audio('../sons/natureza.mp3');
    musicaFundo.loop = true;
    musicaFundo.volume = volumeEfetivo();
    musicaFundo.play().catch(function () {});
  } catch (e) {}
}

function atualizarIconeMudo() {
  const botao = document.getElementById('btn-mute');
  if (!botao) return;
  if (silenciado || volumeSalvo === 0) botao.textContent = '??';
  else if (volumeSalvo < 0.5) botao.textContent = '??';
  else botao.textContent = '??';
}

function alternarMudo() {
  silenciado = !silenciado;
  localStorage.setItem('kifacil_silenciado', silenciado ? '1' : '0');
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

function ajustarVolume(valorSlider) {
  volumeSalvo = Math.max(0, Math.min(1, valorSlider / 100));
  localStorage.setItem('kifacil_volume', volumeSalvo);
  if (volumeSalvo > 0 && silenciado) {
    silenciado = false;
    localStorage.setItem('kifacil_silenciado', '0');
  }
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

(function iniciarControleVolume() {
  const slider = document.getElementById('slider-volume');
  if (slider) slider.value = Math.round(volumeSalvo * 100);
  atualizarIconeMudo();
  iniciarMusicaFundo();

  const ativarSom = function () {
    if (!musicaFundo) iniciarMusicaFundo();
    if (musicaFundo) {
      musicaFundo.volume = volumeEfetivo();
      musicaFundo.play().catch(function () {});
    }
  };
  window.addEventListener('pointerdown', ativarSom, { once: true });
  window.addEventListener('keydown', ativarSom, { once: true });
})();
</script>
<script>
(function () {
  var _clickSom = new Audio('../sons/click.mp3');
  _clickSom.preload = 'auto';
  document.addEventListener('click', function (e) {
    var alvo = e.target.closest('button');
    if (alvo) { try { _clickSom.currentTime = 0; _clickSom.volume = (typeof volumeEfetivo === 'function' ? volumeEfetivo() : 0.35); _clickSom.play().catch(function () {}); } catch (err) {} }
  }, true);
})();
</script>
<div id="controle-volume">
  <button id="btn-mute" onclick="alternarMudo()" aria-label="Mute or unmute sound">🔊</button>
  <input type="range" id="slider-volume" min="0" max="100" value="35" oninput="ajustarVolume(this.value)" aria-label="Volume">
</div>
</body>
