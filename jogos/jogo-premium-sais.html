<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Salts — Premium Game | KiFácil</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --fundo: #fdf8f0;
      --fundo-card: #fffdf9;
      --escuro: #2e2016;
      --texto: #1a1208;
      --texto-suave: #3d2e1a;
      --dourado: #8a5e10;
      --dourado-claro: #c8920a;
      --borda: rgba(100,70,20,0.3);
      --borda-forte: rgba(100,70,20,0.5);
      --verde-escuro: #1e5238;
      --vermelho-escuro: #7a1515;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-nav {
      background: #1e1008;
      border-bottom: 2px solid var(--dourado-claro);
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #fff8ee;
      letter-spacing: 0.03em;
      margin-right: auto;
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 1rem;
      width: 100%;
    }
    .titulo-jogo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.7rem, 3.8vw, 2.5rem);
      font-weight: 600;
      margin-bottom: 0.3rem;
      line-height: 1.1;
    }
    .subtitulo {
      font-size: 1rem;
      color: var(--texto);
      margin-bottom: .9rem;
      max-width: 680px;
    }

    .narrador {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: .8rem;
      padding: .8rem 1.1rem;
      border: 1.5px solid var(--borda-forte);
      border-radius: 10px;
      background: rgba(30,16,8,0.05);
    }
    .narrador img {
      width: 68px;
      height: 84px;
      object-fit: cover;
      object-position: top center;
      border-radius: 10px;
      border: 1px solid rgba(200,146,10,.35);
      flex-shrink: 0;
    }
    .narrador-nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dourado-claro);
      margin-bottom: 0.3rem;
    }
    .narrador-texto {
      font-size: 1rem;
      line-height: 1.5;
      color: var(--texto-suave);
      min-height: 3.4em;
    }

    /* ANIMATION STAGE */
    .imagem-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(100%, 900px);
      max-height: 62vh;
      min-height: 380px;
      margin: 0 auto;
      cursor: default;
      border: 1.5px solid var(--borda-forte);
      border-radius: 6px;
      overflow: hidden;
      background: #f7efe2;
    }
    .cena-fundo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .overlay-animacao { position: absolute; inset: 0; }

    .link-aula {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: #fff8ee;
      background: rgba(30,16,8,0.72); border: 1.5px solid var(--dourado-claro, #c8920a);
      border-radius: 8px; padding: 0.4rem 0.65rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.02em; text-align: center; line-height: 1.2;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .link-aula:hover { background: rgba(30,16,8,0.92); transform: translateY(-1px); }
    .link-aula svg { width: 22px; height: 22px; }

    .frasco-rotulo { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 0.72rem; color: var(--texto-suave); margin-top: 2px; }

    /* Simple formula/ion card */
    .cartao-formula-simples {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 8px; padding: 0.5rem 1rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.1rem; color: var(--texto);
    }
    .linha-cartas-simples { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap; padding: 6%; }
    .coluna-lado {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px; padding: 12px 16px;
    }
    .coluna-lado .rotulo-lado {
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.9rem; color: var(--dourado-claro);
    }

    /* Circuit / light bulb */
    .circuito-visual {
      position: absolute; left: 50%; top: 38%; transform: translate(-50%, -50%); text-align: center; z-index: 3;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 14px 20px;
    }
    .ion-movendo { animation: moverIon 1.4s ease-in-out infinite alternate; }
    @keyframes moverIon { from { transform: translateX(-14px); } to { transform: translateX(14px); } }

    /* Nomenclature blocks */
    .montagem-nome { display: flex; gap: 6px; flex-wrap: wrap; min-height: 34px; margin-bottom: 0.6rem; }
    .bloco-montado {
      background: rgba(30,82,56,.12); border: 1.5px solid var(--verde-escuro); border-radius: 6px; padding: 0.3rem 0.6rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; color: var(--verde-escuro);
    }
    .blocos-disponiveis { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip-bloco {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px; padding: 0.4rem 0.8rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.95rem; color: var(--texto); cursor: pointer;
    }
    .chip-bloco:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .chip-usado { opacity: 0.4; cursor: default; }
    .erro-flash { outline: 3px solid var(--vermelho-escuro); border-radius: 8px; }

    .placa-dourada {
      position: absolute; bottom: 20px; left: 50%; transform: translate(-50%, 10px);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: clamp(0.95rem, 2.4vw, 1.2rem);
      padding: 0.65rem 1.3rem; border-radius: 8px; border: 1px solid #a97c1f;
      box-shadow: 0 3px 12px rgba(0,0,0,.3); text-align: center; max-width: 92%;
      opacity: 0; animation: placaIn .5s ease forwards; z-index: 6; pointer-events: none;
    }
    @keyframes placaIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* INTERACTION PANEL */
    #painelInteracao { max-width: 900px; margin: 1.2rem auto 0; }
    .interacao-painel {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.4rem 1.6rem 1.3rem;
    }
    .interacao-pergunta-texto {
      font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600;
      line-height: 1.35; margin-bottom: 1rem;
    }
    .opcoes-linha { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .btn-opcao {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px;
      padding: 0.55rem 1.1rem; font-family: 'Libre Baskerville', serif; font-size: 0.95rem;
      color: var(--texto); cursor: pointer; transition: border-color .2s, background .2s;
    }
    .btn-opcao:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .btn-opcao:disabled { cursor: default; opacity: 0.75; }
    .opcao-certa { border-color: var(--verde-escuro) !important; background: rgba(30,82,56,0.12); }
    .opcao-errada { border-color: var(--vermelho-escuro) !important; background: rgba(122,21,21,0.08); }

    .btn-continuar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 0.6rem 1.5rem;
      border-radius: 4px; cursor: pointer; transition: background 0.2s, color 0.2s, opacity .2s;
      display: block; margin: 0.2rem auto 0;
    }
    .btn-continuar:hover { background: var(--dourado-claro); color: #1e1008; }
    .btn-continuar:disabled { opacity: 0.4; cursor: default; }
    .btn-continuar:disabled:hover { background: #1e1008; color: var(--dourado-claro); }

    /* Continue button inside the teacher's speech bubble */
    #continuarBalao { margin-top: 0.6rem; }
    #continuarBalao .btn-continuar { display: inline-block; margin: 0; }

    .modal-feedback {
      margin-top: 1rem; font-size: 0.86rem; line-height: 1.7;
      border-left: 3px solid var(--borda-forte); padding-left: 1rem; display: none;
    }
    .modal-feedback.visivel { display: block; }
    .feedback-certo   { color: var(--verde-escuro); font-weight: 700; }
    .feedback-errado  { color: var(--vermelho-escuro); font-weight: 700; }
    .feedback-explicacao { color: var(--texto); margin-top: 0.5rem; }

    .quadro-resumo-final {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.2rem 1.6rem; max-width: 88%; text-align: left;
    }
    .quadro-resumo-final .resumo-linha {
      font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--texto);
      padding: 0.45rem 0; border-bottom: 1px solid var(--borda);
    }
    .quadro-resumo-final .resumo-linha:last-child { border-bottom: none; }

    /* CONCLUSION */
    .conclusao {
      display: none; margin-top: 2rem; background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 2.4rem 2rem; text-align: center;
    }
    .conclusao.visivel { display: block; }
    .conclusao-titulo {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 600; margin-bottom: 0.8rem;
    }
    .conclusao-placar { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--dourado-claro); margin-bottom: 1rem; }
    .conclusao-mensagem { font-size: 0.93rem; color: var(--texto-suave); max-width: 460px; margin: 0 auto 2rem; line-height: 1.8; }
    .btn-reiniciar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.7rem 2rem; border-radius: 4px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-reiniciar:hover { background: var(--dourado-claro); color: #1e1008; }

    /* FOOTER */
    footer {
      background: var(--escuro); border-top: 2px solid var(--dourado-claro);
      padding: .6rem 2rem; text-align: center; font-size: 0.78rem; color: rgba(255,248,238,0.5);
    }

    @media (min-width: 641px) {
      .narrador { max-width: 900px; margin: 0 auto .8rem; }
      .narrador-texto { font-size: 1.05rem; }
    }

    @media (max-width: 640px) {
      .top-nav { padding: 0 1.2rem; gap: 1.2rem; }
      main { padding: .8rem 1rem 1rem; }
      .interacao-painel { padding: 1.2rem 1rem; }
      .placa-dourada { font-size: 0.82rem; padding: 0.5rem 0.85rem; }
      .cartao-formula-simples { font-size: 0.95rem; padding: 0.4rem 0.8rem; }
      .coluna-lado { padding: 8px 10px; }
      .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .link-aula svg { width: 18px; height: 18px; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">KiFácil</div>
</nav>

<main>
  <h1 class="titulo-jogo">Salts</h1>
  <p class="subtitulo">Discover what happens when an acid meets a base — and where salts come from.</p>

  <div class="narrador">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Professor Rafaela" />
    <div style="flex: 1;">
      <div class="narrador-nome">Professor Rafaela</div>
      <div class="narrador-texto" id="narradorTexto">Let's begin.</div>
      <div id="continuarBalao"></div>
    </div>
  </div>

  <div class="imagem-wrapper" id="imagemWrapper">
    <img src="../imagens/sala-dos-sais.jpg" alt="Salts Room" class="cena-fundo" />
    <div class="overlay-animacao" id="overlayAnimacao"></div>
</div>

  <div id="painelInteracao"></div>

  <div class="conclusao" id="conclusao">
    <div class="conclusao-titulo">Study Complete</div>
    <div class="conclusao-placar" id="conclusaoPlacar"></div>
    <p class="conclusao-mensagem" id="conclusaoMensagem"></p>
    <button class="btn-reiniciar" onclick="reiniciar()">Play Again</button>
  </div>
</main>

<footer>© 2026 KiFácil</footer>

<script>
/* ==========================================================
   DOM REFERENCES
   ========================================================== */
const overlay = document.getElementById('overlayAnimacao');
const painel  = document.getElementById('painelInteracao');
const continuarBalao = document.getElementById('continuarBalao');

function fala(texto) { document.getElementById('narradorTexto').textContent = texto; }

const _brilho = new Audio('../sons/brilho.MP3');
_brilho.preload = 'auto';
function tocarBrilho() { try { _brilho.currentTime = 0; _brilho.play().catch(() => {}); } catch (e) {} }

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

let timersAtivos = [];
function agendar(fn, ms) { const id = setTimeout(fn, ms); timersAtivos.push(id); return id; }
function limparTimers() { timersAtivos.forEach(clearTimeout); timersAtivos = []; }

/* ==========================================================
   DATA: SALT NOMENCLATURE
   ========================================================== */
const NOMENCLATURA_SAL = {
  NaCl: ['CHLOR', 'IDE', 'OF', 'SODIUM'],
  KNO3: ['NITR', 'ATE', 'OF', 'POTASSIUM'],
  CaSO4: ['SULF', 'ATE', 'OF', 'CALCIUM']
};
const FORMULAS_SAL = { NaCl: 'NaCl', KNO3: 'KNO₃', CaSO4: 'CaSO₄' };

/* ==========================================================
   COMPONENT: ELECTRIC CIRCUIT / LIGHT BULB
   ========================================================== */
function criarCircuito(id) {
  const div = document.createElement('div');
  div.className = 'circuito-visual';
  div.id = id;
  div.innerHTML =
    '<svg viewBox="0 0 200 160" width="280" height="224">' +
    '<rect x="40" y="70" width="120" height="70" rx="6" fill="rgba(255,255,255,0.3)" stroke="#3d2e1a" stroke-width="2.5"/>' +
    '<rect x="70" y="60" width="8" height="70" fill="#3d2e1a"/>' +
    '<rect x="122" y="60" width="8" height="70" fill="#3d2e1a"/>' +
    '<line x1="74" y1="60" x2="74" y2="30" stroke="#3d2e1a" stroke-width="2"/>' +
    '<line x1="126" y1="60" x2="126" y2="30" stroke="#3d2e1a" stroke-width="2"/>' +
    '<line x1="74" y1="30" x2="100" y2="30" stroke="#3d2e1a" stroke-width="2"/>' +
    '<line x1="126" y1="30" x2="100" y2="30" stroke="#3d2e1a" stroke-width="2"/>' +
    '<circle id="lampada-' + id + '" cx="100" cy="18" r="16" fill="#e9c877" stroke="#8a5e10" stroke-width="2" opacity="0.15"/>' +
    '<line x1="100" y1="30" x2="100" y2="26" stroke="#3d2e1a" stroke-width="2"/>' +
    '<g id="ions-' + id + '"></g>' +
    '</svg>' +
    '<div class="frasco-rotulo" id="rotulo-' + id + '">Test circuit</div>';
  return div;
}
function definirIntensidadeLampada(id, intensidade) {
  const l = document.getElementById('lampada-' + id);
  if (!l) return;
  l.setAttribute('opacity', Math.max(0.15, Math.min(1, intensidade)));
  l.style.filter = intensidade > 0.5 ? 'drop-shadow(0 0 10px rgba(232,184,75,0.9))' : 'none';
}
function animarIonsCircuito(id) {
  const g = document.getElementById('ions-' + id);
  if (!g) return;
  g.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const ion = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    const positivo = i % 2 === 0;
    ion.setAttribute('r', '4');
    ion.setAttribute('fill', positivo ? '#c8920a' : '#7a1515');
    ion.setAttribute('cx', 80 + Math.random() * 40);
    ion.setAttribute('cy', 90 + Math.random() * 30);
    ion.setAttribute('class', 'ion-movendo');
    ion.style.animationDelay = (Math.random() * 1.2).toFixed(2) + 's';
    g.appendChild(ion);
  }
}

/* ==========================================================
   INTERACTION HELPERS
   ========================================================== */
function botaoContinuar(delayMs) {
  delayMs = delayMs || 0;
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', avancar);
  return btn;
}

function botaoContinuarLocal(handler, delayMs) {
  delayMs = delayMs || 0;
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', function () { btn.disabled = true; handler(); });
  return btn;
}

function escolhaBotoes(opts) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">' + opts.pergunta + '</div>' +
    '<div class="opcoes-linha" id="opcoesLinha"></div>' +
    '<div class="modal-feedback" id="feedbackEscolha"></div>';
  painel.appendChild(wrap);

  const opcoesLinha = wrap.querySelector('#opcoesLinha');
  const feedback = wrap.querySelector('#feedbackEscolha');
  let tentativas = 0;
  let resolvido = false;

  opts.opcoes.forEach(function (op) {
    const btn = document.createElement('button');
    btn.className = 'btn-opcao';
    btn.textContent = op.rotulo;
    btn.addEventListener('click', function () {
      if (resolvido) return;
      if (op.correta) {
        resolvido = true;
        tocarDing();
        Array.from(opcoesLinha.children).forEach(function (b) { b.disabled = true; });
        btn.classList.add('opcao-certa');
        feedback.className = 'modal-feedback visivel';
        feedback.innerHTML = '<span class="feedback-certo">Correct!</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
        opts.aoAcertar();
      } else {
        tentativas++;
        btn.classList.add('opcao-errada');
        if (tentativas === 1 && opts.dica) {
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-errado">' + opts.dica + '</span>';
        } else if (tentativas >= 2) {
          resolvido = true;
          Array.from(opcoesLinha.children).forEach(function (b, i) {
            b.disabled = true;
            if (opts.opcoes[i].correta) b.classList.add('opcao-certa');
          });
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-resposta">Correct answer highlighted.</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
          opts.aoAcertar();
        }
      }
    });
    opcoesLinha.appendChild(btn);
  });
}

/* ==========================================================
   NAME ASSEMBLY BY BLOCKS (click/tap)
   ========================================================== */
function montarNomeSal(chave, aoConcluir) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">Assemble the salt\'s name by clicking the blocks, in the correct order.</div>' +
    '<div class="montagem-nome" id="montagemNome"></div>' +
    '<div class="blocos-disponiveis" id="blocosDisponiveis"></div>' +
    '<div class="modal-feedback" id="fbNomenclatura"></div>';
  painel.appendChild(wrap);

  const sequenciaCorreta = NOMENCLATURA_SAL[chave];
  const montagemEl = wrap.querySelector('#montagemNome');
  const blocosEl = wrap.querySelector('#blocosDisponiveis');
  const fb = wrap.querySelector('#fbNomenclatura');
  let progresso = 0;

  const blocosEmbaralhados = sequenciaCorreta.slice().sort(function () { return Math.random() - 0.5; });
  blocosEmbaralhados.forEach(function (bloco) {
    const chip = document.createElement('button');
    chip.className = 'chip-bloco';
    chip.type = 'button';
    chip.textContent = bloco;
    chip.addEventListener('click', function () {
      if (chip.disabled) return;
      if (bloco === sequenciaCorreta[progresso]) {
        tocarDing();
        chip.disabled = true;
        chip.classList.add('chip-usado');
        const tag = document.createElement('span');
        tag.className = 'bloco-montado';
        tag.textContent = bloco;
        montagemEl.appendChild(tag);
        progresso++;
        if (progresso === sequenciaCorreta.length) {
          fb.className = 'modal-feedback visivel';
          fb.innerHTML = '<span class="feedback-certo">Correct!</span><p class="feedback-explicacao">' + FORMULAS_SAL[chave] + ' → ' + sequenciaCorreta.join(' ').toLowerCase() + '</p>';
          Array.from(blocosEl.children).forEach(function (b) { b.disabled = true; });
          aoConcluir();
        }
      } else {
        chip.classList.add('erro-flash');
        setTimeout(function () { chip.classList.remove('erro-flash'); }, 500);
      }
    });
    blocosEl.appendChild(chip);
  });
}

/* ==========================================================
   INTRODUCTION
   ========================================================== */
function passoIntro() {
  fala('We already know acids. We already know bases. Today we\'re going to discover what happens when they meet.');
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'START INVESTIGATION';
  wrap.appendChild(btn);
  painel.appendChild(wrap);
  btn.addEventListener('click', avancar);
}

/* ==========================================================
   STAGE 1 — NEUTRALIZATION
   ========================================================== */
function passoNeutralizacao() {
  fala('On one side, a solution of HCl. On the other, a solution of NaOH. What will happen when we mix the two?');
  const linha = document.createElement('div');
  linha.style.position = 'absolute'; linha.style.inset = '0';
  linha.style.display = 'flex'; linha.style.justifyContent = 'center'; linha.style.alignItems = 'center'; linha.style.gap = '24px';
  linha.innerHTML =
    '<div class="coluna-lado"><div class="rotulo-lado">HCl</div><div class="cartao-formula-simples">H₃O⁺</div><div class="cartao-formula-simples">Cl⁻</div></div>' +
    '<div class="coluna-lado"><div class="rotulo-lado">NaOH</div><div class="cartao-formula-simples">Na⁺</div><div class="cartao-formula-simples">OH⁻</div></div>';
  overlay.appendChild(linha);

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'MIX';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    linha.remove();
    const resultado = document.createElement('div');
    resultado.style.position = 'absolute'; resultado.style.inset = '0';
    resultado.style.display = 'flex'; resultado.style.justifyContent = 'center'; resultado.style.alignItems = 'center'; resultado.style.gap = '18px';
    resultado.innerHTML =
      '<div class="cartao-formula-simples">2 H₂O</div>' +
      '<div class="cartao-formula-simples">NaCl</div>';
    overlay.appendChild(resultado);
    const placa = document.createElement('div');
    placa.className = 'placa-dourada';
    placa.textContent = 'HCl + NaOH → NaCl + H₂O (neutralization)';
    overlay.appendChild(placa);
    fala('The H₃O⁺ from the acid combines with the OH⁻ from the base, forming water. The remaining ions, Na⁺ and Cl⁻, form the salt: NaCl.');
    painel.innerHTML = '';
    botaoContinuar(600);
  });
}

/* ==========================================================
   STAGE 2 — IDENTIFY THE SALT
   ========================================================== */
function passoIdentificarSal() {
  fala('HNO₃ + KOH react. Water is formed. Which compound is the salt?');
  const linha = document.createElement('div');
  linha.className = 'linha-cartas-simples';
  ['H₂O', 'KNO₃', 'HNO₃'].forEach(function (t) {
    const c = document.createElement('div');
    c.className = 'cartao-formula-simples';
    c.textContent = t;
    linha.appendChild(c);
  });
  overlay.appendChild(linha);

  escolhaBotoes({
    pergunta: 'Which of these formulas is the salt formed in the reaction?',
    opcoes: [
      { rotulo: 'H₂O', correta: false },
      { rotulo: 'KNO₃', correta: true },
      { rotulo: 'HNO₃', correta: false }
    ],
    dica: 'The salt is formed by the leftover ions: the one from the metal in the base and the one from the anion in the acid.',
    explicacao: 'HNO₃ + KOH → KNO₃ + H₂O. The K⁺ (from the base) and the NO₃⁻ (from the acid) form the salt KNO₃.',
    aoAcertar: function () { botaoContinuar(400); }
  });
}

/* ==========================================================
   STAGE 3 — DISSOCIATION AND CONDUCTION
   ========================================================== */
function passoDissociacaoSal() {
  fala('Salts also dissociate in water. Let\'s dissolve a crystal of NaCl.');
  const cristal = document.createElement('div');
  cristal.className = 'cartao-formula-simples';
  cristal.style.position = 'absolute'; cristal.style.left = '50%'; cristal.style.top = '50%'; cristal.style.transform = 'translate(-50%,-50%)';
  cristal.textContent = 'NaCl (solid)';
  overlay.appendChild(cristal);

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'ADD WATER';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    cristal.remove();
    const linha = document.createElement('div');
    linha.className = 'linha-cartas-simples';
    ['Na⁺', 'Cl⁻'].forEach(function (t) {
      const c = document.createElement('div');
      c.className = 'cartao-formula-simples';
      c.textContent = t;
      linha.appendChild(c);
    });
    overlay.appendChild(linha);
    fala('NaCl → Na⁺ + Cl⁻. The salt dissociates, releasing the ions into the water.');
    painel.innerHTML = '';
    botaoContinuarLocal(passoConducaoSal, 600);
  });
}
function passoConducaoSal() {
  fala('Now let\'s test: does solid NaCl conduct electric current?');
  const circuito = criarCircuito('circ-sal');
  overlay.appendChild(circuito);

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML = '<div class="interacao-pergunta-texto">Test the solid NaCl.</div>';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'TEST SOLID';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    definirIntensidadeLampada('circ-sal', 0.1);
    fala('The bulb doesn\'t light up: in the solid, the ions are locked in place and can\'t move.');
    botaoContinuarLocal(passoConducaoSalB, 700);
  });
}
function passoConducaoSalB() {
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML = '<div class="interacao-pergunta-texto">Now dissolve the NaCl in water.</div>';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'DISSOLVE IN WATER';
  wrap.appendChild(btn);
  painel.innerHTML = '';
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    animarIonsCircuito('circ-sal');
    definirIntensidadeLampada('circ-sal', 1);
    tocarBrilho();
    fala('Now the bulb lights up! Molten or dissolved, the salt releases ions that are free to move — that\'s why it conducts electric current.');
    painel.innerHTML = '';
    botaoContinuar(600);
  });
}

/* ==========================================================
   STAGE 4 — NOMENCLATURE
   ========================================================== */
function passoNomenclatura() {
  fala('The name of a salt comes from the acid it originated from: -hydric → -ide, -ic → -ate, -ous → -ite. Assemble the name of NaCl (from hydrochloric acid).');
  montarNomeSal('NaCl', function () {
    agendar(function () { botaoContinuarLocal(passoNomenclaturaKNO3, 400); }, 300);
  });
}
function passoNomenclaturaKNO3() {
  fala('Now KNO₃, formed from nitric acid.');
  montarNomeSal('KNO3', function () {
    agendar(function () { botaoContinuarLocal(passoNomenclaturaCaSO4, 400); }, 300);
  });
}
function passoNomenclaturaCaSO4() {
  fala('Finally, CaSO₄, formed from sulfuric acid.');
  montarNomeSal('CaSO4', function () {
    agendar(function () { botaoContinuar(400); }, 300);
  });
}

/* ==========================================================
   FINAL
   ========================================================== */
function passoFinal() {
  fala('Excellent. Now you understand where salts come from and how they get their names.');
  function linha(txt) { return '<div class="resumo-linha">' + txt + '</div>'; }
  overlay.innerHTML =
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:12px;">' +
    '<div class="quadro-resumo-final">' +
    linha('Acid + Base → Neutralization.') +
    linha('The H₃O⁺ from the acid reacts with the OH⁻ from the base, forming water.') +
    linha('The remaining ions form the salt.') +
    linha('Salts dissociate in water and conduct electricity when molten or dissolved.') +
    linha('The name of the salt is derived from the name of its corresponding acid.') +
    '</div></div>';
  painel.innerHTML = '';
  const conclusao = document.getElementById('conclusao');
  document.getElementById('conclusaoPlacar').textContent = 'Stage Complete';
  document.getElementById('conclusaoMensagem').textContent = 'You discovered how an acid and a base react to form salt and water, and how to name the salts formed.';
  conclusao.classList.add('visivel');
  conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ==========================================================
   STAGE ENGINE
   ========================================================== */
const PASSOS = [
  passoIntro, passoNeutralizacao, passoIdentificarSal, passoDissociacaoSal,
  passoNomenclatura, passoFinal
];
let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  PASSOS[i]();
}
function avancar() { if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1); }
function reiniciar() {
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* ── INIT ── */
irPara(0);
</script>
