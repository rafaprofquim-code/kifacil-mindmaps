<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Chemical Bonds — Premium Game | KiFácil</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --fundo: #fdf8f0;
      --fundo-card: #fffdf9;
      --escuro: #2e2016;
      --texto: #1a1208;
      --texto-suave: #3d2e1a;
      --dourado: #8a5e10;
      --dourado-claro: #c8920a;
      --borda: rgba(100,70,20,0.3);
      --borda-forte: rgba(100,70,20,0.5);
      --verde-escuro: #1e5238;
      --vermelho-escuro: #7a1515;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-nav {
      background: #1e1008;
      border-bottom: 2px solid var(--dourado-claro);
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #fff8ee;
      letter-spacing: 0.03em;
      margin-right: auto;
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 1rem;
      width: 100%;
    }
    .titulo-jogo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.7rem, 3.8vw, 2.5rem);
      font-weight: 600;
      margin-bottom: 0.3rem;
      line-height: 1.1;
    }
    .subtitulo {
      font-size: 1rem;
      color: var(--texto);
      margin-bottom: .9rem;
      max-width: 680px;
    }

    .narrador {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: .8rem;
      padding: .8rem 1.1rem;
      border: 1.5px solid var(--borda-forte);
      border-radius: 10px;
      background: rgba(30,16,8,0.05);
    }
    .narrador img {
      width: 68px;
      height: 84px;
      object-fit: cover;
      object-position: top center;
      border-radius: 10px;
      border: 1px solid rgba(200,146,10,.35);
      flex-shrink: 0;
    }
    .narrador-nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dourado-claro);
      margin-bottom: 0.3rem;
    }
    .narrador-texto {
      font-size: 1rem;
      line-height: 1.5;
      color: var(--texto-suave);
      min-height: 3.4em;
    }

    /* ANIMATION STAGE */
    .imagem-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(100%, 900px);
      max-height: 62vh;
      min-height: 380px;
      margin: 0 auto;
      cursor: default;
      border: 1.5px solid var(--borda-forte);
      border-radius: 6px;
      overflow: hidden;
      background: #f7efe2;
    }
    .cena-fundo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .overlay-animacao { position: absolute; inset: 0; }

    .link-aula {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: #fff8ee;
      background: rgba(30,16,8,0.72); border: 1.5px solid var(--dourado-claro, #c8920a);
      border-radius: 8px; padding: 0.4rem 0.65rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.02em; text-align: center; line-height: 1.2;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .link-aula:hover { background: rgba(30,16,8,0.92); transform: translateY(-1px); }
    .link-aula svg { width: 22px; height: 22px; }

    /* Card with the bond diagram */
    .ligacao-card {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 16px 22px; z-index: 3; text-align: center;
    }
    .ligacao-card svg { display: block; margin: 0 auto; }
    .ligacao-card .ligacao-legenda {
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.95rem;
      color: var(--texto-suave); margin-top: 6px;
    }

    .placa-dourada {
      position: absolute; bottom: 20px; left: 50%; transform: translate(-50%, 10px);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: clamp(0.95rem, 2.4vw, 1.2rem);
      padding: 0.65rem 1.3rem; border-radius: 8px; border: 1px solid #a97c1f;
      box-shadow: 0 3px 12px rgba(0,0,0,.3); text-align: center; max-width: 92%;
      opacity: 0; animation: placaIn .5s ease forwards; z-index: 6; pointer-events: none;
    }
    @keyframes placaIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* Matching game (classification by category) */
    .jogo-associacao { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 30px; padding: 6%; flex-wrap: wrap; }
    .coluna-associacao { display: flex; flex-direction: column; gap: 8px; }
    .item-associacao {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 8px; padding: 0.5rem 1rem;
      font-family: 'Libre Baskerville', serif; font-size: 0.88rem; cursor: pointer; text-align: center; transition: border-color .2s;
    }
    .item-associacao:hover { border-color: var(--dourado-claro); }
    .item-selecionado { border-color: var(--dourado-claro); background: rgba(200,146,10,.12); }
    .associado { border-color: var(--verde-escuro); background: rgba(30,82,56,.12); cursor: default; opacity: 0.85; }
    .erro-flash { outline: 3px solid var(--vermelho-escuro); border-radius: 8px; }

    .quadro-resumo { display: flex; gap: 1.1rem; justify-content: center; flex-wrap: wrap; padding: 1rem; }
    .quadro-item {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px;
      padding: 1rem 1.3rem; min-width: 190px; text-align: center;
    }
    .quadro-item .rotulo {
      font-family: 'Cormorant Garamond', serif; font-size: 0.78rem; letter-spacing: .1em;
      text-transform: uppercase; color: var(--dourado-claro); margin-bottom: 0.4rem;
    }
    .quadro-item .valor { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: var(--texto); }

    /* INTERACTION PANEL */
    #painelInteracao { max-width: 900px; margin: 1.2rem auto 0; }
    .interacao-painel {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.4rem 1.6rem 1.3rem;
    }
    .interacao-pergunta-texto {
      font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600;
      line-height: 1.35; margin-bottom: 1rem;
    }
    .opcoes-linha { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .btn-opcao {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px;
      padding: 0.55rem 1.1rem; font-family: 'Libre Baskerville', serif; font-size: 0.95rem;
      color: var(--texto); cursor: pointer; transition: border-color .2s, background .2s;
    }
    .btn-opcao:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .btn-opcao:disabled { cursor: default; opacity: 0.75; }
    .opcao-certa { border-color: var(--verde-escuro) !important; background: rgba(30,82,56,0.12); }
    .opcao-errada { border-color: var(--vermelho-escuro) !important; background: rgba(122,21,21,0.08); }

    .btn-continuar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 0.6rem 1.6rem;
      border-radius: 4px; cursor: pointer; transition: background 0.2s, color 0.2s, opacity .2s;
      display: block; margin: 0.2rem auto 0;
    }
    .btn-continuar:hover { background: var(--dourado-claro); color: #1e1008; }
    .btn-continuar:disabled { opacity: 0.4; cursor: default; }
    .btn-continuar:disabled:hover { background: #1e1008; color: var(--dourado-claro); }

    /* Continue button inside the teacher's speech bubble */
    #continuarBalao { margin-top: 0.6rem; }
    #continuarBalao .btn-continuar { display: inline-block; margin: 0; }

    .modal-feedback {
      margin-top: 1rem; font-size: 0.86rem; line-height: 1.7;
      border-left: 3px solid var(--borda-forte); padding-left: 1rem; display: none;
    }
    .modal-feedback.visivel { display: block; }
    .feedback-certo   { color: var(--verde-escuro); font-weight: 700; }
    .feedback-errado  { color: var(--vermelho-escuro); font-weight: 700; }
    .feedback-resposta { color: var(--dourado-claro); font-weight: 700; }
    .feedback-explicacao { color: var(--texto); margin-top: 0.5rem; }

    /* CONCLUSION */
    .conclusao {
      display: none; margin-top: 2rem; background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 2.4rem 2rem; text-align: center;
    }
    .conclusao.visivel { display: block; }
    .conclusao-titulo {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 600; margin-bottom: 0.8rem;
    }
    .conclusao-placar { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--dourado-claro); margin-bottom: 1rem; }
    .conclusao-mensagem { font-size: 0.93rem; color: var(--texto-suave); max-width: 460px; margin: 0 auto 2rem; line-height: 1.8; }
    .btn-reiniciar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.7rem 2rem; border-radius: 4px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-reiniciar:hover { background: var(--dourado-claro); color: #1e1008; }

    /* FOOTER */
    footer {
      background: var(--escuro); border-top: 2px solid var(--dourado-claro);
      padding: .6rem 2rem; text-align: center; font-size: 0.78rem; color: rgba(255,248,238,0.5);
    }

    @media (min-width: 641px) {
      .narrador { max-width: 900px; margin: 0 auto .8rem; }
      .narrador-texto { font-size: 1.05rem; }
    }

    @media (max-width: 640px) {
      .top-nav { padding: 0 1.2rem; gap: 1.2rem; }
      main { padding: .8rem 1rem 1rem; }
      .interacao-painel { padding: 1.2rem 1rem; }
      .opcoes-linha { gap: 0.5rem; }
      .btn-opcao { font-size: 0.85rem; padding: 0.5rem 0.85rem; }
      .jogo-associacao { gap: 14px; }
      .item-associacao { font-size: 0.78rem; padding: 0.4rem 0.7rem; }
      .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .link-aula svg { width: 18px; height: 18px; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">KiFácil</div>
</nav>

<main>
  <h1 class="titulo-jogo">Chemical Bonds</h1>
  <p class="subtitulo">Discover why atoms bond and what type of substance each bond forms.</p>

  <div class="narrador">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Professor Rafaela" />
    <div style="flex: 1;">
      <div class="narrador-nome">Professor Rafaela</div>
      <div class="narrador-texto" id="narradorTexto">Let's begin.</div>
      <div id="continuarBalao"></div>
    </div>
  </div>

  <div class="imagem-wrapper" id="imagemWrapper">
    <img src="../imagens/laboratorio-ligacoes.jpg" alt="Chemical bonds laboratory" class="cena-fundo" />
    <div class="overlay-animacao" id="overlayAnimacao"></div>
</div>

  <div id="painelInteracao"></div>

  <div class="conclusao" id="conclusao">
    <div class="conclusao-titulo">Study completed</div>
    <div class="conclusao-placar" id="conclusaoPlacar"></div>
    <p class="conclusao-mensagem" id="conclusaoMensagem"></p>
    <button class="btn-reiniciar" onclick="reiniciar()">Play again</button>
  </div>
</main>

<footer>© 2026 KiFácil</footer>

<script>
/* ==========================================================
   DOM REFERENCES
   ========================================================== */
const overlay = document.getElementById('overlayAnimacao');
const painel  = document.getElementById('painelInteracao');
const continuarBalao = document.getElementById('continuarBalao');

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

function fala(texto) { document.getElementById('narradorTexto').textContent = texto; }

let timersAtivos = [];
function agendar(fn, ms) { const id = setTimeout(fn, ms); timersAtivos.push(id); return id; }
function limparTimers() { timersAtivos.forEach(clearTimeout); timersAtivos = []; }

/* ==========================================================
   SVG DRAWINGS OF THE BONDS
   ========================================================== */
function atomoSVG(simbolo, cor, cx, cy, r) {
  return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + cor + '"/>' +
    '<text x="' + cx + '" y="' + (cy + r * 0.34) + '" font-size="' + (r * 0.7).toFixed(1) + '" text-anchor="middle" fill="#fff8ee" font-family="Cormorant Garamond, serif" font-weight="700">' + simbolo + '</text>';
}

function ligacaoCovalenteSVG(s1, s2) {
  return '<svg viewBox="0 0 200 100" width="190" height="95">' +
    '<line x1="62" y1="50" x2="138" y2="50" stroke="#3d2e1a" stroke-width="3"/>' +
    '<circle cx="94" cy="43" r="3" fill="#3d2e1a"/><circle cx="94" cy="57" r="3" fill="#3d2e1a"/>' +
    '<circle cx="106" cy="43" r="3" fill="#3d2e1a"/><circle cx="106" cy="57" r="3" fill="#3d2e1a"/>' +
    atomoSVG(s1, '#c8920a', 40, 50, 22) +
    atomoSVG(s2, '#7a1515', 160, 50, 22) +
    '</svg>';
}

function ligacaoIonicaSVG(sMetal, sAmetal) {
  return '<svg viewBox="0 0 220 100" width="210" height="95">' +
    atomoSVG(sMetal, '#c8920a', 40, 50, 22) +
    '<text x="62" y="20" font-size="15" fill="#c8920a" font-weight="700" font-family="Cormorant Garamond, serif">+</text>' +
    '<line x1="66" y1="50" x2="138" y2="50" stroke="#8a5e10" stroke-width="2.5"/>' +
    '<polygon points="138,43 152,50 138,57" fill="#8a5e10"/>' +
    atomoSVG(sAmetal, '#7a1515', 180, 50, 22) +
    '<text x="200" y="20" font-size="15" fill="#7a1515" font-weight="700" font-family="Cormorant Garamond, serif">−</text>' +
    '</svg>';
}

function marDeEletronsSVG() {
  const cols = 4, rows = 3, spacingX = 56, spacingY = 44, startX = 42, startY = 32;
  let out = '';
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const cx = startX + col * spacingX;
      const cy = startY + row * spacingY;
      out += '<circle cx="' + cx + '" cy="' + cy + '" r="15" fill="#c8920a" stroke="#8a5e10" stroke-width="1.5"/>' +
        '<text x="' + cx + '" y="' + (cy + 5) + '" font-size="13" text-anchor="middle" fill="#fff8ee" font-family="Cormorant Garamond, serif" font-weight="700">+</text>';
      const dots = [[cx - 20, cy - 16], [cx + 20, cy + 14]];
      dots.forEach(function (d) {
        out += '<circle cx="' + d[0] + '" cy="' + d[1] + '" r="2.6" fill="#3d2e1a"/>';
      });
    }
  }
  return '<svg viewBox="0 0 260 160" width="240" height="150">' + out + '</svg>';
}

function criarCartaoLigacao(svgHtml, legenda) {
  const div = document.createElement('div');
  div.className = 'ligacao-card';
  div.innerHTML = svgHtml + (legenda ? '<div class="ligacao-legenda">' + legenda + '</div>' : '');
  return div;
}

/* ==========================================================
   INTERACTION HELPERS
   ========================================================== */
function botaoContinuar(delayMs) {
  delayMs = delayMs || 0;
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continue →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', avancar);
  return btn;
}

function escolhaBotoes(opts) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">' + opts.pergunta + '</div>' +
    '<div class="opcoes-linha" id="opcoesLinha"></div>' +
    '<div class="modal-feedback" id="feedbackEscolha"></div>';
  painel.appendChild(wrap);

  const opcoesLinha = wrap.querySelector('#opcoesLinha');
  const feedback = wrap.querySelector('#feedbackEscolha');
  let tentativas = 0;
  let resolvido = false;

  opts.opcoes.forEach(function (op) {
    const btn = document.createElement('button');
    btn.className = 'btn-opcao';
    btn.textContent = op.rotulo;
    btn.addEventListener('click', function () {
      if (resolvido) return;
      if (op.correta) {
        resolvido = true;
        tocarDing();
        Array.from(opcoesLinha.children).forEach(function (b) { b.disabled = true; });
        btn.classList.add('opcao-certa');
        feedback.className = 'modal-feedback visivel';
        feedback.innerHTML = '<span class="feedback-certo">Correct!</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
        opts.aoAcertar();
      } else {
        tentativas++;
        btn.classList.add('opcao-errada');
        if (tentativas === 1 && opts.dica) {
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-errado">' + opts.dica + '</span>';
        } else if (tentativas >= 2) {
          resolvido = true;
          Array.from(opcoesLinha.children).forEach(function (b, i) {
            b.disabled = true;
            if (opts.opcoes[i].correta) b.classList.add('opcao-certa');
          });
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-resposta">Correct answer highlighted.</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
          opts.aoAcertar();
        }
      }
    });
    opcoesLinha.appendChild(btn);
  });
}

/* ==========================================================
   CATEGORY CLASSIFICATION (pair of atoms → bond type)
   ========================================================== */
function criarClassificacaoPorCategoria(itens, categorias, mensagemErro, mensagemSucesso) {
  const container = document.createElement('div');
  container.className = 'jogo-associacao';
  overlay.appendChild(container);

  const colCategorias = document.createElement('div'); colCategorias.className = 'coluna-associacao';
  const colItens = document.createElement('div'); colItens.className = 'coluna-associacao';
  container.appendChild(colCategorias); container.appendChild(colItens);

  const itensEmbaralhados = itens.slice().sort(function () { return Math.random() - 0.5; });

  let categoriaAtiva = null, acertos = 0;
  const elCategorias = {};

  categorias.forEach(function (cat) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = cat;
    colCategorias.appendChild(el);
    elCategorias[cat] = el;
    el.addEventListener('click', function () {
      Object.keys(elCategorias).forEach(function (k) { elCategorias[k].classList.remove('item-selecionado'); });
      el.classList.add('item-selecionado');
      categoriaAtiva = cat;
    });
  });

  itensEmbaralhados.forEach(function (it) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = it.rotulo;
    colItens.appendChild(el);
    el.addEventListener('click', function () {
      if (el.classList.contains('associado')) return;
      if (!categoriaAtiva) {
        fala('First choose a type of bond on the left.');
        return;
      }
      if (it.categoria === categoriaAtiva) {
        el.classList.add('associado');
        tocarDing();
        acertos++;
        if (acertos === itens.length) {
          agendar(function () { fala(mensagemSucesso); botaoContinuar(400); }, 300);
        }
      } else {
        fala(mensagemErro);
        el.classList.add('erro-flash');
        setTimeout(function () { el.classList.remove('erro-flash'); }, 500);
      }
    });
  });
}

/* ==========================================================
   INTRODUCTION
   ========================================================== */
function passoIntro() {
  fala('Let\'s find out why atoms bond and what type of substance each bond forms.');
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'START';
  wrap.appendChild(btn);
  painel.appendChild(wrap);
  btn.addEventListener('click', avancar);
}

/* ==========================================================
   STEP — COVALENT BOND
   ========================================================== */
function passoCovalente() {
  fala('H and O are two nonmetals approaching each other.');
  overlay.appendChild(criarCartaoLigacao(ligacaoCovalenteSVG('H', 'O'), 'H + O'));

  escolhaBotoes({
    pergunta: 'How do nonmetal atoms bond with each other?',
    opcoes: [
      { rotulo: 'Electron transfer', correta: false },
      { rotulo: 'Electron sharing', correta: true },
      { rotulo: 'Formation of a sea of electrons', correta: false }
    ],
    dica: 'Neither one "steals" the electron from the other — they share it.',
    explicacao: 'Covalent bond: occurs between NONMETALS, through electron sharing. It forms molecular substances (low melting/boiling point) or covalent solids (high melting/boiling point). They are poor conductors of electricity (except graphite) and insoluble in water.',
    aoAcertar: function () { botaoContinuar(400); }
  });
}

/* ==========================================================
   STEP — METALLIC BOND
   ========================================================== */
function passoMetalica() {
  fala('Now observe several atoms of the same metal, very close to one another.');
  overlay.appendChild(criarCartaoLigacao(marDeEletronsSVG(), 'Sea of electrons'));

  escolhaBotoes({
    pergunta: 'What forms when metal atoms join together?',
    opcoes: [
      { rotulo: 'Ionic bond', correta: false },
      { rotulo: 'Covalent bond', correta: false },
      { rotulo: 'Metallic bond', correta: true }
    ],
    dica: 'The electrons become free, "swimming" among the atoms.',
    explicacao: 'Metallic bond: occurs between METALS, forming a free "sea of electrons". Metallic substances have high melting and boiling points, are good conductors of electricity, malleable, ductile, and insoluble in water.',
    aoAcertar: function () { botaoContinuar(400); }
  });
}

/* ==========================================================
   STEP — IONIC BOND
   ========================================================== */
function passoIonica() {
  fala('Now a metal atom meets a nonmetal atom.');
  overlay.appendChild(criarCartaoLigacao(ligacaoIonicaSVG('Na', 'Cl'), 'Na + Cl'));

  escolhaBotoes({
    pergunta: 'What happens when a metal reacts with a nonmetal?',
    opcoes: [
      { rotulo: 'Electron sharing', correta: false },
      { rotulo: 'Electron transfer', correta: true },
      { rotulo: 'Formation of a sea of electrons', correta: false }
    ],
    dica: 'One atom donates the electron; the other receives it.',
    explicacao: 'Ionic bond: occurs between METAL and NONMETAL, through electron transfer, forming ionic solids. They have high melting and boiling points; they are poor conductors in the solid state, but good conductors when molten or dissolved in water.',
    aoAcertar: function () { botaoContinuar(400); }
  });
}

/* ==========================================================
   STEP — CLASSIFY THE PAIRS OF ATOMS
   ========================================================== */
function passoClassificar() {
  fala('Choose a type of bond on the left and click all the pairs of atoms that form that type. Then move on to the next one.');
  criarClassificacaoPorCategoria([
    { rotulo: 'Cl + Cl', categoria: 'Covalent' },
    { rotulo: 'H + O', categoria: 'Covalent' },
    { rotulo: 'Fe + Fe', categoria: 'Metallic' },
    { rotulo: 'Na + Na', categoria: 'Metallic' },
    { rotulo: 'Na + Cl', categoria: 'Ionic' },
    { rotulo: 'Mg + O', categoria: 'Ionic' }
  ], ['Covalent', 'Metallic', 'Ionic'],
  'Remember: nonmetal + nonmetal is covalent; metal + metal is metallic; metal + nonmetal is ionic.', 'Well done! You classified them all correctly.');
}

/* ==========================================================
   FINAL
   ========================================================== */
function passoFinal() {
  fala('Now you know how to recognize the three chemical bonds and the properties of the substances they form.');
  overlay.innerHTML =
    '<div class="quadro-resumo" style="position:absolute;inset:0;align-items:center;">' +
    '<div class="quadro-item"><div class="rotulo">Covalent</div><div class="valor">Nonmetal + Nonmetal<br>Shares electrons</div></div>' +
    '<div class="quadro-item"><div class="rotulo">Metallic</div><div class="valor">Metal + Metal<br>Sea of electrons</div></div>' +
    '<div class="quadro-item"><div class="rotulo">Ionic</div><div class="valor">Metal + Nonmetal<br>Transfers electrons</div></div>' +
    '</div>';
  painel.innerHTML = '';
  const conclusao = document.getElementById('conclusao');
  document.getElementById('conclusaoPlacar').textContent = 'Stage completed';
  document.getElementById('conclusaoMensagem').textContent = 'You learned the difference between covalent, metallic, and ionic bonds, and how to recognize each one from the atoms involved.';
  conclusao.classList.add('visivel');
  conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ==========================================================
   STAGE ENGINE
   ========================================================== */
const PASSOS = [passoIntro, passoCovalente, passoMetalica, passoIonica, passoClassificar, passoFinal];
let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  PASSOS[i]();
}
function avancar() {
  if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1);
}
function reiniciar() {
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* ── INIT ── */
irPara(0);
</script>
