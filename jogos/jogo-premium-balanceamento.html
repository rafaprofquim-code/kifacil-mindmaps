<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Balanceamento de Equações — Jogo Premium | KiFácil</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --fundo: #fdf8f0;
      --fundo-card: #fffdf9;
      --escuro: #2e2016;
      --texto: #1a1208;
      --texto-suave: #3d2e1a;
      --dourado: #8a5e10;
      --dourado-claro: #c8920a;
      --borda: rgba(100,70,20,0.3);
      --borda-forte: rgba(100,70,20,0.5);
      --verde-escuro: #1e5238;
      --vermelho-escuro: #7a1515;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-nav {
      background: #1e1008;
      border-bottom: 2px solid var(--dourado-claro);
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #fff8ee;
      letter-spacing: 0.03em;
      margin-right: auto;
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 2.5rem;
      width: 100%;
    }
    .titulo-jogo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      margin-bottom: 0.4rem;
      line-height: 1.1;
    }
    .subtitulo {
      font-size: 1.1rem;
      color: var(--texto);
      margin-bottom: 2.5rem;
      max-width: 680px;
    }

    .narrador {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.4rem;
      padding: 1rem 1.1rem;
      border: 1.5px solid var(--borda-forte);
      border-radius: 10px;
      background: rgba(30,16,8,0.05);
    }
    .narrador img {
      width: 78px;
      height: 96px;
      object-fit: cover;
      object-position: top center;
      border-radius: 10px;
      border: 1px solid rgba(200,146,10,.35);
      flex-shrink: 0;
    }
    .narrador-nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dourado-claro);
      margin-bottom: 0.4rem;
    }
    .narrador-texto {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--texto-suave);
    }

    /* PALCO DE ANIMAÇÃO */
    .imagem-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(100%, 900px);
      max-height: 70vh;
      min-height: 480px;
      margin: 0 auto;
      cursor: default;
      border: 1.5px solid var(--borda-forte);
      border-radius: 6px;
      overflow: hidden;
      background: #f7efe2;
    }
    .cena-fundo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .overlay-animacao { position: absolute; inset: 0; }

    .link-aula {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: #fff8ee;
      background: rgba(30,16,8,0.72); border: 1.5px solid var(--dourado-claro, #c8920a);
      border-radius: 8px; padding: 0.4rem 0.65rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.02em; text-align: center; line-height: 1.2;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .link-aula:hover { background: rgba(30,16,8,0.92); transform: translateY(-1px); }
    .link-aula svg { width: 22px; height: 22px; }

    .retrato-lavoisier {
      position: absolute; width: 66px; border-radius: 6px; border: 1px solid var(--borda-forte);
      z-index: 5; opacity: 0; animation: placaIn .5s ease forwards; box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }

    /* Equação com coeficientes */
    .area-equacao {
      position: absolute; left: 50%; top: 10%; transform: translateX(-50%) scale(1.1); transform-origin: top center;
      width: 94%; display: flex; justify-content: center; z-index: 3;
    }
    .linha-equacao { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .cartao-coeficiente {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px;
      padding: 8px 10px; min-width: 76px; transition: border-color .3s, box-shadow .3s;
    }
    .controles-coef { display: flex; align-items: center; gap: 6px; }
    .btn-coef {
      width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--dourado-claro);
      background: #1e1008; color: var(--dourado-claro); font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: 1rem; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .btn-coef:hover { background: var(--dourado-claro); color: #1e1008; }
    .numero-coef { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.05rem; color: var(--texto); min-width: 16px; text-align: center; }
    .numero-coef-fixo { font-size: 1.25rem; color: var(--dourado-claro); min-height: 1.2em; }
    .mol-inline-wrap svg { display: block; }
    .sinal-mais-inline { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.4rem; color: var(--texto-suave); }
    .seta-inline svg { display: block; }
    .equacao-balanceada .cartao-coeficiente { border-color: var(--dourado-claro); box-shadow: 0 0 8px rgba(200,146,10,0.5); }

    /* Contadores de átomos (tabela reagente x produto) */
    .tabela-contadores {
      position: absolute; left: 50%; bottom: 4%; transform: translateX(-50%);
      border-collapse: collapse; background: var(--fundo-card); border: 1.5px solid var(--borda-forte);
      border-radius: 8px; overflow: hidden; z-index: 3; max-width: 92%;
    }
    .tabela-contadores th, .tabela-contadores td {
      padding: 0.3rem 0.85rem; text-align: center; border: 1px solid var(--borda);
      font-family: 'Libre Baskerville', serif; font-size: 0.82rem;
    }
    .tabela-contadores th {
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.76rem;
      letter-spacing: .04em; text-transform: uppercase; color: var(--dourado-claro); background: rgba(30,16,8,0.05);
    }
    .tabela-contadores td.celula-simbolo {
      font-family: 'Cormorant Garamond', serif; font-weight: 700; color: var(--texto-suave); background: rgba(30,16,8,0.05);
    }
    .tabela-contadores td.celula-ok { color: var(--verde-escuro); font-weight: 700; }
    .tabela-contadores td.celula-erro { color: var(--vermelho-escuro); font-weight: 700; }

    /* Balança */
    .balanca-visual {
      position: absolute; left: 50%; top: 58%; transform: translate(-50%, -50%); z-index: 2;
      background: #fdf3d2; border: 1.5px solid var(--borda-forte); border-radius: 10px; padding: 8px 14px;
    }
    .balanca-visual svg { transition: filter .3s; }
    .balanca-equilibrada svg { filter: drop-shadow(0 0 8px rgba(200,146,10,0.75)); }

    /* Estratégia MACHO */
    .lista-macho { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; z-index: 3; }
    .item-macho {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 8px;
      padding: 0.5rem 1.3rem; font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.05rem; color: var(--texto);
    }

    .placa-dourada {
      position: absolute; bottom: 12px; left: 50%; transform: translate(-50%, 10px);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: clamp(0.82rem, 2.1vw, 1.02rem);
      padding: 0.5rem 1.1rem; border-radius: 8px; border: 1px solid #a97c1f;
      box-shadow: 0 3px 10px rgba(0,0,0,.25); text-align: center; max-width: 90%;
      opacity: 0; animation: placaIn .5s ease forwards; z-index: 6; pointer-events: none;
    }
    @keyframes placaIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* PAINEL DE INTERAÇÃO (dentro da caixa da professora) */
    #painelInteracao { margin-top: 0.7rem; }
    .interacao-pergunta-texto {
      font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600;
      line-height: 1.35; margin-bottom: 0.7rem;
    }
    .btn-continuar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 0.55rem 1.4rem;
      border-radius: 4px; cursor: pointer; transition: background 0.2s, color 0.2s, opacity .2s;
      display: inline-block; margin: 0.2rem 0 0;
    }
    .btn-continuar:hover { background: var(--dourado-claro); color: #1e1008; }
    .btn-continuar:disabled { opacity: 0.4; cursor: default; }
    .btn-continuar:disabled:hover { background: #1e1008; color: var(--dourado-claro); }

    .quadro-item {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px;
      padding: 0.8rem 1.3rem; min-width: 220px; text-align: center;
    }
    .quadro-item .valor { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: var(--texto); }

    /* CONCLUSÃO */
    .conclusao {
      display: none; margin-top: 3rem; background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 3rem 2rem; text-align: center;
    }
    .conclusao.visivel { display: block; }
    .conclusao-titulo {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 600; margin-bottom: 0.8rem;
    }
    .conclusao-placar { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--dourado-claro); margin-bottom: 1rem; }
    .conclusao-mensagem { font-size: 0.93rem; color: var(--texto-suave); max-width: 460px; margin: 0 auto 2rem; line-height: 1.8; }
    .btn-reiniciar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.7rem 2rem; border-radius: 4px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-reiniciar:hover { background: var(--dourado-claro); color: #1e1008; }

    /* FOOTER */
    footer {
      background: var(--escuro); border-top: 2px solid var(--dourado-claro);
      padding: 1.2rem 2rem; text-align: center; font-size: 0.82rem; color: rgba(255,248,238,0.5);
    }

    @media (min-width: 641px) {
      .narrador { max-width: 900px; margin: 0 auto 1.2rem; }
      .narrador-texto { font-size: 1.08rem; }
    }

    @media (max-width: 640px) {
      .top-nav { padding: 0 1.2rem; gap: 1.2rem; }
      main { padding: 2rem 1rem 4rem; }
      .interacao-painel { padding: 1.2rem 1rem; }
      .placa-dourada { font-size: 0.74rem; padding: 0.42rem 0.75rem; }
      .area-equacao { transform: translateX(-50%) scale(1); }
      .cartao-coeficiente { min-width: 60px; padding: 6px 7px; }
      .balanca-visual { top: 78%; }
      .balanca-visual svg { width: 150px; height: 100px; }
      .retrato-lavoisier { width: 48px; }
      .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .link-aula svg { width: 18px; height: 18px; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">KiFácil</div>
</nav>

<main>
  <h1 class="titulo-jogo">Balanceamento de Equações Químicas</h1>
  <p class="subtitulo">Descubra por que uma equação química precisa ser balanceada — nenhum átomo pode surgir ou desaparecer.</p>

  <div class="narrador">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Professora Rafaela" />
    <div style="flex: 1;">
      <div class="narrador-nome">Professora Rafaela</div>
      <div class="narrador-texto" id="narradorTexto">Vamos começar.</div>
      <div id="painelInteracao"></div>
    </div>
  </div>

  <div class="imagem-wrapper" id="imagemWrapper">
    <img src="../imagens/sala-balanceamento.jpg" alt="Sala de balanceamento de equações" class="cena-fundo" />
    <div class="overlay-animacao" id="overlayAnimacao"></div>
    <!-- COLOQUE O LINK AQUI -->
    <a class="link-aula" href="https://www.youtube.com/watch?v=leOrtco_XwY" target="_blank" rel="noopener" title="Assista à aula">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.6"/>
        <path d="M10 8.5L16 12L10 15.5V8.5Z" fill="currentColor"/>
      </svg>
      <span>Assista à aula</span>
    </a>
  </div>

  <div class="conclusao" id="conclusao">
    <div class="conclusao-titulo">Estudo concluído</div>
    <div class="conclusao-placar" id="conclusaoPlacar"></div>
    <p class="conclusao-mensagem" id="conclusaoMensagem"></p>
    <button class="btn-reiniciar" onclick="reiniciar()">Jogar novamente</button>
  </div>
</main>

<footer>© 2026 KiFácil</footer>

<script>
/* ==========================================================
   REFERÊNCIAS DOM
   ========================================================== */
const overlay = document.getElementById('overlayAnimacao');
const painel  = document.getElementById('painelInteracao');

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

function fala(texto) { document.getElementById('narradorTexto').textContent = texto; }

let timersAtivos = [];
function agendar(fn, ms) { const id = setTimeout(fn, ms); timersAtivos.push(id); return id; }
function limparTimers() { timersAtivos.forEach(clearTimeout); timersAtivos = []; }

/* ==========================================================
   COMPONENTE: MOLÉCULA (SVG, nenhuma imagem de molécula usada)
   ========================================================== */
const MOLECULAS_DEF = {
  N2:  { atomos: [{ simbolo: 'N', cor: 'var(--vermelho-escuro)', x: 26, y: 30, r: 15 }, { simbolo: 'N', cor: 'var(--vermelho-escuro)', x: 66, y: 30, r: 15 }], ligacoes: [[0, 1]], largura: 92, altura: 60 },
  H2:  { atomos: [{ simbolo: 'H', cor: 'var(--dourado-claro)', x: 24, y: 28, r: 12 }, { simbolo: 'H', cor: 'var(--dourado-claro)', x: 60, y: 28, r: 12 }], ligacoes: [[0, 1]], largura: 84, altura: 56 },
  NH3: {
    atomos: [
      { simbolo: 'N', cor: 'var(--vermelho-escuro)', x: 46, y: 22, r: 15 },
      { simbolo: 'H', cor: 'var(--dourado-claro)', x: 18, y: 50, r: 10 },
      { simbolo: 'H', cor: 'var(--dourado-claro)', x: 46, y: 60, r: 10 },
      { simbolo: 'H', cor: 'var(--dourado-claro)', x: 74, y: 50, r: 10 }
    ],
    ligacoes: [[0, 1], [0, 2], [0, 3]], largura: 92, altura: 74
  },
  Cl2: { atomos: [{ simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 28, y: 30, r: 16 }, { simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 72, y: 30, r: 16 }], ligacoes: [[0, 1]], largura: 100, altura: 60 },
  HCl: { atomos: [{ simbolo: 'H', cor: 'var(--dourado-claro)', x: 22, y: 28, r: 11 }, { simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 60, y: 28, r: 15 }], ligacoes: [[0, 1]], largura: 84, altura: 56 },
  Fe:  { atomos: [{ simbolo: 'Fe', cor: 'var(--texto-suave)', x: 28, y: 28, r: 17 }], ligacoes: [], largura: 56, altura: 56 },
  O2:  { atomos: [{ simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 26, y: 32, r: 15 }, { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 68, y: 32, r: 15 }], ligacoes: [[0, 1]], largura: 94, altura: 64 },
  Fe2O3: {
    atomos: [
      { simbolo: 'Fe', cor: 'var(--texto-suave)', x: 20, y: 22, r: 13 },
      { simbolo: 'Fe', cor: 'var(--texto-suave)', x: 20, y: 56, r: 13 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 56, y: 12, r: 11 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 56, y: 39, r: 11 },
      { simbolo: 'O', cor: 'var(--vermelho-escuro)', x: 56, y: 66, r: 11 }
    ],
    ligacoes: [[0, 2], [0, 3], [1, 3], [1, 4]], largura: 82, altura: 82
  },
  Na:  { atomos: [{ simbolo: 'Na', cor: 'var(--dourado-claro)', x: 28, y: 28, r: 17 }], ligacoes: [], largura: 56, altura: 56 },
  NaCl:{ atomos: [{ simbolo: 'Na', cor: 'var(--dourado-claro)', x: 24, y: 30, r: 14 }, { simbolo: 'Cl', cor: 'var(--vermelho-escuro)', x: 64, y: 30, r: 16 }], ligacoes: [[0, 1]], largura: 92, altura: 60 }
};

function construirSVGMolecula(chave) {
  const def = MOLECULAS_DEF[chave];
  let svg = '<svg viewBox="0 0 ' + def.largura + ' ' + def.altura + '" width="' + Math.round(def.largura * 0.8) + '" height="' + Math.round(def.altura * 0.8) + '">';
  def.ligacoes.forEach(function (par) {
    const a = def.atomos[par[0]], b = def.atomos[par[1]];
    svg += '<line x1="' + a.x + '" y1="' + a.y + '" x2="' + b.x + '" y2="' + b.y + '" stroke="#3d2e1a" stroke-width="2.5"/>';
  });
  def.atomos.forEach(function (a) {
    svg += '<circle cx="' + a.x + '" cy="' + a.y + '" r="' + a.r + '" fill="' + a.cor + '"/>';
    svg += '<text x="' + a.x + '" y="' + (a.y + a.r * 0.34) + '" font-size="' + (a.r * 0.68) + '" text-anchor="middle" fill="#fff8ee" font-family="Cormorant Garamond, serif" font-weight="700">' + a.simbolo + '</text>';
  });
  svg += '</svg>';
  return svg;
}

/* ==========================================================
   CONTAGEM DE ÁTOMOS
   ========================================================== */
function contarAtomos(especies) {
  const contagem = {};
  especies.forEach(function (esp) {
    const def = MOLECULAS_DEF[esp.chave];
    const porSimbolo = {};
    def.atomos.forEach(function (a) { porSimbolo[a.simbolo] = (porSimbolo[a.simbolo] || 0) + 1; });
    Object.keys(porSimbolo).forEach(function (s) {
      contagem[s] = (contagem[s] || 0) + porSimbolo[s] * esp.coef;
    });
  });
  return contagem;
}
function elementosEnvolvidos(reagentes, produtos) {
  const set = {};
  reagentes.concat(produtos).forEach(function (esp) {
    MOLECULAS_DEF[esp.chave].atomos.forEach(function (a) { set[a.simbolo] = true; });
  });
  return Object.keys(set);
}
function estaBalanceada(reagentes, produtos, elementos) {
  const cr = contarAtomos(reagentes), cp = contarAtomos(produtos);
  return elementos.every(function (s) { return (cr[s] || 0) === (cp[s] || 0); });
}
function totalAtomos(contagem) {
  return Object.keys(contagem).reduce(function (acc, k) { return acc + contagem[k]; }, 0);
}

/* ==========================================================
   COMPONENTE: CARTÃO DE COEFICIENTE
   ========================================================== */
function criarCartaoEspecie(esp, comControles, aoMudar) {
  const div = document.createElement('div');
  div.className = 'cartao-coeficiente';
  if (comControles) {
    const controles = document.createElement('div');
    controles.className = 'controles-coef';
    const btnMenos = document.createElement('button');
    btnMenos.className = 'btn-coef'; btnMenos.type = 'button'; btnMenos.textContent = '−';
    const numero = document.createElement('div');
    numero.className = 'numero-coef'; numero.textContent = esp.coef;
    const btnMais = document.createElement('button');
    btnMais.className = 'btn-coef'; btnMais.type = 'button'; btnMais.textContent = '+';
    btnMenos.addEventListener('click', function () { if (esp.coef > 1) { esp.coef--; aoMudar(); } });
    btnMais.addEventListener('click', function () { if (esp.coef < 9) { esp.coef++; aoMudar(); } });
    controles.appendChild(btnMenos); controles.appendChild(numero); controles.appendChild(btnMais);
    div.appendChild(controles);
  } else {
    const numero = document.createElement('div');
    numero.className = 'numero-coef numero-coef-fixo';
    numero.textContent = esp.coef > 1 ? esp.coef : '';
    div.appendChild(numero);
  }
  const molWrap = document.createElement('div');
  molWrap.className = 'mol-inline-wrap';
  molWrap.innerHTML = construirSVGMolecula(esp.chave);
  div.appendChild(molWrap);
  return div;
}

function renderizarLinhaEquacaoEmContainer(container, reagentes, produtos, comControles, aoMudarExterno) {
  function montar() {
    container.innerHTML = '';
    const linha = document.createElement('div');
    linha.className = 'linha-equacao';
    function handleMudanca() { montar(); if (aoMudarExterno) aoMudarExterno(); }
    reagentes.forEach(function (esp, i) {
      linha.appendChild(criarCartaoEspecie(esp, comControles, handleMudanca));
      if (i < reagentes.length - 1) {
        const m = document.createElement('div'); m.className = 'sinal-mais-inline'; m.textContent = '+'; linha.appendChild(m);
      }
    });
    const setaDiv = document.createElement('div');
    setaDiv.className = 'seta-inline';
    setaDiv.innerHTML = '<svg viewBox="0 0 60 20" width="52" height="18"><line x1="2" y1="10" x2="50" y2="10" stroke="#c8920a" stroke-width="3"/><polygon points="50,3 60,10 50,17" fill="#c8920a"/></svg>';
    linha.appendChild(setaDiv);
    produtos.forEach(function (esp, i) {
      linha.appendChild(criarCartaoEspecie(esp, comControles, handleMudanca));
      if (i < produtos.length - 1) {
        const m = document.createElement('div'); m.className = 'sinal-mais-inline'; m.textContent = '+'; linha.appendChild(m);
      }
    });
    container.appendChild(linha);
  }
  montar();
}

function criarContadoresWrap() {
  const tabela = document.createElement('table');
  tabela.className = 'tabela-contadores';
  tabela.innerHTML = '<thead><tr><th></th><th>Reagente</th><th>Produto</th></tr></thead><tbody></tbody>';
  overlay.appendChild(tabela);
  return tabela.querySelector('tbody');
}

function renderizarContadores(container, reagentes, produtos, elementos) {
  container.innerHTML = '';
  const contagemReag = contarAtomos(reagentes);
  const contagemProd = contarAtomos(produtos);
  elementos.forEach(function (simb) {
    const r = contagemReag[simb] || 0, p = contagemProd[simb] || 0;
    const classe = r === p ? 'celula-ok' : 'celula-erro';
    const tr = document.createElement('tr');
    tr.innerHTML = '<td class="celula-simbolo">' + simb + '</td><td class="' + classe + '">' + r + '</td><td class="' + classe + '">' + p + '</td>';
    container.appendChild(tr);
  });
  return { contagemReag: contagemReag, contagemProd: contagemProd };
}

/* ==========================================================
   COMPONENTE: BALANÇA
   ========================================================== */
function criarBalanca(id) {
  const div = document.createElement('div');
  div.className = 'balanca-visual';
  div.id = 'balanca-' + id;
  div.innerHTML =
    '<svg viewBox="0 0 240 160" width="220" height="146">' +
    '<line x1="120" y1="20" x2="120" y2="140" stroke="#3d2e1a" stroke-width="4"/>' +
    '<g id="barraBalanca-' + id + '" transform="rotate(0,120,40)">' +
    '<line x1="30" y1="40" x2="210" y2="40" stroke="#8a5e10" stroke-width="4"/>' +
    '<line x1="30" y1="40" x2="30" y2="70" stroke="#3d2e1a" stroke-width="2"/>' +
    '<line x1="210" y1="40" x2="210" y2="70" stroke="#3d2e1a" stroke-width="2"/>' +
    '<ellipse cx="30" cy="76" rx="34" ry="12" fill="#fffdf9" stroke="#3d2e1a" stroke-width="2.5"/>' +
    '<ellipse cx="210" cy="76" rx="34" ry="12" fill="#fffdf9" stroke="#3d2e1a" stroke-width="2.5"/>' +
    '<text id="pratoEsq-' + id + '" x="30" y="81" font-size="15" text-anchor="middle" fill="#1a1208" font-family="Cormorant Garamond, serif" font-weight="700">0</text>' +
    '<text id="pratoDir-' + id + '" x="210" y="81" font-size="15" text-anchor="middle" fill="#1a1208" font-family="Cormorant Garamond, serif" font-weight="700">0</text>' +
    '</g>' +
    '<polygon points="105,140 135,140 120,155" fill="#3d2e1a"/>' +
    '</svg>';
  return div;
}
function atualizarBalanca(id, totalReag, totalProd) {
  const grupo = document.getElementById('barraBalanca-' + id);
  const pratoEsq = document.getElementById('pratoEsq-' + id);
  const pratoDir = document.getElementById('pratoDir-' + id);
  if (!grupo) return;
  pratoEsq.textContent = totalReag;
  pratoDir.textContent = totalProd;
  const diff = totalReag - totalProd;
  const anguloMax = 18;
  const angulo = Math.max(-anguloMax, Math.min(anguloMax, diff * 2.5));
  grupo.setAttribute('transform', 'rotate(' + (-angulo) + ',120,40)');
  const balancaDiv = document.getElementById('balanca-' + id);
  if (balancaDiv) {
    if (diff === 0) balancaDiv.classList.add('balanca-equilibrada');
    else balancaDiv.classList.remove('balanca-equilibrada');
  }
}

/* ==========================================================
   ELEMENTOS DECORATIVOS
   ========================================================== */
function adicionarRetratoLavoisier(left, top) {
  const img = document.createElement('img');
  img.src = '../imagens/lavoisier.png';
  img.className = 'retrato-lavoisier';
  img.style.left = left; img.style.top = top;
  img.alt = 'Antoine Lavoisier';
  overlay.appendChild(img);
  return img;
}

/* ==========================================================
   HELPERS DE INTERAÇÃO
   ========================================================== */
function botaoContinuar(delayMs) {
  delayMs = delayMs || 0;
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continuar →';
  btn.disabled = delayMs > 0;
  wrap.appendChild(btn);
  painel.appendChild(wrap);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', avancar);
  return btn;
}

/* ==========================================================
   INTRODUÇÃO
   ========================================================== */
function passoIntro0() {
  fala('Hoje vamos descobrir por que as equações químicas precisam ser balanceadas.');
  botaoContinuar(500);
}
function passoIntro1() {
  fala('Nenhum átomo pode desaparecer, e nenhum átomo pode surgir do nada.');
  botaoContinuar(500);
}

/* ==========================================================
   ETAPA 1 — A REAÇÃO ESTÁ ERRADA?
   ========================================================== */
function passoEtapa1() {
  fala('N₂ + H₂ → NH₃. Será que essa reação está correta?');
  const reagentes = [{ chave: 'N2', coef: 1 }, { chave: 'H2', coef: 1 }];
  const produtos = [{ chave: 'NH3', coef: 1 }];

  const areaEquacao = document.createElement('div');
  areaEquacao.className = 'area-equacao';
  overlay.appendChild(areaEquacao);
  renderizarLinhaEquacaoEmContainer(areaEquacao, reagentes, produtos, false, null);

  const contadorContainer = criarContadoresWrap();

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Verificar';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    const cr = contarAtomos(reagentes), cp = contarAtomos(produtos);

    const trN = document.createElement('tr');
    trN.innerHTML = '<td class="celula-simbolo">N</td><td class="celula-erro">' + (cr.N || 0) + '</td><td class="celula-erro">' + (cp.N || 0) + '</td>';
    contadorContainer.appendChild(trN);
    const trH = document.createElement('tr');
    trH.innerHTML = '<td class="celula-simbolo">H</td><td class="celula-erro">' + (cr.H || 0) + '</td><td class="celula-erro">' + (cp.H || 0) + '</td>';
    contadorContainer.appendChild(trH);

    fala('Nitrogênio: ' + (cr.N || 0) + ' nos reagentes e ' + (cp.N || 0) + ' nos produtos. Hidrogênio: ' + (cr.H || 0) + ' nos reagentes e ' + (cp.H || 0) + ' nos produtos. A quantidade de átomos mudou — essa reação não está correta.');
    botaoContinuar(600);
  });
}

/* ==========================================================
   ETAPA 2 — AJUSTAR OS COEFICIENTES
   ========================================================== */
function passoEtapa2() {
  fala('Agora você pode alterar apenas os coeficientes. Observe os contadores.');
  const reagentes = [{ chave: 'N2', coef: 1 }, { chave: 'H2', coef: 1 }];
  const produtos = [{ chave: 'NH3', coef: 1 }];
  const elementos = elementosEnvolvidos(reagentes, produtos);

  const areaEquacao = document.createElement('div');
  areaEquacao.className = 'area-equacao';
  overlay.appendChild(areaEquacao);
  const contadorContainer = criarContadoresWrap();

  function atualizar() {
    renderizarContadores(contadorContainer, reagentes, produtos, elementos);
    if (estaBalanceada(reagentes, produtos, elementos)) {
      areaEquacao.classList.add('equacao-balanceada');
      if (!areaEquacao.dataset.concluido) {
        areaEquacao.dataset.concluido = '1';
        tocarDing();
        fala('Agora os átomos foram conservados.');
        agendar(function () { botaoContinuar(300); }, 500);
      }
    } else {
      areaEquacao.classList.remove('equacao-balanceada');
    }
  }
  renderizarLinhaEquacaoEmContainer(areaEquacao, reagentes, produtos, true, atualizar);
  atualizar();
}

/* ==========================================================
   ETAPA 3 — A BALANÇA E A LEI DE LAVOISIER
   ========================================================== */
function passoEtapa3() {
  fala('Agora aparece uma balança com os átomos dos reagentes e dos produtos.');
  const reagentes = [{ chave: 'N2', coef: 1 }, { chave: 'H2', coef: 1 }];
  const produtos = [{ chave: 'NH3', coef: 1 }];
  const elementos = elementosEnvolvidos(reagentes, produtos);

  const areaEquacao = document.createElement('div');
  areaEquacao.className = 'area-equacao';
  overlay.appendChild(areaEquacao);
  const balanca = criarBalanca('e3');
  overlay.appendChild(balanca);
  const contadorContainer = criarContadoresWrap();

  function atualizar() {
    const info = renderizarContadores(contadorContainer, reagentes, produtos, elementos);
    atualizarBalanca('e3', totalAtomos(info.contagemReag), totalAtomos(info.contagemProd));
    if (estaBalanceada(reagentes, produtos, elementos)) {
      areaEquacao.classList.add('equacao-balanceada');
      if (!areaEquacao.dataset.concluido) {
        areaEquacao.dataset.concluido = '1';
        tocarDing();
        adicionarRetratoLavoisier('4%', '8%');
        fala('Essa é a ideia da Lei de Lavoisier.');
        agendar(function () { botaoContinuar(400); }, 600);
      }
    } else {
      areaEquacao.classList.remove('equacao-balanceada');
    }
  }
  renderizarLinhaEquacaoEmContainer(areaEquacao, reagentes, produtos, true, atualizar);
  atualizar();
}

/* ==========================================================
   ETAPA 4 — MAIS REAÇÕES PARA BALANCEAR
   ========================================================== */
function criarPassoBalancear(id, reagentesChaves, produtosChaves, mensagemFinal) {
  return function () {
    fala('Balanceie esta equação observando os átomos.');
    const reagentes = reagentesChaves.map(function (r) { return { chave: r, coef: 1 }; });
    const produtos = produtosChaves.map(function (p) { return { chave: p, coef: 1 }; });
    const elementos = elementosEnvolvidos(reagentes, produtos);

    const areaEquacao = document.createElement('div');
    areaEquacao.className = 'area-equacao';
    overlay.appendChild(areaEquacao);
    const balanca = criarBalanca(id);
    overlay.appendChild(balanca);
    const contadorContainer = criarContadoresWrap();

    function atualizar() {
      const info = renderizarContadores(contadorContainer, reagentes, produtos, elementos);
      atualizarBalanca(id, totalAtomos(info.contagemReag), totalAtomos(info.contagemProd));
      if (estaBalanceada(reagentes, produtos, elementos)) {
        areaEquacao.classList.add('equacao-balanceada');
        if (!areaEquacao.dataset.concluido) {
          areaEquacao.dataset.concluido = '1';
          tocarDing();
          fala(mensagemFinal);
          agendar(function () { botaoContinuar(400); }, 500);
        }
      } else {
        areaEquacao.classList.remove('equacao-balanceada');
      }
    }
    renderizarLinhaEquacaoEmContainer(areaEquacao, reagentes, produtos, true, atualizar);
    atualizar();
  };
}

const passoH2Cl2 = criarPassoBalancear('e4a', ['H2', 'Cl2'], ['HCl'], 'Muito bem! H₂ + Cl₂ → 2 HCl está balanceada.');
const passoFeO2 = criarPassoBalancear('e4b', ['Fe', 'O2'], ['Fe2O3'], 'Muito bem! 4 Fe + 3 O₂ → 2 Fe₂O₃ está balanceada.');
const passoNaCl2 = criarPassoBalancear('e4c', ['Na', 'Cl2'], ['NaCl'], 'Muito bem! 2 Na + Cl₂ → 2 NaCl está balanceada.');

/* ==========================================================
   ETAPA 5 — ESTRATÉGIA MACHO (DICA)
   ========================================================== */
function passoEtapa5() {
  fala('Agora vou te contar uma estratégia que pode facilitar: a estratégia MACHO.');
  const lista = document.createElement('div');
  lista.className = 'lista-macho';
  overlay.appendChild(lista);
  const itens = ['M — Metais', 'A — Ametais', 'C — Carbono', 'H — Hidrogênio', 'O — Oxigênio'];
  itens.forEach(function (txt, i) {
    agendar(function () {
      const li = document.createElement('div');
      li.className = 'item-macho';
      li.textContent = txt;
      li.style.opacity = '0';
      li.style.transition = 'opacity .5s';
      lista.appendChild(li);
      agendar(function () { li.style.opacity = '1'; }, 40);
    }, i * 550);
  });
  agendar(function () {
    fala('Balanceie primeiro os metais, depois os ametais, o carbono, o hidrogênio e por último o oxigênio. É só uma dica, não uma regra obrigatória.');
    botaoContinuar(400);
  }, itens.length * 550 + 500);
}

/* ==========================================================
   FINAL
   ========================================================== */
function passoFinal() {
  fala('Excelente. Agora você entende que balancear não significa fazer contas. Significa garantir que os mesmos átomos existam antes e depois da reação.');
  function linha(txt) { return '<div class="quadro-item"><div class="valor">' + txt + '</div></div>'; }
  function seta() { return '<div style="font-family:\'Cormorant Garamond\',serif;font-size:1.3rem;color:var(--dourado-claro);">↓</div>'; }
  overlay.innerHTML =
    '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;">' +
    linha('Lei de Lavoisier') + seta() + linha('Quantidade de átomos conservada') + seta() + linha('Coeficientes estequiométricos') + seta() + linha('Equação balanceada') +
    '</div>';
  painel.innerHTML = '';
  const conclusao = document.getElementById('conclusao');
  document.getElementById('conclusaoPlacar').textContent = 'Fase concluída';
  document.getElementById('conclusaoMensagem').textContent = 'Você descobriu que balancear uma equação é apenas garantir que os mesmos átomos existam antes e depois da reação — a Lei de Lavoisier.';
  conclusao.classList.add('visivel');
  conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ==========================================================
   MOTOR DA FASE
   ========================================================== */
const PASSOS = [
  passoIntro0, passoIntro1,
  passoEtapa1,
  passoEtapa2,
  passoEtapa3,
  passoH2Cl2, passoFeO2, passoNaCl2,
  passoEtapa5,
  passoFinal
];

let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  PASSOS[i]();
}
function avancar() { if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1); }
function reiniciar() {
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* ── INIT ── */
irPara(0);
