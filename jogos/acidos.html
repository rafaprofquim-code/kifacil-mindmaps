<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>A Galeria dos Ácidos — Jogo Premium | KiFácil</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --fundo: #fdf8f0;
      --fundo-card: #fffdf9;
      --escuro: #2e2016;
      --texto: #1a1208;
      --texto-suave: #3d2e1a;
      --dourado: #8a5e10;
      --dourado-claro: #c8920a;
      --borda: rgba(100,70,20,0.3);
      --borda-forte: rgba(100,70,20,0.5);
      --verde-escuro: #1e5238;
      --vermelho-escuro: #7a1515;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .top-nav {
      background: #1e1008;
      border-bottom: 2px solid var(--dourado-claro);
      padding: 0 2.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #fff8ee;
      letter-spacing: 0.03em;
      margin-right: auto;
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem 1rem;
      width: 100%;
    }
    .titulo-jogo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.7rem, 3.8vw, 2.5rem);
      font-weight: 600;
      margin-bottom: 0.3rem;
      line-height: 1.1;
    }
    .subtitulo {
      font-size: 1rem;
      color: var(--texto);
      margin-bottom: .9rem;
      max-width: 680px;
    }

    .narrador {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: .8rem;
      padding: .8rem 1.1rem;
      border: 1.5px solid var(--borda-forte);
      border-radius: 10px;
      background: rgba(30,16,8,0.05);
    }
    .narrador img {
      width: 68px;
      height: 84px;
      object-fit: cover;
      object-position: top center;
      border-radius: 10px;
      border: 1px solid rgba(200,146,10,.35);
      flex-shrink: 0;
    }
    .narrador-nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--dourado-claro);
      margin-bottom: 0.3rem;
    }
    .narrador-texto {
      font-size: 1rem;
      line-height: 1.5;
      color: var(--texto-suave);
      min-height: 5.2em;
    }

    /* PALCO DE ANIMAÇÃO */
    .imagem-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(100%, 900px);
      max-height: 62vh;
      min-height: 380px;
      margin: 0 auto;
      cursor: default;
      border: 1.5px solid var(--borda-forte);
      border-radius: 6px;
      overflow: hidden;
      background: #f7efe2;
    }
    .cena-fundo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }
    .overlay-animacao { position: absolute; inset: 0; }
    .btn-iniciar-investigacao {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 5;
    }

    .link-aula {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: #fff8ee;
      background: rgba(30,16,8,0.72); border: 1.5px solid var(--dourado-claro);
      border-radius: 8px; padding: 0.4rem 0.65rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.02em; text-align: center; line-height: 1.2;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .link-aula:hover { background: rgba(30,16,8,0.92); transform: translateY(-1px); }
    .link-aula svg { width: 22px; height: 22px; }

    .frasco-rotulo { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 0.72rem; color: var(--texto-suave); margin-top: 2px; }

    /* Circuito / lâmpada */
    .circuito-visual {
      position: absolute; left: 50%; top: 38%; transform: translate(-50%, -50%); text-align: center; z-index: 3;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 14px 20px;
    }
    .ion-movendo { animation: moverIon 1.4s ease-in-out infinite alternate; }
    @keyframes moverIon { from { transform: translateX(-14px); } to { transform: translateX(14px); } }

    /* Recipientes / partículas */
    .linha-recipientes { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 12px; padding: 8% 4%; flex-wrap: wrap; }
    .coluna-recipiente {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px; padding: 8px; min-width: 118px;
    }
    .recipiente-titulo { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.92rem; color: var(--texto-suave); }
    .recipiente-particulas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; width: 90px; }
    .particula-molecula { width: 12px; height: 12px; border-radius: 50%; background: var(--texto-suave); opacity: 0.85; }
    .particula-molecula.particula-ionizada { background: var(--dourado-claro); box-shadow: 0 0 4px rgba(200,146,10,.7); }
    .recipiente-contador { font-family: 'Libre Baskerville', serif; font-size: 0.66rem; color: var(--texto); text-align: center; }

    /* Cálculo passo a passo */
    .painel-calculo { position: absolute; left: 50%; top: 8%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 3; max-width: 90%; }
    .linha-calculo {
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.15rem; color: var(--texto);
      background: var(--fundo-card); border: 1px solid var(--borda-forte); border-radius: 8px; padding: 4px 14px;
    }
    .linha-calculo-final { color: var(--dourado-claro); border-color: var(--dourado-claro); }

    /* Medidor de ionização */
    .medidor-ionizacao {
      position: absolute; left: 50%; bottom: 6%; transform: translateX(-50%); width: 82%; max-width: 400px; z-index: 3;
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px; padding: 10px 14px;
    }
    .medidor-barra { position: relative; height: 16px; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--borda-forte); display: flex; }
    .zona-fraco { background: rgba(122,21,21,0.4); }
    .zona-moderado { background: rgba(200,146,10,0.4); }
    .zona-forte { background: rgba(30,82,56,0.4); }
    .medidor-marcador { position: absolute; top: -4px; width: 4px; height: 24px; background: #1e1008; border-radius: 2px; transform: translateX(-50%); transition: left .8s ease; }
    .medidor-legendas { display: flex; justify-content: space-between; font-family: 'Cormorant Garamond', serif; font-size: 0.7rem; color: var(--texto-suave); margin-top: 2px; }
    .medidor-classificacao { text-align: center; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.85rem; color: var(--dourado-claro); margin-top: 4px; }

    /* Cartões de ionização (etapa 5) */
    .linha-cartas-ionizacao { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap; padding: 6%; }
    .cartao-ionizacao {
      position: relative; background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px;
      padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; min-width: 116px;
      transition: border-color .2s;
    }
    .cartao-ionizacao:hover { border-color: var(--dourado-claro); }
    .cartao-selecionado { border-color: var(--dourado-claro); box-shadow: 0 0 8px rgba(200,146,10,.5); }
    .cartao-ionizacao-formula { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.15rem; color: var(--texto); }
    .cartao-ionizacao-ordem {
      position: absolute; top: -8px; right: -8px; background: #1e1008; color: var(--dourado-claro);
      border: 1.5px solid var(--dourado-claro); border-radius: 50%; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.85rem;
    }

    /* Cartões simples de fórmula */
    .linha-cartas-simples { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap; padding: 6%; }
    .cartao-formula-simples {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 8px; padding: 0.5rem 1rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.1rem; color: var(--texto);
    }
    .cartao-formula-grande {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px; padding: 0.6rem 1.4rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.4rem; color: var(--texto); z-index: 3;
    }

    /* Jogo de associação (etapa 6b) */
    .jogo-associacao { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; gap: 30px; padding: 6%; flex-wrap: wrap; }
    .coluna-associacao { display: flex; flex-direction: column; gap: 8px; }
    .item-associacao {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 8px; padding: 0.5rem 1rem;
      font-family: 'Libre Baskerville', serif; font-size: 0.88rem; cursor: pointer; text-align: center; transition: border-color .2s;
    }
    .item-associacao:hover { border-color: var(--dourado-claro); }
    .item-selecionado { border-color: var(--dourado-claro); background: rgba(200,146,10,.12); }
    .associado { border-color: var(--verde-escuro); background: rgba(30,82,56,.12); cursor: default; opacity: 0.85; }
    .erro-flash { outline: 3px solid var(--vermelho-escuro); border-radius: 8px; }

    /* Blocos de nomenclatura */
    .formula-alvo {
      display: inline-block; background: var(--fundo); border: 1.5px solid var(--dourado-claro); border-radius: 6px;
      padding: 0.3rem 0.8rem; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1.2rem;
      color: var(--dourado-claro); margin-bottom: 0.8rem;
    }
    .montagem-nome { display: flex; gap: 6px; flex-wrap: wrap; min-height: 34px; margin-bottom: 0.6rem; }
    .bloco-montado {
      background: rgba(30,82,56,.12); border: 1.5px solid var(--verde-escuro); border-radius: 6px; padding: 0.3rem 0.6rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; color: var(--verde-escuro);
    }
    .blocos-disponiveis { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip-bloco {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px; padding: 0.4rem 0.8rem;
      font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.95rem; color: var(--texto); cursor: pointer;
    }
    .chip-bloco:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .chip-usado { opacity: 0.4; cursor: default; }

    .placa-dourada {
      position: absolute; bottom: 20px; left: 50%; transform: translate(-50%, 10px);
      background: linear-gradient(135deg, #fff3d6, #e9c877); color: #3d2600;
      font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: clamp(0.95rem, 2.4vw, 1.2rem);
      padding: 0.65rem 1.3rem; border-radius: 8px; border: 1px solid #a97c1f;
      box-shadow: 0 3px 12px rgba(0,0,0,.3); text-align: center; max-width: 92%;
      opacity: 0; animation: placaIn .5s ease forwards; z-index: 6; pointer-events: none;
    }
    @keyframes placaIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* PAINEL DE INTERAÇÃO */
    #painelInteracao { max-width: 900px; margin: 1.2rem auto 0; }
    .interacao-painel {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.4rem 1.6rem 1.3rem;
    }
    .interacao-pergunta-texto {
      font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600;
      line-height: 1.35; margin-bottom: 1rem;
    }
    .opcoes-linha { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .btn-opcao {
      background: var(--fundo); border: 1.5px solid var(--borda-forte); border-radius: 6px;
      padding: 0.55rem 1.1rem; font-family: 'Libre Baskerville', serif; font-size: 0.95rem;
      color: var(--texto); cursor: pointer; transition: border-color .2s, background .2s;
    }
    .btn-opcao:hover:not(:disabled) { border-color: var(--dourado-claro); }
    .btn-opcao:disabled { cursor: default; opacity: 0.75; }
    .opcao-certa { border-color: var(--verde-escuro) !important; background: rgba(30,82,56,0.12); }
    .opcao-errada { border-color: var(--vermelho-escuro) !important; background: rgba(122,21,21,0.08); }

    .btn-continuar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 0.6rem 1.5rem;
      border-radius: 4px; cursor: pointer; transition: background 0.2s, color 0.2s, opacity .2s;
      display: block; margin: 0.2rem auto 0;
    }
    .btn-continuar:hover { background: var(--dourado-claro); color: #1e1008; }
    .btn-continuar:disabled { opacity: 0.4; cursor: default; }

    /* Botão continuar dentro do balão da professora */
    #continuarBalao { margin-top: 0.6rem; }
    #continuarBalao .btn-continuar { display: inline-block; margin: 0; }
    .btn-continuar:disabled:hover { background: #1e1008; color: var(--dourado-claro); }

    .modal-feedback {
      margin-top: 1rem; font-size: 0.86rem; line-height: 1.7;
      border-left: 3px solid var(--borda-forte); padding-left: 1rem; display: none;
    }
    .modal-feedback.visivel { display: block; }
    .feedback-certo   { color: var(--verde-escuro); font-weight: 700; }
    .feedback-errado  { color: var(--vermelho-escuro); font-weight: 700; }
    .feedback-explicacao { color: var(--texto); margin-top: 0.5rem; }

    .quadro-item {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 10px;
      padding: 0.7rem 1.2rem; min-width: 220px; text-align: center;
    }
    .quadro-item .valor { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--texto); }

    .quadro-resumo-final {
      background: var(--fundo-card); border: 1.5px solid var(--borda-forte); border-radius: 12px;
      padding: 1.2rem 1.6rem; max-width: 88%; text-align: left;
    }
    .quadro-resumo-final .resumo-linha {
      font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--texto);
      padding: 0.45rem 0; border-bottom: 1px solid var(--borda);
    }
    .quadro-resumo-final .resumo-linha:last-child { border-bottom: none; }

    /* CONCLUSÃO */
    .conclusao {
      display: none; margin-top: 3rem; background: var(--fundo-card);
      border: 1.5px solid var(--borda-forte); border-radius: 12px; padding: 3rem 2rem; text-align: center;
    }
    .conclusao.visivel { display: block; }
    .conclusao-titulo {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 600; margin-bottom: 0.8rem;
    }
    .conclusao-placar { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--dourado-claro); margin-bottom: 1rem; }
    .conclusao-mensagem { font-size: 0.93rem; color: var(--texto-suave); max-width: 460px; margin: 0 auto 2rem; line-height: 1.8; }
    .btn-reiniciar {
      background: #1e1008; color: var(--dourado-claro); border: 1.5px solid var(--dourado-claro);
      font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.7rem 2rem; border-radius: 4px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-reiniciar:hover { background: var(--dourado-claro); color: #1e1008; }

    /* FOOTER */
    footer {
      background: var(--escuro); border-top: 2px solid var(--dourado-claro);
      padding: .6rem 2rem; text-align: center; font-size: 0.78rem; color: rgba(255,248,238,0.5);
    }

    @media (min-width: 641px) {
      .narrador { max-width: 900px; margin: 0 auto .8rem; }
      .narrador-texto { font-size: 1.05rem; }
    }

    @media (max-width: 640px) {
      .top-nav { padding: 0 1.2rem; gap: 1.2rem; }
      main { padding: .8rem 1rem 1rem; }
      .interacao-painel { padding: 1.2rem 1rem; }
      .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
      .link-aula svg { width: 18px; height: 18px; }
      .placa-dourada { font-size: 0.82rem; padding: 0.5rem 0.85rem; }
      .coluna-recipiente { min-width: 92px; padding: 6px; }
      .recipiente-particulas { width: 70px; }
      .cartao-formula-grande { font-size: 1.15rem; padding: 0.5rem 1rem; }
      .cartao-formula-simples { font-size: 0.95rem; padding: 0.4rem 0.8rem; }
      .jogo-associacao { gap: 14px; }
      .item-associacao { font-size: 0.78rem; padding: 0.4rem 0.7rem; }
      .medidor-ionizacao { width: 92%; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">KiFácil</div>
</nav>

<main>
  <h1 class="titulo-jogo">A Galeria dos Ácidos</h1>
  <p class="subtitulo">Investigue o que acontece quando um ácido é colocado em água — antes de decorar qualquer definição.</p>

  <div class="narrador">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Professora Rafaela" />
    <div style="flex: 1;">
      <div class="narrador-nome">Professora Rafaela</div>
      <div class="narrador-texto" id="narradorTexto">Vamos começar.</div>
      <div id="continuarBalao"></div>
    </div>
  </div>

  <div class="imagem-wrapper" id="imagemWrapper">
    <img src="../imagens/galeria-dos-acidos.jpg" alt="Galeria dos Ácidos" class="cena-fundo" />
    <div class="overlay-animacao" id="overlayAnimacao"></div>
    <!-- COLOQUE O LINK AQUI -->
    <a class="link-aula" href="https://www.youtube.com/watch?v=uwa0Mbkmo_g" target="_blank" rel="noopener" title="Assista à aula">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.6"/>
        <path d="M10 8.5L16 12L10 15.5V8.5Z" fill="currentColor"/>
      </svg>
      <span>Assista à aula</span>
    </a>
  </div>

  <div id="painelInteracao"></div>

  <div class="conclusao" id="conclusao">
    <div class="conclusao-titulo">Estudo concluído</div>
    <div class="conclusao-placar" id="conclusaoPlacar"></div>
    <p class="conclusao-mensagem" id="conclusaoMensagem"></p>
    <button class="btn-reiniciar" onclick="reiniciar()">Jogar novamente</button>
  </div>
</main>

<footer>© 2026 KiFácil</footer>

<script>
/* ==========================================================
   REFERÊNCIAS DOM
   ========================================================== */
const overlay = document.getElementById('overlayAnimacao');
const painel  = document.getElementById('painelInteracao');
const continuarBalao = document.getElementById('continuarBalao');

function fala(texto) { document.getElementById('narradorTexto').textContent = texto; }

const _brilho = new Audio('../sons/brilho.MP3');
_brilho.preload = 'auto';
function tocarBrilho() { try { _brilho.currentTime = 0; _brilho.play().catch(() => {}); } catch (e) {} }

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

let timersAtivos = [];
function agendar(fn, ms) { const id = setTimeout(fn, ms); timersAtivos.push(id); return id; }
function limparTimers() { timersAtivos.forEach(clearTimeout); timersAtivos = []; }

/* ==========================================================
   DADOS: FÓRMULAS, TIPOS E NOMENCLATURA
   ========================================================== */
const FORMULAS = {

};
const NOMENCLATURA_BLOCOS = {
  HCl: ['ÁCIDO', 'CLOR', 'ÍDRICO'],
  HBr: ['ÁCIDO', 'BROM', 'ÍDRICO'],
  H2S: ['ÁCIDO', 'SULF', 'ÍDRICO'],
  HNO3: ['ÁCIDO', 'NITR', 'ICO'],

function criarCircuito(id) {
  const div = document.createElement('div');
  div.className = 'circuito-visual';
  div.id = id;
  div.innerHTML =
    '<svg viewBox="0 0 200 160" width="280" height="224">' +
    '<rect x="40" y="70" width="120" height="70" rx="6" fill="rgba(255,255,255,0.3)" stroke="#3d2e1a" stroke-width="2.5"/>' +
    '<rect x="70" y="60" width="8" height="70" fill="#3d2e1a"/>' +
    '<rect x="122" y="60" width="8" height="70" fill="#3d2e1a"/>' +
    '<line x1="74" y1="60" x2="74" y2="30" stroke="#3d2e1a" stroke-width="2"/>' +
    '<line x1="126" y1="60" x2="126" y2="30" stroke="#3d2e1a" stroke-width="2"/>' +
    '<line x1="74" y1="30" x2="100" y2="30" stroke="#3d2e1a" stroke-width="2"/>' +
    '<line x1="126" y1="30" x2="100" y2="30" stroke="#3d2e1a" stroke-width="2"/>' +
    '<circle id="lampada-' + id + '" cx="100" cy="18" r="16" fill="#e9c877" stroke="#8a5e10" stroke-width="2" opacity="0.15"/>' +
    '<line x1="100" y1="30" x2="100" y2="26" stroke="#3d2e1a" stroke-width="2"/>' +
    '<g id="ions-' + id + '"></g>' +
    '</svg>' +
    '<div class="frasco-rotulo">Circuito de teste</div>';
  return div;
}
function definirIntensidadeLampada(id, intensidade) {
  const l = document.getElementById('lampada-' + id);
  if (!l) return;
  l.setAttribute('opacity', Math.max(0.15, Math.min(1, intensidade)));
  l.style.filter = intensidade > 0.5 ? 'drop-shadow(0 0 10px rgba(232,184,75,0.9))' : 'none';
}
function animarIonsCircuito(id) {
  const g = document.getElementById('ions-' + id);
  if (!g) return;
  for (let i = 0; i < 6; i++) {
    const ion = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    const positivo = i % 2 === 0;
    ion.setAttribute('r', '4');
    ion.setAttribute('fill', positivo ? '#c8920a' : '#7a1515');
    ion.setAttribute('cx', 80 + Math.random() * 40);
    ion.setAttribute('cy', 90 + Math.random() * 30);
    ion.setAttribute('class', 'ion-movendo');
    ion.style.animationDelay = (Math.random() * 1.2).toFixed(2) + 's';
    g.appendChild(ion);
  }
}

function atualizarMedidorIonizacao(id, pct) {

  if (classif) classif.textContent = texto + ' (α = ' + pct + '%)';

/* ==========================================================

function botaoContinuar(delayMs) {
  delayMs = delayMs || 0;
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continuar →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', avancar);
  return btn;
}

function botaoContinuarLocal(handler, delayMs) {
  delayMs = delayMs || 0;
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'Continuar →';
  btn.disabled = delayMs > 0;
  continuarBalao.appendChild(btn);
  if (delayMs > 0) agendar(function () { btn.disabled = false; }, delayMs);
  btn.addEventListener('click', function () { btn.disabled = true; handler(); });
  return btn;
}

function escolhaBotoes(opts) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">' + opts.pergunta + '</div>' +
    '<div class="opcoes-linha" id="opcoesLinha"></div>' +
    '<div class="modal-feedback" id="feedbackEscolha"></div>';
  painel.appendChild(wrap);

  const opcoesLinha = wrap.querySelector('#opcoesLinha');
  const feedback = wrap.querySelector('#feedbackEscolha');
  let tentativas = 0;
  let resolvido = false;

  opts.opcoes.forEach(function (op) {
    const btn = document.createElement('button');
    btn.className = 'btn-opcao';
    btn.textContent = op.rotulo;
    btn.addEventListener('click', function () {
      if (resolvido) return;
      if (op.correta) {
        resolvido = true;
        tocarDing();
        Array.from(opcoesLinha.children).forEach(function (b) { b.disabled = true; });
        btn.classList.add('opcao-certa');
        feedback.className = 'modal-feedback visivel';
        feedback.innerHTML = '<span class="feedback-certo">Correto!</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
        opts.aoAcertar();
      } else {
        tentativas++;
        btn.classList.add('opcao-errada');
        if (tentativas === 1 && opts.dica) {
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-errado">' + opts.dica + '</span>';
        } else if (tentativas >= 2) {
          resolvido = true;
          Array.from(opcoesLinha.children).forEach(function (b, i) {
            b.disabled = true;
            if (opts.opcoes[i].correta) b.classList.add('opcao-certa');
          });
          feedback.className = 'modal-feedback visivel';
          feedback.innerHTML = '<span class="feedback-resposta">Resposta correta destacada.</span><p class="feedback-explicacao">' + opts.explicacao + '</p>';
          opts.aoAcertar();
        }
      }
    });
    opcoesLinha.appendChild(btn);
  });
}

/* ==========================================================
   JOGO DE ASSOCIAÇÃO (fórmula ↔ nome), por clique/toque
   ========================================================== */
function criarJogoDeAssociacao(pares, mensagemErro, mensagemSucesso) {
  const container = document.createElement('div');
  container.className = 'jogo-associacao';
  overlay.appendChild(container);

  const colFormulas = document.createElement('div'); colFormulas.className = 'coluna-associacao';
  const colNomes = document.createElement('div'); colNomes.className = 'coluna-associacao';
  container.appendChild(colFormulas); container.appendChild(colNomes);

  const formulasEmbaralhadas = pares.map(function (p) { return p.chave; }).sort(function () { return Math.random() - 0.5; });
  const nomesEmbaralhados = pares.map(function (p) { return p.nome; }).sort(function () { return Math.random() - 0.5; });

  let selFormula = null, selNome = null, acertosTotal = 0;
  const elFormulas = {}, elNomes = {};

  formulasEmbaralhadas.forEach(function (chave) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = FORMULAS[chave];
    colFormulas.appendChild(el);
    elFormulas[chave] = el;
    el.addEventListener('click', function () {
      if (el.classList.contains('associado')) return;
      Object.keys(elFormulas).forEach(function (k) { elFormulas[k].classList.remove('item-selecionado'); });
      el.classList.add('item-selecionado');
      selFormula = chave;
      tentarAssociar();
    });
  });
  nomesEmbaralhados.forEach(function (nome) {
    const el = document.createElement('div');
    el.className = 'item-associacao';
    el.textContent = nome;
    colNomes.appendChild(el);
    elNomes[nome] = el;
    el.addEventListener('click', function () {
      if (el.classList.contains('associado')) return;
      Object.keys(elNomes).forEach(function (k) { elNomes[k].classList.remove('item-selecionado'); });
      el.classList.add('item-selecionado');
      selNome = nome;
      tentarAssociar();
    });
  });

  function tentarAssociar() {
    if (!selFormula || !selNome) return;
    const par = pares.filter(function (p) { return p.chave === selFormula; })[0];
    if (par.nome === selNome) {
      elFormulas[selFormula].classList.add('associado');
      elNomes[selNome].classList.add('associado');
      elFormulas[selFormula].classList.remove('item-selecionado');
      elNomes[selNome].classList.remove('item-selecionado');
      tocarDing();
      acertosTotal++;
      if (acertosTotal === pares.length) {
        agendar(function () { fala(mensagemSucesso); botaoContinuar(400); }, 300);
      }
    } else {
      fala(mensagemErro);
      elFormulas[selFormula].classList.add('erro-flash');
      elNomes[selNome].classList.add('erro-flash');
      setTimeout(function () {
        elFormulas[selFormula].classList.remove('erro-flash', 'item-selecionado');
        elNomes[selNome].classList.remove('erro-flash', 'item-selecionado');
      }, 500);
    }
    selFormula = null; selNome = null;
  }
}

/* ==========================================================
   MONTAGEM DE NOME POR BLOCOS (clique/toque)
   ========================================================== */
function montarNomePorBlocos(chave, aoConcluir) {
  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML =
    '<div class="interacao-pergunta-texto">Monte o nome clicando nos blocos, na ordem correta.</div>' +
    '<div class="formula-alvo">' + FORMULAS[chave] + '</div>' +
    '<div class="montagem-nome" id="montagemNome"></div>' +
    '<div class="blocos-disponiveis" id="blocosDisponiveis"></div>' +
    '<div class="modal-feedback" id="fbNomenclatura"></div>';
  painel.appendChild(wrap);

  const sequenciaCorreta = NOMENCLATURA_BLOCOS[chave];
  const montagemEl = wrap.querySelector('#montagemNome');
  const blocosEl = wrap.querySelector('#blocosDisponiveis');
  const fb = wrap.querySelector('#fbNomenclatura');
  let progresso = 0;

  const blocosEmbaralhados = sequenciaCorreta.slice().sort(function () { return Math.random() - 0.5; });
  blocosEmbaralhados.forEach(function (bloco) {
    const chip = document.createElement('button');
    chip.className = 'chip-bloco';
    chip.type = 'button';
    chip.textContent = bloco;
    chip.addEventListener('click', function () {
      if (chip.disabled) return;
      if (bloco === sequenciaCorreta[progresso]) {
        tocarDing();
        chip.disabled = true;
        chip.classList.add('chip-usado');
        const tag = document.createElement('span');
        tag.className = 'bloco-montado';
        tag.textContent = bloco;
        montagemEl.appendChild(tag);
        progresso++;
        if (progresso === sequenciaCorreta.length) {
          fb.className = 'modal-feedback visivel';
          fb.innerHTML = '<span class="feedback-certo">Correto!</span><p class="feedback-explicacao">' + FORMULAS[chave] + ' → ' + sequenciaCorreta.join('').toLowerCase() + '</p>';
          Array.from(blocosEl.children).forEach(function (b) { b.disabled = true; });
          aoConcluir();
        }
      } else {
        chip.classList.add('erro-flash');
        setTimeout(function () { chip.classList.remove('erro-flash'); }, 500);
        fb.className = 'modal-feedback visivel';
        fb.innerHTML = '<span class="feedback-errado">Observe o nome do ânion e a terminação usada.</span>';
      }
    });
    blocosEl.appendChild(chip);
  });
}

/* ==========================================================
   ETAPA 3 — IONIZAÇÃO E GRAU DE IONIZAÇÃO (α)
   ========================================================== */
function passoIonizacao() {
  fala('Vamos observar três ácidos diferentes se dissolvendo em água.');
  const dados = [
    { id: 'A', nome: 'Ácido A', ionizadas: 3 },
    { id: 'B', nome: 'Ácido B', ionizadas: 10 },
    { id: 'C', nome: 'Ácido C', ionizadas: 18 }
  ];
  const linha = document.createElement('div');
  linha.className = 'linha-recipientes';
  overlay.appendChild(linha);

  dados.forEach(function (d) {
    const col = document.createElement('div');
    col.className = 'coluna-recipiente';
    col.innerHTML =
      '<div class="recipiente-titulo">' + d.nome + '</div>' +
      '<div class="recipiente-particulas" id="part-' + d.id + '"></div>' +
      '<div class="recipiente-contador" id="cont-' + d.id + '">Moléculas dissolvidas: 20<br>Moléculas ionizadas: 0</div>';
    linha.appendChild(col);
    const partContainer = col.querySelector('#part-' + d.id);
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particula-molecula';
      partContainer.appendChild(p);
    }
  });

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.innerHTML = '<div class="interacao-pergunta-texto">Observe a ionização em cada recipiente.</div>';
  const btn = document.createElement('button');
  btn.className = 'btn-continuar';
  btn.textContent = 'OBSERVAR A IONIZAÇÃO';
  wrap.appendChild(btn);
  painel.appendChild(wrap);

  btn.addEventListener('click', function () {
    btn.disabled = true;
    dados.forEach(function (d) {
      const partContainer = document.getElementById('part-' + d.id);
      const particulas = Array.from(partContainer.children).sort(function () { return Math.random() - 0.5; });
      for (let i = 0; i < d.ionizadas; i++) particulas[i].classList.add('particula-ionizada');
      document.getElementById('cont-' + d.id).innerHTML = 'Moléculas dissolvidas: 20<br>Moléculas ionizadas: ' + d.ionizadas;
    });
    escolhaBotoes({
      pergunta: 'Em qual solução ocorreu maior ionização?',
      opcoes: [
        { rotulo: 'Ácido A', correta: false },
        { rotulo: 'Ácido B', correta: false },
        { rotulo: 'Ácido C', correta: true }
      ],
      dica: 'Conte quantas moléculas realmente se ionizaram em cada recipiente.',
      explicacao: 'O Ácido C teve quase todas as moléculas ionizadas — maior grau de ionização (α = moléculas ionizadas ÷ moléculas dissolvidas). Quanto maior o grau de ionização, mais forte é o ácido.',
      aoAcertar: function () {
        agendar(function () {
          const medidor = criarMedidorIonizacao('med-ion');
          overlay.appendChild(medidor);
          const painelCalculo = document.createElement('div');
          painelCalculo.className = 'painel-calculo';
          painelCalculo.innerHTML = '<div class="linha-calculo">α = 18 ÷ 20</div><div class="linha-calculo linha-calculo-final">α = 90% — ácido forte</div>';
          overlay.insertBefore(painelCalculo, linha);
          atualizarMedidorIonizacao('med-ion', 90);
          fala('Quanto maior a proporção de moléculas ionizadas, maior o grau de ionização. Como 90% é maior que 50%, o Ácido C é forte.');
          botaoContinuar(500);
        }, 300);
      }
    });
  });
}

/* ==========================================================
   ETAPA 5 — COMPARAÇÃO VISUAL (ordenar por clique)
   ========================================================== */
function passoEtapa5() {
  fala('Observe estas três substâncias em solução. Clique nelas na ordem da maior para a menor ionização.');
  const substancias = [
    { chave: 'HCl', ionizadas: 18 },
    { chave: 'HF', ionizadas: 6 },
    { chave: 'H2CO3', ionizadas: 1 }
  ];
  const ordemCorreta = ['HCl', 'HF', 'H2CO3'];
  const linha = document.createElement('div');
  linha.className = 'linha-cartas-ionizacao';
  overlay.appendChild(linha);

  const selecaoAtual = [];
  const cartaoEls = {};

  substancias.forEach(function (s) {
    const cartao = document.createElement('div');
    cartao.className = 'cartao-ionizacao';
    const grid = document.createElement('div');
    grid.className = 'recipiente-particulas';
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particula-molecula';
      if (i < s.ionizadas) p.classList.add('particula-ionizada');
      grid.appendChild(p);
    }
    const formulaEl = document.createElement('div');
    formulaEl.className = 'cartao-ionizacao-formula';
    formulaEl.textContent = FORMULAS[s.chave];
    const ordemTag = document.createElement('div');
    ordemTag.className = 'cartao-ionizacao-ordem';
    cartao.appendChild(formulaEl);
    cartao.appendChild(grid);
    cartao.appendChild(ordemTag);
    linha.appendChild(cartao);
    cartaoEls[s.chave] = { cartao: cartao, ordemTag: ordemTag };

    cartao.addEventListener('click', function () {
      if (selecaoAtual.indexOf(s.chave) !== -1) return;
      selecaoAtual.push(s.chave);
      ordemTag.textContent = selecaoAtual.length;
      cartao.classList.add('cartao-selecionado');
      if (selecaoAtual.length === 3) {
        agendar(function () {
          const acertou = selecaoAtual.every(function (c, i) { return c === ordemCorreta[i]; });
          if (acertou) {
            tocarDing();
            fala('Não é a quantidade de hidrogênios da fórmula que determina sozinha a força do ácido. A força está relacionada à proporção que efetivamente se ioniza em água.');
            botaoContinuar(500);
          } else {
            fala('Compare a quantidade de partículas douradas (ionizadas) em cada recipiente e tente novamente.');
            selecaoAtual.length = 0;
            Object.keys(cartaoEls).forEach(function (k) {
              cartaoEls[k].cartao.classList.remove('cartao-selecionado');
              cartaoEls[k].ordemTag.textContent = '';
            });
          }
        }, 400);
      }
    });
  });
}

/* ==========================================================
   ETAPA 6 — HIDRÁCIDOS
   ========================================================== */
function passoHidracidos() {
  fala('Agora vamos dar nomes aos ácidos. Estas fórmulas não têm oxigênio: são os HIDRÁCIDOS, nomeados por ÁCIDO + nome do ânion + ÍDRICO. Associe cada fórmula ao seu nome.');

  criarJogoDeAssociacao([
    { chave: 'HCl', nome: 'ácido clorídrico' },
    { chave: 'HBr', nome: 'ácido bromídrico' },
    { chave: 'HI', nome: 'ácido iodídrico' },
    { chave: 'HF', nome: 'ácido fluorídrico' }
  ], 'Observe o nome do ânion e a terminação usada nos hidrácidos.', 'Muito bem! Você nomeou todos os hidrácidos corretamente.');
}

/* ==========================================================
   ETAPA 7 — OXIÁCIDOS
   ========================================================== */
function passoOxiacidos() {
  fala('Estes ácidos têm oxigênio: são os OXIÁCIDOS. Compare os pares abaixo — o que diferencia cada dupla?');
  const linha = document.createElement('div');
  linha.className = 'linha-cartas-simples';
  ['HNO3', 'HNO2', 'H2SO4', 'H2SO3'].forEach(function (c) {
    const cartao = document.createElement('div');
    cartao.className = 'cartao-formula-simples';
    cartao.textContent = FORMULAS[c];
    linha.appendChild(cartao);
  });
  overlay.appendChild(linha);

  agendar(function () {
    escolhaBotoes({
      pergunta: 'O que diferencia cada dupla de oxiácidos do mesmo elemento?',
      opcoes: [
        { rotulo: 'A quantidade de oxigênio', correta: true },
        { rotulo: 'A quantidade de hidrogênio', correta: false },
        { rotulo: 'O elemento central', correta: false }
      ],
      dica: 'Compare os dois oxiácidos de cada elemento e conte os átomos de oxigênio.',
      explicacao: 'Mais oxigênio → maior NOX → terminação ICO (nítrico, sulfúrico). Menos oxigênio → menor NOX → terminação OSO (nitroso, sulfuroso). Essa comparação só vale entre oxiácidos do mesmo elemento central.',
      aoAcertar: function () {
        agendar(function () {
          const placa = document.createElement('div');
          placa.className = 'placa-dourada';
          placa.textContent = 'Maior NOX → ICO   |   Menor NOX → OSO';
          overlay.appendChild(placa);
          botaoContinuar(400);
        }, 300);
      }
    });
  }, 700);
}

/* ==========================================================
   ETAPA 8 — DESAFIO DE NOMENCLATURA
   ========================================================== */
function criarPassoNomenclatura(chave) {
  return function () {
    fala('Identifique e nomeie o ácido: ' + FORMULAS[chave] + '.');
    const cartaoFormula = document.createElement('div');
    cartaoFormula.className = 'cartao-formula-grande';
    cartaoFormula.style.position = 'absolute';
    cartaoFormula.style.left = '50%'; cartaoFormula.style.top = '10%'; cartaoFormula.style.transform = 'translateX(-50%)';
    cartaoFormula.textContent = FORMULAS[chave];
    overlay.appendChild(cartaoFormula);

    escolhaBotoes({
      pergunta: 'Esse ácido é um hidrácido ou um oxiácido?',
      opcoes: [
        { rotulo: 'Hidrácido', correta: TIPO_ACIDO[chave] === 'hidracido' },
        { rotulo: 'Oxiácido', correta: TIPO_ACIDO[chave] === 'oxiacido' }
      ],
      dica: 'Observe se a fórmula possui oxigênio.',
      explicacao: TIPO_ACIDO[chave] === 'hidracido' ? 'Sem oxigênio: é um hidrácido.' : 'Com oxigênio: é um oxiácido.',
      aoAcertar: function () {
        agendar(function () {
          montarNomePorBlocos(chave, function () { agendar(function () { botaoContinuar(400); }, 300); });
        }, 300);
      }
    });
  };
}
const NOMENCLATURA_ORDEM = ['HCl', 'HNO3', 'HNO2', 'H2SO4', 'H2SO3'];
const passosNomenclatura = NOMENCLATURA_ORDEM.map(function (c) { return criarPassoNomenclatura(c); });

/* ==========================================================
   CONCLUSÃO
   ========================================================== */
function passoFinal() {
  fala('Excelente. Agora você consegue reconhecer um ácido, interpretar sua ionização e construir seu nome.');
  function linha(txt) { return '<div class="resumo-linha">' + txt + '</div>'; }
  overlay.innerHTML =
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:12px;">' +
    '<div class="quadro-resumo-final">' +
    linha('Ácidos em água formam H₃O⁺.') +
    linha('Os íons produzidos conduzem corrente elétrica.') +
    linha('Diferentes ácidos apresentam diferentes graus de ionização (α).') +
    linha('Hidrácidos e oxiácidos seguem regras próprias de nomenclatura.') +
    '</div></div>';

  painel.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'interacao-painel';
  wrap.style.display = 'flex'; wrap.style.gap = '0.8rem'; wrap.style.justifyContent = 'center'; wrap.style.flexWrap = 'wrap';
  const btnRevisar = document.createElement('button');
  btnRevisar.className = 'btn-continuar';
  btnRevisar.textContent = 'REVISAR A FASE';
  btnRevisar.addEventListener('click', function () { irPara(0); });
  const btnConcluir = document.createElement('button');
  btnConcluir.className = 'btn-continuar';
  btnConcluir.textContent = 'CONCLUIR';
  btnConcluir.addEventListener('click', function () {
    const conclusao = document.getElementById('conclusao');
    document.getElementById('conclusaoPlacar').textContent = 'Fase concluída';
    document.getElementById('conclusaoMensagem').textContent = 'Você investigou os ácidos: como formam H₃O⁺ em água, como conduzem corrente elétrica, o que é grau de ionização e como nomear hidrácidos e oxiácidos.';
    conclusao.classList.add('visivel');
    conclusao.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  wrap.appendChild(btnRevisar); wrap.appendChild(btnConcluir);
  painel.appendChild(wrap);
}

/* ==========================================================
   MOTOR DA FASE
   ========================================================== */
const PASSOS = [passoIntro, passoEtapa2, passoIonizacao, passoEtapa5, passoHidracidos, passoOxiacidos]
  .concat(passosNomenclatura)
  .concat([passoFinal]);

let passoAtual = 0;

function irPara(i) {
  passoAtual = i;
  limparTimers();
  overlay.innerHTML = '';
  painel.innerHTML = '';
  continuarBalao.innerHTML = '';
  PASSOS[i]();
}
function avancar() { if (passoAtual + 1 < PASSOS.length) irPara(passoAtual + 1); }
function reiniciar() {
  document.getElementById('conclusao').classList.remove('visivel');
  irPara(0);
}

/* ── INIT ── */
irPara(0);
</script>
