
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ions — Chemistry Tower | KiFácil Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --fundo: #fdf8f0;
    --fundo-card: #fffdf9;
    --escuro: #2e2016;
    --texto: #1a1208;
    --texto-suave: #3d2e1a;
    --dourado: #8a5e10;
    --dourado-claro: #c8920a;
    --borda: rgba(100,70,20,0.3);
    --borda-forte: rgba(100,70,20,0.5);
    --verde-escuro: #1e5238;
    --vermelho-escuro: #7a1515;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Libre Baskerville', Georgia, serif;
    background: var(--fundo);
    color: var(--texto);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* NAV */
  .top-nav {
    background: var(--escuro);
    border-bottom: 2px solid var(--dourado-claro);
    padding: 0 2.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem;
    font-weight: 600;
    color: var(--fundo-card);
    letter-spacing: 0.03em;
  }

  /* MAIN */
  main {
    flex: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem 2.5rem;
    width: 100%;
  }
  .titulo-jogo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 600;
    margin-bottom: 1rem;
    line-height: 1.1;
  }

  /* NARRADOR (professora) */
  .narrador {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1.4rem;
    padding: 1rem 1.1rem;
    border: 1.5px solid var(--borda-forte);
    border-radius: 10px;
    background: rgba(30,16,8,0.05);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }
  .narrador img {
    width: 78px;
    height: 96px;
    object-fit: cover;
    object-position: top center;
    border-radius: 10px;
    border: 1px solid rgba(200,146,10,.35);
    flex-shrink: 0;
  }
  .narrador-nome {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--dourado-claro);
    margin-bottom: 0.4rem;
  }
  .narrador-texto {
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--texto-suave);
  }
  #continuarBalao { margin-top: 0.6rem; }

  /* LINHA: CENA + ATIVIDADE LADO A LADO */
  .cena-atividade {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
  }

  /* CENA / IMAGEM */
  .imagem-wrapper {
    position: relative;
    flex: 1 1 56%;
    min-width: 0;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border: 1.5px solid var(--borda-forte);
    border-radius: 6px;
    background: var(--fundo);
  }
  .imagem-cenario {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .link-aula {
    position: absolute; top: 105px; right: 10px; z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    text-decoration: none; color: #fff8ee;
    background: rgba(30,16,8,0.72); border: 1.5px solid var(--dourado-claro, #c8920a);
    border-radius: 8px; padding: 0.4rem 0.65rem;
    font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 600;
    letter-spacing: 0.02em; text-align: center; line-height: 1.2;
    cursor: pointer; transition: background 0.2s, transform 0.15s;
  }
  .link-aula:hover { background: rgba(30,16,8,0.92); transform: translateY(-1px); }
  .link-aula svg { width: 22px; height: 22px; }

  /* HUD */
  .hud {
    position: absolute;
    top: 18px;
    right: 18px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 10px 12px;
    background: rgba(253, 248, 240, 0.9);
    border: 1px solid var(--borda);
    border-radius: 7px;
    color: var(--texto);
  }
  .hud.hud-grande {
    transform: scale(1.5);
    transform-origin: top right;
  }
  .hud.hud-mobile {
    position: relative;
    top: auto;
    right: auto;
    left: auto;
    margin: 0 auto 1rem;
    width: 100%;
    max-width: 1100px;
  }
  .hud.hud-mobile.hud-grande {
    transform: none;
  }
  .hud-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 0.72rem;
  }
  .hud-label {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--texto-suave);
  }
  .hud-valor {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--dourado);
  }

  /* ATOM */
  .atomo-wrap {
    position: absolute;
    left: 50%;
    top: 52%;
    transform: translate(-50%, -50%);
    width: 230px;
    height: 230px;
    z-index: 5;

    /* fine-tuning of the atom's visual center */
    --centro-x: 50.5%;
    --centro-y: 49.5%;
  }
  .camadas-eletronicas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .camada {
    position: absolute;
    left: var(--centro-x);
    top: var(--centro-y);
    transform: translate(-50%, -50%);
    border: 1px solid rgba(224, 181, 71, 0.9);
    border-radius: 50%;
    box-shadow: 0 0 3px rgba(224, 181, 71, 0.16);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }

  .camada-1 {
    width: 122px;
    height: 122px;
  }

  .camada-2 {
    width: 158px;
    height: 158px;
  }

  .camada-3 {
    width: 194px;
    height: 194px;
  }

  .camada-3.oculta {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.96);
  }

  .glow-nucleo {
    position: absolute;
    left: var(--centro-x);
    top: var(--centro-y);
    width: 132px;
    height: 132px;
    transform: translate(-50%, -50%);
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    z-index: 2;
  }
  .nucleo-wrap {
    position: absolute;
    left: var(--centro-x);
    top: var(--centro-y);
    width: 0;
    height: 0;
    z-index: 3;
    transform-origin: center center;
    animation: respirarNucleo 4s ease-in-out infinite;
  }
  @keyframes respirarNucleo {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  .nucleon {
    position: absolute;
    width: 14px;
    height: 14px;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
  }
  .eletron {
    position: absolute;
    width: 18px;
    height: 18px;
    object-fit: contain;
    z-index: 4;
    cursor: pointer;
    --base-scale: 1;
    --fx: 0px;
    --fy: 0px;
    --ft: 5s;
    animation: flutuarEletron var(--ft) ease-in-out infinite;
    transition: filter .15s;
  }
  @keyframes flutuarEletron {
    0%, 100% { transform: translate(0, 0) scale(var(--base-scale)); }
    50% { transform: translate(var(--fx), var(--fy)) scale(var(--base-scale)); }
  }
  .eletron.fixo { cursor: default; }
  .eletron.removivel:hover { --base-scale: 1.1; }
  .eletron.valencia-ativa {
    --base-scale: 1.12;
    filter: drop-shadow(0 0 5px rgba(200,146,10,.62));
    cursor: pointer;
  }
  .eletron.saindo { animation: sair 0.72s cubic-bezier(.2,.7,.25,1) forwards; pointer-events:none; }
  .eletron.entrando { animation: entrar 0.72s cubic-bezier(.2,.7,.25,1) forwards; pointer-events:none; }
  @keyframes sair {
    0%{transform:translate(0,0) scale(1.12);opacity:1}
    28%{transform:translate(calc(var(--tx) * .22), calc(var(--ty) * .22)) scale(1.22);opacity:.95}
    100%{transform:translate(var(--tx), var(--ty)) scale(.2);opacity:0}
  }
  @keyframes entrar {
    0%{transform:translate(var(--sx), var(--sy)) scale(.2);opacity:0}
    55%{transform:translate(var(--mx), var(--my)) scale(1.18);opacity:.9}
    100%{transform:translate(0,0) scale(1);opacity:1}
  }
  .rastro-eletron {
    position: absolute;
    width: 44px;
    height: 20px;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    z-index: 3;
    opacity: 0;
    transform-origin: center;
  }
  .rastro-eletron.saindo { animation: rastroSaindo 0.72s cubic-bezier(.2,.7,.25,1) forwards; }
  .rastro-eletron.entrando { animation: rastroEntrando 0.72s cubic-bezier(.2,.7,.25,1) forwards; }
  @keyframes rastroSaindo {
    0% { opacity: .75; transform: translate(0,0) rotate(var(--rot)); }
    100% { opacity: 0; transform: translate(calc(var(--tx) * .86), calc(var(--ty) * .86)) rotate(var(--rot)) scale(.75); }
  }
  @keyframes rastroEntrando {
    0% { opacity: 0; transform: translate(var(--sx), var(--sy)) rotate(var(--rot)) scale(.55); }
    25% { opacity: .75; }
    100% { opacity: 0; transform: translate(0,0) rotate(var(--rot)) scale(.95); }
  }

  /* ION TAG */
  .ion-tag {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: none;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 5px 16px;
    border-radius: 8px;
    border: 2px solid;
    background: rgba(253,248,240,0.92);
  }
  .ion-tag.cation { color: var(--dourado); border-color: var(--dourado); }
  .ion-tag.anion  { color: var(--verde-escuro); border-color: var(--verde-escuro); }
  .ion-tag.neutro { color: var(--texto-suave); border-color: var(--borda-forte); }

  /* ATIVIDADE (abaixo da imagem) */
  .atividade-card {
    flex: 1 1 44%;
    min-width: 0;
    padding: 1.5rem;
    background: var(--fundo-card);
    border: 1.5px solid var(--borda);
    border-radius: 10px;
    max-height: min(70vh, 560px);
    overflow-y: auto;
  }
  .atividade-cabecalho { margin-bottom: 1rem; }
  .atividade-eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dourado-claro);
    margin-bottom: 0.3rem;
  }
  .atividade-titulo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 600;
  }
  .atividade-corpo {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* ACTIVITY CONTENT ELEMENTS */
  .questao-titulo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 0.2rem;
  }
  .opcao-btn, .resposta-opcao {
    display: block;
    width: 100%;
    background: rgba(0,0,0,0.02);
    border: 1px solid var(--borda);
    border-radius: 6px;
    padding: 10px 14px;
    text-align: left;
    margin-bottom: 8px;
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 0.95rem;
    color: var(--texto);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .opcao-btn:hover, .resposta-opcao:hover { background: rgba(200,146,10,0.06); }
  .opcao-btn.correta, .resposta-opcao.correta { border-color: var(--verde-escuro); background: rgba(30,82,56,0.07); }
  .opcao-btn.errada, .resposta-opcao.errada { border-color: var(--vermelho-escuro); background: rgba(122,21,21,0.05); }
  .opcao-btn.neutra { opacity: 0.55; }
  .opcao-btn:disabled, .resposta-opcao:disabled { cursor: default; }

  .feedback-box {
    display: none;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 0.92rem;
    line-height: 1.6;
    border-left: 3px solid var(--borda-forte);
  }
  .feedback-box.visivel { display: block; }
  .feedback-box.ok  { border-color: var(--verde-escuro); background: rgba(30,82,56,0.06); color: var(--texto); }
  .feedback-box.err { border-color: var(--vermelho-escuro); background: rgba(122,21,21,0.05); color: var(--texto); }
  .feedback-box.info{ border-color: var(--borda-forte); background: rgba(100,70,20,0.05); color: var(--texto-suave); }

  .desafio-box {
    background: rgba(200,146,10,0.05);
    border: 1px solid var(--borda);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .desafio-titulo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--dourado-claro);
    margin-bottom: 4px;
  }
  .desafio-texto { font-size: 0.95rem; color: var(--texto-suave); }
  .eletron-controles { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .btn-eletron {
    background: var(--escuro);
    color: var(--dourado-claro);
    border: 1.5px solid var(--dourado-claro);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-eletron:hover { background: var(--dourado-claro); color: var(--escuro); }

  .btn-avancar {
    width: 100%;
    background: var(--escuro);
    color: var(--dourado-claro);
    border: 1.5px solid var(--dourado-claro);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  .btn-avancar:hover { background: var(--dourado-claro); color: var(--escuro); }

  .resumo-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--borda);
  }
  .resumo-item:last-of-type { border-bottom: none; }
  .resumo-icone {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--dourado-claro);
    width: 26px;
    flex-shrink: 0;
    text-align: center;
  }
  .resumo-texto { font-size: 0.94rem; line-height: 1.6; color: var(--texto-suave); }

  /* FOOTER */
  footer {
    background: var(--escuro);
    border-top: 2px solid var(--dourado-claro);
    padding: 1.2rem 2rem;
    text-align: center;
    font-size: 0.82rem;
    color: rgba(255,248,238,0.5);
  }

  @media (max-width: 860px) {
    .cena-atividade { flex-direction: column; }
    .imagem-wrapper { flex-basis: auto; width: 100%; }
    .atividade-card { flex-basis: auto; width: 100%; max-height: none; overflow-y: visible; }
  }

  @media (max-width: 640px) {
    .top-nav { padding: 0 1.2rem; }
    main { padding: 1.5rem 1rem 3rem; }
    .hud { top: 10px; left: 10px; padding: 7px 9px; }
    .hud.hud-mobile { top: auto; left: auto; right: auto; }
    .hud.hud-grande { transform-origin: top left; }
    .atomo-wrap { width: 214px; height: 214px; }
    .glow-nucleo { width: 120px; height: 120px; }
    .rastro-eletron { width: 34px; height: 16px; }
    .link-aula { top: 6px; right: 6px; padding: 0.3rem 0.5rem; font-size: 0.6rem; }
    .link-aula svg { width: 18px; height: 18px; }
  }

    /* AUDIO CONTROL */
    #controle-volume {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(14,6,0,0.85);
      border: 1.5px solid var(--borda-forte);
      border-radius: 24px;
      padding: 8px 16px 8px 10px;
    }
    #btn-mute {
      background: none;
      border: none;
      color: var(--dourado-claro);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #slider-volume {
      width: 90px;
      accent-color: var(--dourado-claro);
      cursor: pointer;
    }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">KiFácil</div>
</nav>

<main>
  <h1 class="titulo-jogo" id="tituloJogo">Neutral Atom</h1>

  <div class="narrador" id="teacherBox">
    <img src="../imagens/rafa-sorrindo.jpg" alt="Professor Rafaela" id="teacherImg">
    <div class="narrador-conteudo">
      <div class="narrador-nome">Professor Rafaela</div>
      <div class="narrador-texto" id="teacherText">Let's explore ions calmly.</div>
      <div id="continuarBalao"></div>
    </div>
  </div>

  <div class="cena-atividade">
    <div class="imagem-wrapper" id="imagemWrapper">
      <img src="../imagens/laboratorio-ions.jpg" alt="Ion laboratory" class="imagem-cenario">

      <div class="hud" id="hud">
        <div class="hud-item"><span class="hud-label">Protons</span><span class="hud-valor" id="hudProtons">—</span></div>
        <div class="hud-item"><span class="hud-label">Electrons</span><span class="hud-valor" id="hudEletrons">—</span></div>
        <div class="hud-item"><span class="hud-label">Charge</span><span class="hud-valor" id="hudCarga">—</span></div>
      </div>

      <div class="atomo-wrap" id="atomoWrap">
        <div class="camadas-eletronicas" id="camadasEletronicas" aria-hidden="true">
          <div class="camada camada-1"></div>
          <div class="camada camada-2"></div>
          <div class="camada camada-3"></div>
        </div>
        <img src="../imagens/glow-nucleo.png" alt="" class="glow-nucleo" draggable="false">
        <div class="nucleo-wrap" id="nucleoWrap"></div>
      </div>

      <div class="ion-tag" id="ionTag"></div>
</div>

    <section class="atividade-card">
      <div class="atividade-corpo" id="painelCorpo">
        <!-- stage content inserted by JavaScript -->
      </div>
    </section>
  </div>
</main>

<footer>© 2026 KiFácil</footer>

<script>
// ══════════════════════════════════════════════════
//  GLOBAL STATE
// ══════════════════════════════════════════════════
const estado = {
  protons: 11,
  eletrons: 11,
  neutrons: 12,
  etapa: 0,
  laboratorio: { desafioIdx: 0, eletronesAtivos: 11 },
  desafioFinal: { idx: 0, acertos: 0 }
};

const CENTRO_X = 0.505;
const CENTRO_Y = 0.495;

const _ding = new Audio('../sons/ding.mp3');
_ding.preload = 'auto';
function tocarDing() { try { _ding.currentTime = 0; _ding.play().catch(function () {}); } catch (e) {} }

// ══════════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════════
function atualizarHUD() {
  document.getElementById('hudProtons').textContent = estado.protons;
  document.getElementById('hudEletrons').textContent = estado.eletrons;
  const carga = estado.protons - estado.eletrons;
  const mostrarCarga = estado.etapa !== 5;
  document.getElementById('hudCarga').textContent = mostrarCarga
    ? (carga === 0 ? '0' : `${Math.abs(carga)}${carga > 0 ? '+' : '−'}`)
    : '—';
}

function setHudModoFinal(ativo) {
  const hud = document.getElementById('hud');
  if (!hud) return;
  hud.classList.toggle('hud-grande', !!ativo);
}

function atualizarPosicaoHudMobile() {
  const hud = document.getElementById('hud');
  const teacherBox = document.getElementById('teacherBox');
  const imagemWrapper = document.getElementById('imagemWrapper');
  if (!hud || !teacherBox || !imagemWrapper) return;

  const mobile = window.matchMedia('(max-width: 640px)').matches;

  if (mobile) {
    if (hud.parentElement !== teacherBox.parentElement) {
      teacherBox.insertAdjacentElement('afterend', hud);
    }
    hud.classList.add('hud-mobile');
    return;
  }

  if (hud.parentElement !== imagemWrapper) {
    const atomoWrap = document.getElementById('atomoWrap');
    if (atomoWrap) {
      imagemWrapper.insertBefore(hud, atomoWrap);
    } else {
      imagemWrapper.appendChild(hud);
    }
  }
  hud.classList.remove('hud-mobile');
}

// ══════════════════════════════════════════════════
//  DETERMINISTIC RANDOMNESS (same seed = same position)
// ══════════════════════════════════════════════════
function seededRandom(seed) {
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

// ══════════════════════════════════════════════════
//  NUCLEUS — assembled with real protons and neutrons
// ══════════════════════════════════════════════════
function limparNucleo() {
  const wrap = document.getElementById('nucleoWrap');
  if (wrap) wrap.innerHTML = '';
}

function renderizarNucleo(protons, neutrons) {
  limparNucleo();
  const wrap = document.getElementById('nucleoWrap');
  if (!wrap) return;

  const total = protons + neutrons;
  if (total <= 0) return;

  // builds the particle list and shuffles it deterministically,
  // so protons and neutrons are mixed in the cluster, not separated
  const particulas = [];
  for (let i = 0; i < protons; i++) particulas.push('proton');
  for (let i = 0; i < neutrons; i++) particulas.push('neutron');
  for (let i = particulas.length - 1; i > 0; i--) {
    const j = Math.floor(seededRandom(i * 7.13 + total * 3.71) * (i + 1));
    [particulas[i], particulas[j]] = [particulas[j], particulas[i]];
  }

  // compact golden-spiral distribution to keep the nucleus denser
  const R = Math.min(40, 5 + total * 1.05);
  const anguloAureo = Math.PI * (3 - Math.sqrt(5));
  const tamanho = 14;

  particulas.forEach((tipo, i) => {
    const r = R * Math.sqrt((i + 0.5) / total);
    const theta = i * anguloAureo;
    const x = r * Math.cos(theta);
    const y = r * Math.sin(theta);

    const img = document.createElement('img');
    img.src = tipo === 'proton' ? '../imagens/proton.png' : '../imagens/neutron.png';
    img.alt = '';
    img.draggable = false;
    img.className = 'nucleon';
    img.style.left = (x - tamanho / 2) + 'px';
    img.style.top  = (y - tamanho / 2) + 'px';

    wrap.appendChild(img);
  });
}

// ══════════════════════════════════════════════════
//  ELECTRONS — spread out in an electron cloud around the nucleus
// ══════════════════════════════════════════════════
function criarEletron(idx, total, raioIgnorado, opcoes = {}) {
  const wrap = document.getElementById('atomoWrap');

  /*
    Visual capacity of the shells:
    K = 2
    L = 8
    M = 8
    N = 18

    Each electron is placed by its position in the sequence,
    not by the total number of electrons.
  */
  const capacidades = [2, 8, 8];
  const raios = [61, 79, 97];

  let camada = 0;
  let primeiroIndiceDaCamada = 0;

  while (
    camada < capacidades.length - 1 &&
    idx >= primeiroIndiceDaCamada + capacidades[camada]
  ) {
    primeiroIndiceDaCamada += capacidades[camada];
    camada++;
  }

  const posicaoNaCamada = idx - primeiroIndiceDaCamada;

  // How many electrons actually exist in this shell right now
  const eletronsAntesDaCamada = primeiroIndiceDaCamada;
  const quantidadeNaCamada = Math.min(
    capacidades[camada],
    Math.max(0, total - eletronsAntesDaCamada)
  );

  /*
    Different starting rotation for each shell.
    This keeps all the electrons from lining up vertically.
  */
  const rotacoesIniciais = [
    -Math.PI / 2,
    -Math.PI / 8,
    Math.PI / 10,
    -Math.PI / 5
  ];

  const anguloBase =
    rotacoesIniciais[camada] +
    (2 * Math.PI * posicaoNaCamada) / quantidadeNaCamada;

  // Very small variation, just so it doesn't look mechanically perfect
  const variacaoAngular =
    (seededRandom(idx * 17.31 + total * 4.27) - 0.5) * 0.08;

  const angulo = anguloBase + variacaoAngular;

  /*
    All electrons in the same shell use exactly
    the same distance from the center.
  */
  const raioFinal = raios[camada];

  const x = Math.cos(angulo) * raioFinal;
  const y = Math.sin(angulo) * raioFinal;

  const tamanho = 18;
  const centroX = wrap.clientWidth * CENTRO_X;
  const centroY = wrap.clientHeight * CENTRO_Y;

  const el = document.createElement('img');
  el.src = '../imagens/eletron.png';
  el.alt = '';
  el.draggable = false;
  el.className = 'eletron' + (opcoes.removivel ? ' removivel' : ' fixo');

  el.dataset.idx = idx;
  el.dataset.shell = camada;
  el.dataset.shellPos = posicaoNaCamada;

  el.style.left = `${centroX + x - tamanho / 2}px`;
  el.style.top = `${centroY + y - tamanho / 2}px`;

  /*
    Tangential floating motion.
    Does not change the distance between the electron and the nucleus.
  */
  const amplitudeFlutuacao = 1.5;

  const flutuarX = -Math.sin(angulo) * amplitudeFlutuacao;
  const flutuarY =  Math.cos(angulo) * amplitudeFlutuacao;

  el.style.setProperty('--fx', `${flutuarX.toFixed(2)}px`);
  el.style.setProperty('--fy', `${flutuarY.toFixed(2)}px`);

  el.style.setProperty(
    '--ft',
    `${(4 + seededRandom(idx * 5.2 + total * 0.9) * 2).toFixed(2)}s`
  );

  if (opcoes.removivel) {
    el.classList.add('valencia-ativa');
  }

  if (opcoes.animar === 'entrar') {
    /*
      The electron starts outside the atom, along the same radial direction,
      and ends exactly at the calculated position.
    */
    const distanciaEntrada = 120;
    const sx = Math.cos(angulo) * distanciaEntrada;
    const sy = Math.sin(angulo) * distanciaEntrada;

    const mx = Math.cos(angulo + 0.35) * 35;
    const my = Math.sin(angulo + 0.35) * 35;

    el.style.setProperty('--sx', `${sx.toFixed(2)}px`);
    el.style.setProperty('--sy', `${sy.toFixed(2)}px`);
    el.style.setProperty('--mx', `${mx.toFixed(2)}px`);
    el.style.setProperty('--my', `${my.toFixed(2)}px`);

    criarRastroEletron(
      centroX + x,
      centroY + y,
      { tipo: 'entrando', sx, sy }
    );

    el.classList.add('entrando');
  }

  if (opcoes.onClick) {
    el.addEventListener('click', opcoes.onClick);
  }

  wrap.appendChild(el);
  return el;
}

function removerTodosEletrons() {
  document.querySelectorAll('.eletron').forEach(e => e.remove());
  document.querySelectorAll('.rastro-eletron').forEach(r => r.remove());
}

function atualizarCamadasVisiveis(qtdEletrons) {
  const terceiraCamada = document.querySelector('.camada-3');

  if (!terceiraCamada) return;

  /*
    Up to 10 electrons:
    2-8 distribution, so only two shells are occupied.

    Above 10 electrons:
    third shell occupied.
  */
  if (qtdEletrons <= 10) {
    terceiraCamada.classList.add('oculta');
  } else {
    terceiraCamada.classList.remove('oculta');
  }
}

function renderizarEletrons(qtd, raio = 88, removivel = false, onClickFn = null) {
  removerTodosEletrons();
  atualizarCamadasVisiveis(qtd);
  for (let i = 0; i < qtd; i++) {
    criarEletron(i, qtd, raio, { removivel, onClick: removivel ? onClickFn : null });
  }
}

function habilitarRemocaoSomenteNaCamadaExterna(onClickFn) {
  const eletrons = [...document.querySelectorAll('.eletron')];
  if (!eletrons.length) return;

  const camadasValidas = eletrons
    .map(el => Number(el.dataset.shell))
    .filter(Number.isFinite);

  // Defensive fallback: if any dataset comes back invalid,
  // keep progress moving by enabling clicks on all electrons.
  if (!camadasValidas.length) {
    eletrons.forEach(el => {
      el.classList.add('removivel', 'valencia-ativa');
      el.classList.remove('fixo');
      el.style.pointerEvents = 'auto';
      if (onClickFn) el.addEventListener('click', () => onClickFn(el));
    });
    return;
  }

  const camadaMaisExterna = Math.max(...camadasValidas);

  eletrons.forEach(el => {
    const camadaDoEletron = Number(el.dataset.shell);

    if (camadaDoEletron === camadaMaisExterna) {
      el.classList.add('removivel', 'valencia-ativa');
      el.classList.remove('fixo');
      el.style.pointerEvents = 'auto';
      if (onClickFn) el.addEventListener('click', () => onClickFn(el));
    } else {
      el.classList.add('fixo');
      el.classList.remove('removivel', 'valencia-ativa');
      el.style.pointerEvents = 'none';
    }
  });
}

function criarRastroEletron(x, y, opcoes = {}) {
  const wrap = document.getElementById('atomoWrap');
  if (!wrap) return;

  const rastro = document.createElement('img');
  rastro.src = '../imagens/rastro-eletron.png';
  rastro.alt = '';
  rastro.draggable = false;
  rastro.className = 'rastro-eletron ' + (opcoes.tipo === 'entrando' ? 'entrando' : 'saindo');

  rastro.style.left = (x - 22) + 'px';
  rastro.style.top = (y - 10) + 'px';

  const tx = opcoes.tx || 0;
  const ty = opcoes.ty || 0;
  const sx = opcoes.sx || 0;
  const sy = opcoes.sy || 0;
  const rot = Math.atan2(ty || sy, tx || sx) * 180 / Math.PI;

  rastro.style.setProperty('--tx', tx.toFixed(2) + 'px');
  rastro.style.setProperty('--ty', ty.toFixed(2) + 'px');
  rastro.style.setProperty('--sx', sx.toFixed(2) + 'px');
  rastro.style.setProperty('--sy', sy.toFixed(2) + 'px');
  rastro.style.setProperty('--rot', rot.toFixed(2) + 'deg');

  wrap.appendChild(rastro);
  setTimeout(() => rastro.remove(), 760);
}

function removerEletronCation(el) {
  document.querySelectorAll('.eletron').forEach(e => { e.style.pointerEvents = 'none'; });
  const wrap = document.getElementById('atomoWrap');
  const centroX = wrap.clientWidth * CENTRO_X;
  const centroY = wrap.clientHeight * CENTRO_Y;
  const ex = parseFloat(el.style.left) + 9;
  const ey = parseFloat(el.style.top) + 9;
  const dirX = ex - centroX;
  const dirY = ey - centroY;
  const m = Math.hypot(dirX, dirY) || 1;
  const tx = (dirX / m) * 120;
  const ty = (dirY / m) * 120;

  el.style.setProperty('--tx', tx.toFixed(2) + 'px');
  el.style.setProperty('--ty', ty.toFixed(2) + 'px');
  criarRastroEletron(ex, ey, { tipo: 'saindo', tx, ty });
  el.classList.add('saindo');

  setTimeout(() => {
    el.remove();
    estado.eletrons = 10;
    atualizarHUD();

    removerTodosEletrons();
    renderizarEletrons(10, 88, false);
    atualizarIonTag();

    tocarDing();
    const fb = document.getElementById('fb2');
    fb.classList.add('visivel', 'ok');
    fb.innerHTML = `Sodium lost 1 electron. It now has 11 protons and 10 electrons.
    Since there is <strong>1 more proton</strong> than electrons, the resulting charge is <strong>1+</strong>.
    This type of positively charged ion is called a <strong>CATION</strong>.`;

    setTimeout(() => {
      mostrarBotaoBalao('Next →', 'etapa3()');
    }, 500);
  }, 750);
}

function iniciarAnimacaoAnion() {
  document.getElementById('btnAnion').disabled = true;
  let adicionados = 0;

  function adicionarProximo() {
    if (adicionados >= 2) {
      estado.eletrons = 10;
      const btnAnion = document.getElementById('btnAnion');
      if (btnAnion) btnAnion.remove();
      atualizarHUD();
      atualizarIonTag();
      tocarDing();
      const fb = document.getElementById('fb3');
      fb.classList.add('visivel', 'ok');
      fb.innerHTML = `Oxygen gained 2 electrons. It now has 8 protons and 10 electrons.
      Since there are <strong>2 more electrons</strong> than protons, the charge is <strong>2−</strong>.
      This type of negatively charged ion is called an <strong>ANION</strong>.`;
      setTimeout(() => {
        mostrarBotaoBalao('Next →', 'etapa4()');
      }, 500);
      return;
    }
    adicionados++;
    estado.eletrons++;
    removerTodosEletrons();
    for (let i = 0; i < estado.eletrons - 1; i++) {
      criarEletron(i, estado.eletrons, 88);

    criarEletron(estado.eletrons - 1, estado.eletrons, 88, { animar: 'entrar' });
    atualizarHUD();
    setTimeout(adicionarProximo, 850);
  }

  adicionarProximo();
}

  removerTodosEletrons();
  renderizarEletrons(estado.eletrons, 88, false);
  habilitarRemocaoSomenteNaCamadaExterna((el) => removerEletronLab(el, d));
}

function removerEletronLab(el, d) {
  document.querySelectorAll('.eletron').forEach(e => e.style.pointerEvents = 'none');
  const wrap = document.getElementById('atomoWrap');
  const centroX = wrap.clientWidth * CENTRO_X;
  const centroY = wrap.clientHeight * CENTRO_Y;
  const ex = parseFloat(el.style.left) + 9;
  const ey = parseFloat(el.style.top) + 9;
  const dirX = ex - centroX;
  const dirY = ey - centroY;
  const m = Math.hypot(dirX, dirY) || 1;
  const tx = (dirX / m) * 120;
  const ty = (dirY / m) * 120;

  el.style.setProperty('--tx', tx.toFixed(2) + 'px');
  el.style.setProperty('--ty', ty.toFixed(2) + 'px');
  criarRastroEletron(ex, ey, { tipo: 'saindo', tx, ty });
  el.classList.add('saindo');
  setTimeout(() => {
    el.remove();
    estado.eletrons--;
    estado.laboratorio.eletronesAtivos--;
    atualizarHUD();
    atualizarIonTag();

    if (estado.eletrons === d.meta) {
      verificarDesafioLab();
    } else {
      removerTodosEletrons();
      renderizarEletrons(estado.eletrons, 88, true);
      habilitarRemocaoSomenteNaCamadaExterna((el2) => removerEletronLab(el2, d));
    }
  }, 750);
}

function adicionarEletronLab() {
  const idx = estado.laboratorio.desafioIdx;
  const d = DESAFIOS_LAB[idx];
  if (estado.eletrons >= d.meta) return;

  estado.eletrons++;
  estado.laboratorio.eletronesAtivos++;
  removerTodosEletrons();
  for (let i = 0; i < estado.eletrons - 1; i++) criarEletron(i, estado.eletrons, 88);
  criarEletron(estado.eletrons - 1, estado.eletrons, 88, { animar: 'entrar' });
  atualizarHUD();
  atualizarIonTag();
  document.getElementById('labStatus').textContent = 'Electrons: ' + estado.eletrons;

  if (estado.eletrons === d.meta) {
    document.getElementById('btnAdd').disabled = true;
    verificarDesafioLab();
  }
}

function verificarDesafioLab() {
  const idx = estado.laboratorio.desafioIdx;
  const d = DESAFIOS_LAB[idx];
  const fb = document.getElementById('fbLab');
  const carga = estado.protons - estado.eletrons;
  const cargaTxt = carga === 0 ? '0' : `${Math.abs(carga)}${carga > 0 ? '+' : '−'}`;
  tocarDing();
  fb.classList.add('visivel', 'ok');
  fb.innerHTML = `Correct! Protons = ${estado.protons}, Electrons = ${estado.eletrons}, Charge = ${cargaTxt}.`;

  setTimeout(() => {
    estado.laboratorio.desafioIdx++;
    if (estado.laboratorio.desafioIdx < DESAFIOS_LAB.length) {
      mostrarBotaoBalao('Next challenge →', 'carregarDesafioLab()');
    } else {
      mostrarBotaoBalao('Next →', 'etapa5()');
    }
  }, 600);
}

// ══════════════════════════════════════════════════
//  STAGE 5 — Final Challenge
// ══════════════════════════════════════════════════
const DESAFIOS_FINAIS = [
  { protons: 15, neutrons: 16, eletrons: 17, opcoes: ['3−', '2−', '2+', '3+'], certa: '2−' },
  { protons: 11, neutrons: 12, eletrons: 10, opcoes: ['1−', '0', '1+', '2+'],  certa: '1+' },
  { protons: 8,  neutrons: 8,  eletrons: 10, opcoes: ['2+', '2−', '0', '1−'],  certa: '2−' },
];

function etapa5() {
  estado.etapa = 5;
  setHudModoFinal(true);
  estado.desafioFinal.idx = 0;
  estado.desafioFinal.acertos = 0;
  setTitulo('Final Challenge');
  carregarDesafioFinal();
}

function carregarDesafioFinal() {
  const idx = estado.desafioFinal.idx;
  if (idx >= DESAFIOS_FINAIS.length) { mostrarFim(); return; }

  const d = DESAFIOS_FINAIS[idx];
  estado.protons  = d.protons;
  estado.eletrons = d.eletrons;
  estado.neutrons = d.neutrons;
  atualizarHUD();
  renderizarNucleo(d.protons, d.neutrons);
  renderizarEletrons(d.eletrons, 88, false);
  atualizarIonTag();

  professora(`Look at the panel in the figure: Protons = ${d.protons}, Electrons = ${d.eletrons}. <strong>Choose one of the options below.</strong>`, 'pensando');

  const ops = d.opcoes.map(op =>
    `<button class="resposta-opcao" onclick="responderFinal(this, '${op}', '${d.certa}')">${op}</button>`
  ).join('');

  renderCorpo(`
    <div class="desafio-box">
      <div class="desafio-titulo">Challenge ${idx + 1} of ${DESAFIOS_FINAIS.length}</div>
      <div class="desafio-texto">What is the electric charge of this atom?</div>
      ${ops}
    </div>
    <div class="feedback-box" id="fbFinal"></div>
  `);
}

function responderFinal(btn, opcao, certa) {
  document.querySelectorAll('.resposta-opcao').forEach(b => b.disabled = true);
  const certo = opcao === certa;
  btn.classList.add(certo ? 'correta' : 'errada');
  if (!certo) {
    document.querySelectorAll('.resposta-opcao').forEach(b => {
      if (b.textContent.trim() === certa) b.classList.add('correta');
    });
  }

  const fb = document.getElementById('fbFinal');
  fb.classList.add('visivel');
  if (certo) {
    tocarDing();
    estado.desafioFinal.acertos++;
    fb.classList.add('ok');
    fb.innerHTML = `Correct! Charge = protons (${estado.protons}) − electrons (${estado.eletrons}) = ${certa}.`;
  } else {
    fb.classList.add('err');
    const diff = estado.protons - estado.eletrons;
    const diffTxt = diff === 0 ? '0' : `${Math.abs(diff)}${diff > 0 ? '+' : '−'}`;
    fb.innerHTML = `The correct charge is <strong>${certa}</strong>. Remember: charge = protons − electrons = ${estado.protons} − ${estado.eletrons} = ${diffTxt}.`;
  }

  setTimeout(() => {
    estado.desafioFinal.idx++;
    if (estado.desafioFinal.idx < DESAFIOS_FINAIS.length) {
      mostrarBotaoBalao('Next →', 'carregarDesafioFinal()');
    } else {
      mostrarBotaoBalao('See summary →', 'mostrarFim()');
    }
  }, 700);
}

// ══════════════════════════════════════════════════
//  FINAL SCREEN — Summary
// ══════════════════════════════════════════════════
function mostrarFim() {
  removerTodosEletrons();
  limparNucleo();
  document.getElementById('ionTag').style.display = 'none';
  document.getElementById('hudProtons').textContent  = '—';
  document.getElementById('hudEletrons').textContent = '—';
  document.getElementById('hudCarga').textContent    = '—';

  const acertos = estado.desafioFinal.acertos;
  const total   = DESAFIOS_FINAIS.length;

  setTitulo('Summary');
  professora(`Well done! You completed the Ions stage. You got <strong>${acertos} of ${total}</strong> right in the final challenge.`, 'animada');

  renderCorpo(`
    <div class="resumo-item">
      <div class="resumo-icone">+</div>
      <div class="resumo-texto">
        <strong>Loses electrons → Cation → Positive charge.</strong><br>
        The atom ends up with more protons than electrons.
      </div>
    </div>
    <div class="resumo-item">
      <div class="resumo-icone">−</div>
      <div class="resumo-texto">
        <strong>Gains electrons → Anion → Negative charge.</strong><br>
        The atom ends up with more electrons than protons.
      </div>
    </div>
    <div class="resumo-item">
      <div class="resumo-icone">○</div>
      <div class="resumo-texto">
        <strong>Protons and neutrons never change.</strong><br>
        Only electrons are gained or lost when ions form.
      </div>
    </div>

    <div class="feedback-box visivel info" style="margin-top:4px">
      Charge formula: <strong>Charge = Protons − Electrons</strong>
    </div>
  `);
  mostrarBotaoBalao('Restart', 'etapa0()', 'btnFim');

  try {
    if (window.salvarProgresso) salvarProgresso({ fase: 'ions', concluida: true });
  } catch(e) { /* offline or no auth */ }
}

window.addEventListener('resize', atualizarPosicaoHudMobile);
atualizarPosicaoHudMobile();
etapa0();
</script>

<script>
let volumeSalvo = parseFloat(localStorage.getItem('kifacil_volume'));
if (isNaN(volumeSalvo)) volumeSalvo = 0.35;
let silenciado = localStorage.getItem('kifacil_silenciado') === '1';
let musicaFundo = null;

function volumeEfetivo() {
  return silenciado ? 0 : volumeSalvo;
}

function iniciarMusicaFundo() {
  if (musicaFundo) return;
  try {
    musicaFundo = new Audio('../sons/natureza.mp3');
    musicaFundo.loop = true;
    musicaFundo.volume = volumeEfetivo();
    musicaFundo.play().catch(function () {});
  } catch (e) {}
}

function atualizarIconeMudo() {
  const botao = document.getElementById('btn-mute');
  if (!botao) return;
  if (silenciado || volumeSalvo === 0) botao.textContent = '🔇';
  else if (volumeSalvo < 0.5) botao.textContent = '🔉';
  else botao.textContent = '🔊';
}

function alternarMudo() {
  silenciado = !silenciado;
  localStorage.setItem('kifacil_silenciado', silenciado ? '1' : '0');
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

function ajustarVolume(valorSlider) {
  volumeSalvo = Math.max(0, Math.min(1, valorSlider / 100));
  localStorage.setItem('kifacil_volume', volumeSalvo);
  if (volumeSalvo > 0 && silenciado) {
    silenciado = false;
    localStorage.setItem('kifacil_silenciado', '0');
  }
  if (musicaFundo) musicaFundo.volume = volumeEfetivo();
  atualizarIconeMudo();
}

(function iniciarControleVolume() {
  const slider = document.getElementById('slider-volume');
  if (slider) slider.value = Math.round(volumeSalvo * 100);
  atualizarIconeMudo();
  iniciarMusicaFundo();

  const ativarSom = function () {
    if (!musicaFundo) iniciarMusicaFundo();
    if (musicaFundo) {
      musicaFundo.volume = volumeEfetivo();
      musicaFundo.play().catch(function () {});
    }
  };
  window.addEventListener('pointerdown', ativarSom, { once: true });
  window.addEventListener('keydown', ativarSom, { once: true });
})();
</script>
<script>
(function () {
  var _clickSom = new Audio('../sons/click.mp3');
  _clickSom.preload = 'auto';
  document.addEventListener('click', function (e) {
    var alvo = e.target.closest('button');
    if (alvo) { try { _clickSom.currentTime = 0; _clickSom.volume = (typeof volumeEfetivo === 'function' ? volumeEfetivo() : 0.35); _clickSom.play().catch(function () {}); } catch (err) {} }
  }, true);
})();
</script>
<div id="controle-volume">
  <button id="btn-mute" onclick="alternarMudo()" aria-label="Mute or unmute sound">🔊</button>
  <input type="range" id="slider-volume" min="0" max="100" value="35" oninput="ajustarVolume(this.value)" aria-label="Volume">
</div>
</body>
